<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成就陈列馆 · 游蜀拜师录</title>
    <link rel="icon" type="image/svg+xml" href="genie.svg">
    <meta name="description" content="成就陈列馆 - 记录你的蜀地之旅成就">
    
    <!-- 引用公共CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- 成就馆特有样式 -->
    <style>
        /* 成就馆特有样式 */
        :root {
            --achievement-color: #fee140;
            --achievement-color-light: rgba(254, 225, 64, 0.1);
        }
        
        .achievements-header {
            background: linear-gradient(135deg, rgba(254, 225, 64, 0.05), rgba(10, 10, 10, 0.9));
            border-bottom: 2px solid var(--achievement-color);
            padding: 30px 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header-content {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .achievements-title {
            font-size: 2.5rem;
            color: var(--achievement-color);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .achievements-subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
        }
        
        .achievements-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 30px;
        }
        
        .stat-card {
            background: rgba(254, 225, 64, 0.05);
            border: 1px solid rgba(254, 225, 64, 0.2);
            border-radius: 10px;
            padding: 20px;
            min-width: 150px;
            text-align: center;
        }
        
        .stat-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--achievement-color);
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .achievements-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .filter-btn.active {
            background: var(--achievement-color);
            color: #333;
            font-weight: bold;
            border-color: var(--achievement-color);
        }
        
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }
        
        .achievement-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            opacity: 0.3;
        }
        
        .achievement-card.unlocked {
            opacity: 1;
            border-color: var(--achievement-color);
            background: linear-gradient(135deg, rgba(254, 225, 64, 0.05), rgba(254, 225, 64, 0.02));
        }
        
        .achievement-card.unlocked:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(254, 225, 64, 0.1);
        }
        
        .achievement-glow {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 0%, rgba(254, 225, 64, 0.1) 0%, transparent 70%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .achievement-card.unlocked:hover .achievement-glow {
            opacity: 1;
        }
        
        .achievement-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .achievement-icon {
            width: 50px;
            height: 50px;
            background: rgba(254, 225, 64, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        
        .achievement-icon.unlocked {
            background: var(--achievement-color);
            color: #333;
        }
        
        .achievement-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .achievement-card.unlocked .achievement-title {
            color: var(--achievement-color);
        }
        
        .achievement-description {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .achievement-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .achievement-date {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .achievement-badge {
            background: rgba(254, 225, 64, 0.2);
            color: var(--achievement-color);
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .locked-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 10, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-radius: 12px;
        }
        
        .lock-icon {
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.3);
        }
        
        .locked-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }
        
        .no-achievements {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .no-achievements-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        
        .no-achievements-text {
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .achievements-grid {
                grid-template-columns: 1fr;
                max-width: 500px;
                margin: 0 auto 50px;
            }
            
            .achievements-stats {
                gap: 15px;
            }
            
            .stat-card {
                min-width: 120px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- 页面顶部 -->
    <div class="achievements-header">
        <div class="header-content">
            <h1 class="achievements-title">
                <span>🏆</span>
                成就陈列馆
            </h1>
            <p class="achievements-subtitle">记录你在蜀地之旅中的每一个里程碑</p>
            
            <div class="achievements-stats" id="achievements-stats">
                <!-- 统计数据会由JavaScript动态更新 -->
                <div class="stat-card">
                    <div class="stat-icon">🏆</div>
                    <div class="stat-number">0</div>
                    <div class="stat-label">总成就</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">🥇</div>
                    <div class="stat-number">0</div>
                    <div class="stat-label">已解锁</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-number">0%</div>
                    <div class="stat-label">完成度</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 成就列表 -->
    <div class="achievements-container">
        <!-- 筛选栏 -->
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">全部成就</button>
            <button class="filter-btn" data-filter="libai">李白线</button>
            <button class="filter-btn" data-filter="zhuge">诸葛亮线</button>
            <button class="filter-btn" data-filter="zhao">赵云线</button>
            <button class="filter-btn" data-filter="unlocked">已解锁</button>
            <button class="filter-btn" data-filter="locked">未解锁</button>
        </div>
        
        <!-- 成就网格 -->
        <div id="achievements-grid" class="achievements-grid">
            <!-- 成就卡片会由JavaScript动态生成 -->
        </div>
        <!-- 空状态提示（放在grid外部，避免被innerHTML清空） -->
        <div class="no-achievements" id="no-achievements" style="display: none;">
            <div class="no-achievements-icon">📝</div>
            <div class="no-achievements-text">还没有解锁任何成就</div>
            <p>开始你的蜀地之旅，完成各种挑战来解锁成就吧！</p>
            <button class="btn" data-action="go-home" style="margin-top: 20px;">
                返回首页开始游戏
            </button>
        </div>
    </div>
    
    <!-- 引用公共JavaScript -->
    <script src="js/common.js"></script>
    
    <!-- 成就馆特有JavaScript -->
    <script>
        // 所有可能的成就数据（使用条件声明避免重复打开弹窗时报错）
        if (typeof allAchievements === 'undefined') {
            var allAchievements = [
            // 李白线成就
            {
                id: 'libai_wine_master',
                title: '酒中仙',
                description: '全程酒意选择占优',
                icon: '🍷',
                category: 'libai',
                points: 10
            },
            {
                id: 'libai_puzzle_start',
                title: '重构机甲',
                description: '进入李白线第四幕小游戏',
                icon: '🤖',
                category: 'libai',
                points: 15
            },
            {
                id: 'libai_puzzle_complete',
                title: '诗篇重构师',
                description: '完成李白线第四幕拼图游戏',
                icon: '🧩',
                category: 'libai',
                points: 25
            },
            {
                id: 'libai_complete',
                title: '李白线全通',
                description: '完成李白线全部五幕内容',
                icon: '🎭',
                category: 'libai',
                points: 30
            },
            
            // 诸葛亮线成就
            {
                id: 'zhuge_wisdom',
                title: '智谋初显',
                description: '在诸葛亮线完成三次智慧选择',
                icon: '🧠',
                category: 'zhuge',
                points: 10
            },
            {
                id: 'zhuge_efficiency',
                title: '效率专家',
                description: '在诸葛亮线完成三次效率选择',
                icon: '⏱️',
                category: 'zhuge',
                points: 10
            },
            {
                id: 'zhuge_act4',
                title: '八卦阵法',
                description: '进入诸葛亮线策略解谜游戏',
                icon: '☯',
                category: 'zhuge',
                points: 15
            },
            {
                id: 'zhuge_strategy',
                title: '阵法大师',
                description: '完成诸葛亮线策略解谜游戏',
                icon: '🎯',
                category: 'zhuge',
                points: 25
            },
            {
                id: 'zhuge_complete',
                title: '诸葛亮线全通',
                description: '完成诸葛亮线全部五幕内容',
                icon: '🎭',
                category: 'zhuge',
                points: 30
            },
            
            // 赵云线成就
            {
                id: 'zhao_courage',
                title: '勇者无畏',
                description: '在赵云线完成三次勇气选择',
                icon: '💪',
                category: 'zhao',
                points: 10
            },
            {
                id: 'zhao_guard',
                title: '守护者',
                description: '在赵云线完成三次守护选择',
                icon: '🛡️',
                category: 'zhao',
                points: 10
            },
            {
                id: 'zhao_act4',
                title: '翔龙反应',
                description: '进入赵云线反应测试游戏',
                icon: '⚡',
                category: 'zhao',
                points: 15
            },
            {
                id: 'zhao_reaction_master',
                title: '反应大师',
                description: '在反应测试中获得10分以上',
                icon: '🎯',
                category: 'zhao',
                points: 25
            },
            {
                id: 'zhao_complete',
                title: '赵云线全通',
                description: '完成赵云线全部五幕内容',
                icon: '🎭',
                category: 'zhao',
                points: 30
            },
            
            // 通用成就
            {
                id: 'first_game',
                title: '初入蜀地',
                description: '第一次开始游戏',
                icon: '📍',
                category: 'general',
                points: 5
            },
            {
                id: 'all_heroes',
                title: '全能学徒',
                description: '体验所有三条英雄路线',
                icon: '🌟',
                category: 'general',
                points: 30
            },
            {
                id: 'all_achievements',
                title: '完美收集者',
                description: '解锁所有成就',
                icon: '🏆',
                category: 'general',
                points: 50
            }
        ];
        } // 结束条件声明
        
        // ==================== 页面初始化 ====================
        
        // 兼容两种模式：直接访问时用 DOMContentLoaded，弹窗模式直接执行
        function initAchievements() {
            console.log('成就馆页面已加载');
            
            // 先绑定事件（确保交互始终可用）
            bindAchievementEvents();
            
            // 再加载数据（即使失败也不影响交互）
            try {
                loadAchievements();
            } catch (error) {
                console.error('加载成就数据失败:', error);
            }
        }
        
        // 直接访问时等待 DOMContentLoaded，弹窗模式立即执行
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initAchievements);
        } else {
            // 弹窗模式或 DOM 已就绪，立即执行
            setTimeout(initAchievements, 0);
        }
        
        // ==================== 成就管理 ====================
        
        // 加载成就数据
        function loadAchievements() {
            // 获取已解锁的成就
            const unlockedAchievements = getAllAchievements();
            
            // 计算统计数据
            updateAchievementStats(unlockedAchievements);
            
            // 显示所有成就
            displayAllAchievements(unlockedAchievements);
            
            // 应用默认筛选（全部成就）
            filterAchievements('all');
        }
        
        // 更新成就统计
        function updateAchievementStats(unlockedAchievements) {
            const totalAchievements = allAchievements.length;
            const unlockedCount = unlockedAchievements.length;
            const completionRate = totalAchievements > 0 ? Math.round((unlockedCount / totalAchievements) * 100) : 0;
            
            // 更新统计卡片
            document.querySelectorAll('.stat-card')[0].querySelector('.stat-number').textContent = totalAchievements;
            document.querySelectorAll('.stat-card')[1].querySelector('.stat-number').textContent = unlockedCount;
            document.querySelectorAll('.stat-card')[2].querySelector('.stat-number').textContent = `${completionRate}%`;
            
            // 保存统计数据到游戏状态
            gameState.achievements = unlockedAchievements;
            saveGameState();
        }
        
        // 显示所有成就
        function displayAllAchievements(unlockedAchievements) {
            const grid = document.getElementById('achievements-grid');
            grid.innerHTML = '';
            
            const unlockedIds = unlockedAchievements.map(ach => ach.id);
            
            allAchievements.forEach(achievement => {
                const isUnlocked = unlockedIds.includes(achievement.id);
                const card = createAchievementCard(achievement, isUnlocked);
                grid.appendChild(card);
            });
            
            // 空状态显示交给 checkEmptyResults() 统一处理
        }
        
        // 创建成就卡片
        function createAchievementCard(achievement, isUnlocked) {
            const card = document.createElement('div');
            card.className = `achievement-card ${isUnlocked ? 'unlocked' : 'locked'}`;
            card.dataset.id = achievement.id;
            card.dataset.category = achievement.category;
            
            // 创建卡片内容
            const cardContent = `
                <div class="achievement-glow"></div>
                
                <div class="achievement-header">
                    <div class="achievement-icon ${isUnlocked ? 'unlocked' : ''}">
                        ${achievement.icon}
                    </div>
                    <div>
                        <div class="achievement-title">${achievement.title}</div>
                        <div class="achievement-description">${achievement.description}</div>
                    </div>
                </div>
                
                <div class="achievement-footer">
                    <div class="achievement-badge">${achievement.points} 点</div>
                    <div class="achievement-date">
                        ${isUnlocked ? '已解锁' : '未解锁'}
                    </div>
                </div>
            `;
            
            card.innerHTML = cardContent;
            
            // 如果未解锁，添加锁定覆盖层
            if (!isUnlocked) {
                const lockedOverlay = document.createElement('div');
                lockedOverlay.className = 'locked-overlay';
                lockedOverlay.innerHTML = `
                    <div class="lock-icon">🔒</div>
                    <div class="locked-text">未解锁</div>
                `;
                card.appendChild(lockedOverlay);
            }
            
            return card;
        }
        
        // ==================== 筛选功能 ====================
        
        // 筛选成就
        function filterAchievements(filterType) {
            const cards = document.querySelectorAll('.achievement-card');
            const unlockedAchievements = getAllAchievements();
            const unlockedIds = unlockedAchievements.map(ach => ach.id);
            
            cards.forEach(card => {
                const category = card.dataset.category;
                const isUnlocked = unlockedIds.includes(card.dataset.id);
                
                let shouldShow = true;
                
                switch (filterType) {
                    case 'all':
                        shouldShow = true;
                        break;
                    case 'libai':
                        shouldShow = category === 'libai';
                        break;
                    case 'zhuge':
                        shouldShow = category === 'zhuge';
                        break;
                    case 'zhao':
                        shouldShow = category === 'zhao';
                        break;
                    case 'unlocked':
                        shouldShow = isUnlocked;
                        break;
                    case 'locked':
                        shouldShow = !isUnlocked;
                        break;
                }
                
                card.style.display = shouldShow ? 'block' : 'none';
            });
            
            // 更新筛选按钮状态
            updateFilterButtons(filterType);
            
            // 检查是否有显示的卡片
            checkEmptyResults();
        }
        
        // 更新筛选按钮状态
        function updateFilterButtons(activeFilter) {
            const filterButtons = document.querySelectorAll('.filter-btn');
            filterButtons.forEach(button => {
                if (button.dataset.filter === activeFilter) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }
        
        // 检查是否有空结果
        function checkEmptyResults() {
            const cards = document.querySelectorAll('.achievement-card[style*="block"]');
            if (cards.length === 0) {
                document.getElementById('no-achievements').style.display = 'block';
            } else {
                document.getElementById('no-achievements').style.display = 'none';
            }
        }
        
        // ==================== 事件绑定 ====================
        
        function bindAchievementEvents() {
            // 筛选按钮
            const filterButtons = document.querySelectorAll('.filter-btn');
            filterButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const filterType = this.dataset.filter;
                    filterAchievements(filterType);
                });
            });
            
            // 点击未解锁的成就卡片（无操作）
            const lockedCards = document.querySelectorAll('.achievement-card:not(.unlocked)');
            lockedCards.forEach(card => {
                card.addEventListener('click', function() {
                    // 可以添加解锁提示或动画
                    this.classList.add('pulse');
                    setTimeout(() => this.classList.remove('pulse'), 500);
                });
            });
        }
        
        // ==================== 成就解锁提示 ====================
        
        // 监听storage变化，实时更新成就
        window.addEventListener('storage', function(event) {
            if (event.key === 'gameState') {
                loadAchievements();
            }
        });
    </script>
</body>
</html>
