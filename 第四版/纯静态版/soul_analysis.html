<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游魂鉴定 · 游蜀拜师录</title>
    <link rel="icon" type="image/svg+xml" href="genie.svg">
    <meta name="description" content="游魂鉴定 - 探寻你的蜀地游魂本相">
    
    <!-- 引用公共CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- 页面特有样式 -->
    <style>
        :root {
            --soul-primary: #a855f7;
            --soul-primary-light: rgba(168, 85, 247, 0.15);
            --soul-secondary: #6366f1;
            --soul-accent: #60E0FF;
            --soul-gold: #ffd700;
            --li-color: #60E0FF;
            --zhuge-color: #0066CC;
            --zhao-color: #C8C8D7;
        }
        
        .soul-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }
        
        .soul-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 30% 20%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(96, 224, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(200, 200, 215, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }
        
        .soul-container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        /* 顶部导航 */
        .soul-nav {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .soul-back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .soul-back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        /* 主标题区 */
        .soul-header {
            text-align: center;
            margin-bottom: 60px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease forwards;
        }
        
        .soul-header-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: floatIcon 3s ease-in-out infinite;
        }
        
        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .soul-header-title {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--soul-primary), var(--soul-accent), var(--soul-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
            cursor: help;
        }

        /* 解锁提示 - 鼠标悬停显示 */
        .unlock-hint {
            position: absolute;
            left: 50%;
            top: calc(100% + 10px);
            transform: translateX(-50%) translateY(-5px);
            background: rgba(168, 85, 247, 0.95);
            color: white;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: normal;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
            z-index: 10;
        }

        .unlock-hint::before {
            content: '';
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 6px solid rgba(168, 85, 247, 0.95);
        }

        .soul-header-title:hover .unlock-hint {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
        
        .soul-header-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
        }
        
        .soul-deco-line {
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--soul-primary), transparent);
            margin: 30px auto;
        }
        
        /* 称号卡片 */
        .title-card {
            background: linear-gradient(135deg,
                rgba(168, 85, 247, 0.1),
                rgba(99, 102, 241, 0.08),
                rgba(96, 224, 255, 0.05));
            border: 2px solid rgba(168, 85, 247, 0.3);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            margin-bottom: 50px;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease 0.3s forwards;
        }
        
        .title-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                transparent,
                rgba(168, 85, 247, 0.05),
                transparent,
                rgba(96, 224, 255, 0.05),
                transparent
            );
            animation: rotate 10s linear infinite;
        }
        
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
        
        .title-card-content {
            position: relative;
            z-index: 1;
        }
        
        .title-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        
        .title-name {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--soul-gold), #ffa500, var(--soul-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .title-type {
            font-size: 1.2rem;
            color: var(--soul-primary);
            margin-bottom: 20px;
        }
        
        .title-seal {
            display: inline-block;
            padding: 8px 24px;
            border: 2px solid var(--soul-gold);
            border-radius: 30px;
            color: var(--soul-gold);
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-top: 10px;
        }
        
        /* 契合度分析 */
        .affinity-section {
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease 0.6s forwards;
        }
        
        .section-title {
            font-size: 1.8rem;
            color: var(--soul-primary);
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }
        
        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: var(--soul-primary);
            margin: 10px auto 0;
            border-radius: 2px;
        }
        
        .affinity-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .affinity-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .affinity-card:hover {
            transform: translateY(-5px);
        }
        
        .affinity-card.primary {
            border-color: rgba(168, 85, 247, 0.4);
            background: linear-gradient(135deg,
                rgba(168, 85, 247, 0.1),
                rgba(99, 102, 241, 0.05));
        }
        
        .affinity-card.primary::after {
            content: '本命';
            position: absolute;
            top: 10px;
            right: -20px;
            background: var(--soul-primary);
            color: white;
            font-size: 0.7rem;
            padding: 2px 28px;
            transform: rotate(45deg);
        }
        
        .affinity-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        
        .affinity-name {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .affinity-bar-container {
            margin: 15px 0;
        }
        
        .affinity-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 5px;
        }
        
        .affinity-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .affinity-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1.5s ease;
            width: 0;
        }
        
        .affinity-value {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 10px;
        }
        
        /* 导师寄语 */
        .message-section {
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease 0.9s forwards;
        }
        
        .message-card {
            background: linear-gradient(135deg,
                rgba(168, 85, 247, 0.08),
                rgba(99, 102, 241, 0.05));
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 20px;
            padding: 40px;
            position: relative;
        }
        
        .message-quote {
            font-size: 3rem;
            color: rgba(168, 85, 247, 0.3);
            position: absolute;
            top: 15px;
            left: 25px;
            font-family: serif;
        }
        
        .message-from {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .message-from-icon {
            font-size: 1.5rem;
        }
        
        .message-from-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--soul-primary);
        }
        
        .message-text {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.8;
            font-size: 1.05rem;
            padding-left: 10px;
            border-left: 3px solid rgba(168, 85, 247, 0.3);
        }
        
        /* 旅行推荐 */
        .travel-section {
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease 1.2s forwards;
        }
        
        .travel-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .travel-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px 30px;
            display: flex;
            gap: 20px;
            align-items: flex-start;
            transition: all 0.3s ease;
        }
        
        .travel-item:hover {
            border-color: rgba(168, 85, 247, 0.3);
            background: rgba(168, 85, 247, 0.05);
            transform: translateX(5px);
        }
        
        .travel-rank {
            flex-shrink: 0;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        .travel-rank.core {
            background: linear-gradient(135deg, var(--soul-gold), #ffa500);
            color: #333;
        }
        
        .travel-rank.secondary {
            background: linear-gradient(135deg, #c0c0c0, #a0a0a0);
            color: #333;
        }
        
        .travel-rank.easter {
            background: linear-gradient(135deg, var(--soul-primary), var(--soul-secondary));
            color: white;
        }
        
        .travel-info {
            flex: 1;
        }
        
        .travel-tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .travel-tag.core { background: rgba(255, 215, 0, 0.2); color: var(--soul-gold); }
        .travel-tag.secondary { background: rgba(192, 192, 192, 0.2); color: #c0c0c0; }
        .travel-tag.easter { background: rgba(168, 85, 247, 0.2); color: var(--soul-primary); }
        
        .travel-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: white;
        }
        
        .travel-reason {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
            line-height: 1.6;
        }
        
        /* 底部 */
        .soul-footer {
            text-align: center;
            padding: 40px 0 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            animation: fadeInUp 0.8s ease 1.5s forwards;
        }
        
        .soul-footer-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        
        .soul-footer-btn {
            background: linear-gradient(135deg, var(--soul-primary), var(--soul-secondary));
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .soul-footer-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(168, 85, 247, 0.3);
        }
        
        /* 未解锁提示 */
        .locked-notice {
            text-align: center;
            padding: 100px 20px;
        }
        
        .locked-notice-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .locked-notice-title {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
        }
        
        .locked-notice-text {
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 30px;
        }
        
        /* 动画 */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .soul-header-title {
                font-size: 2rem;
            }
            
            .title-name {
                font-size: 1.8rem;
            }
            
            .affinity-grid {
                grid-template-columns: 1fr;
                max-width: 400px;
                margin: 0 auto;
            }
            
            .affinity-card.primary::after {
                right: -15px;
            }
            
            .message-card {
                padding: 25px;
            }
            
            .travel-item {
                padding: 20px;
            }
            
            .title-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="soul-page" id="soul-page">
        <!-- 未解锁提示（动态替换） -->
        <div class="locked-notice" id="locked-notice" style="display: none;">
            <div class="locked-notice-icon">🔒</div>
            <div class="locked-notice-title">游魂鉴定尚未解锁</div>
            <div class="locked-notice-text">完成三条导师线之旅，方可鉴定你的蜀地游魂本相</div>
            <button class="soul-footer-btn" onclick="window.location.href='index.html'">返回首页</button>
        </div>
        
        <!-- 报告内容（动态填充） -->
        <div class="soul-container" id="soul-report" style="display: none;">
            <!-- 顶部导航 -->
            <div class="soul-nav">
                <button class="soul-back-btn" onclick="window.location.href='index.html'">← 返回首页</button>
            </div>
            
            <!-- 主标题 -->
            <div class="soul-header">
                <div class="soul-header-icon">👻</div>
                <h1 class="soul-header-title">
                    游魂鉴定
                    <span class="unlock-hint">完成三条导师线之旅以解锁</span>
                </h1>
                <p class="soul-header-subtitle">三线归一，鉴定你的蜀地游魂本相</p>
                <div class="soul-deco-line"></div>
            </div>
            
            <!-- 称号卡片 -->
            <div class="title-card" id="title-card">
                <div class="title-card-content">
                    <div class="title-label">你的蜀地游魂本相</div>
                    <div class="title-name" id="title-name">—</div>
                    <div class="title-type" id="title-type">—</div>
                    <div class="title-seal" id="title-seal">—</div>
                </div>
            </div>
            
            <!-- 契合度分析 -->
            <div class="affinity-section">
                <h2 class="section-title">导师契合度</h2>
                <div class="affinity-grid" id="affinity-grid">
                    <!-- 动态填充 -->
                </div>
            </div>
            
            <!-- 导师寄语 -->
            <div class="message-section">
                <h2 class="section-title">导师寄语</h2>
                <div class="message-card" id="message-card">
                    <div class="message-quote">"</div>
                    <div class="message-from" id="message-from">
                        <span class="message-from-icon">🍷</span>
                        <span class="message-from-name">李白</span>
                    </div>
                    <div class="message-text" id="message-text">—</div>
                </div>
            </div>
            
            <!-- 专属旅行推荐 -->
            <div class="travel-section">
                <h2 class="section-title">专属旅行推荐</h2>
                <div class="travel-list" id="travel-list">
                    <!-- 动态填充 -->
                </div>
            </div>
            
            <!-- 底部 -->
            <div class="soul-footer">
                <p class="soul-footer-text">你的蜀地游魂已被铭刻于天地之间</p>
                <button class="soul-footer-btn" onclick="window.location.href='index.html'">返回首页</button>
            </div>
        </div>
    </div>
    
    <!-- 引用公共JavaScript -->
    <script src="js/common.js"></script>
    
    <!-- 游魂鉴定逻辑 -->
    <script>
        // ==================== 判定数据定义 ====================
        
        const soulProfiles = {
            liBai: {
                name: '李白',
                icon: '🍷',
                color: '#60E0FF',
                title: '浪漫诗心型游魂',
                type: '诗酒风流 · 浪漫不羁',
                seal: '青莲剑仙认证',
                message: '吾观你之心性，与吾何其相似！你于诗酒中见天地，于浪漫中寻真我。蜀地之风物，因你的诗意凝视而更添灵韵。切记，世间最珍贵的不是抵达，而是途中每一杯酒、每一首诗。去吧，带着诗心继续漫游，天地之大，皆可入诗！',
                travel: [
                    { tag: 'core', name: '杜甫草堂', reason: '诗心所向，必朝圣诗圣故居。在浣花溪畔品读千古诗篇，与你的浪漫灵魂最深契合。' },
                    { tag: 'secondary', name: '宽窄巷子鲁班茶肆', reason: '品茗观赛、文创探店——诗酒之间，亦需烟火气。王者荣耀文创店满足你的游戏与浪漫双重向往。' },
                    { tag: 'easter', name: '成都IFS屋顶花园', reason: '在爬墙熊猫旁远眺天府，举杯邀明月——都市天际线与诗意的碰撞，只有浪漫游魂才懂的秘境。' }
                ]
            },
            zhugeLiang: {
                name: '诸葛亮',
                icon: '🎯',
                color: '#0066CC',
                title: '深谋远虑型游魂',
                type: '运筹帷幄 · 智谋无双',
                seal: '绝代智谋认证',
                message: '你之慧根，令亮亦为之侧目。游历之中，你不唯观景，更观其理、析其道。此等洞察力，非常人所能及。蜀地之兴，在于创新与谋略并重，而你正是这种精神的最佳传人。日后行事，切记：谋定而后动，知止而有得。',
                travel: [
                    { tag: 'core', name: '武侯祠', reason: '智谋本源，必朝圣丞相祠堂。在三绝碑前体悟千古谋略，这是与你灵魂最深处共鸣之地。' },
                    { tag: 'secondary', name: 'AG超玩会主场', reason: '观顶级电竞赛事，分析战队策略——运筹帷幄不分古今，电子竞技中的智谋博弈与你的灵魂同频。' },
                    { tag: 'easter', name: '成都规划馆', reason: '从城市规划中读懂一座城市的顶层设计——这大概是只有智谋型游魂才会感兴趣的冷门秘境。' }
                ]
            },
            zhaoYun: {
                name: '赵云',
                icon: '⚔️',
                color: '#C8C8D7',
                title: '无畏勇者型游魂',
                type: '勇往直前 · 守护之盾',
                seal: '苍天翔龙认证',
                message: '好一个勇者！你于旅途中不惧险阻、勇探未知，更在关键时刻守护同伴、担当重任。此等胆识与担当，正是吾一生所求。蜀地之峻险与秀美，唯勇者方可尽览。继续前行，记住：真正的勇气，不是无畏，而是心怀畏惧仍选择挺身而出！',
                travel: [

                    { tag: 'secondary', name: '太古里 → 大慈寺', reason: '国际潮流与千年古刹一街之隔——诗意的禅意、谋略的商业、勇气的创新，在这里完美共存。' },

        // ==================== 页面初始化 ====================
        
        document.addEventListener('DOMContentLoaded', function() {
            if (!isSoulAnalysisUnlocked()) {
                document.getElementById('locked-notice').style.display = 'block';
                document.getElementById('soul-report').style.display = 'none';
                return;
            }
            
            document.getElementById('locked-notice').style.display = 'none';
            document.getElementById('soul-report').style.display = 'block';
            
            generateReport();
        });
        
        // ==================== 报告生成 ====================
        
        function generateReport() {
            const soulData = getSoulData();
            
            // 获取三条线的 soulValue
            const liBaiValue = (soulData.liBai && soulData.liBai.soulValue) || 0;
            const zhugeValue = (soulData.zhugeLiang && soulData.zhugeLiang.soulValue) || 0;
            const zhaoValue = (soulData.zhaoYun && soulData.zhaoYun.soulValue) || 0;
            
            // 计算最大值总和，用于百分比
            const totalValue = liBaiValue + zhugeValue + zhaoValue;
            
            // 判定本命导师
            const result = determineSoulType(liBaiValue, zhugeValue, zhaoValue);
            const profile = soulProfiles[result.type];
            
            // 填充称号
            document.getElementById('title-name').textContent = profile.title;
            document.getElementById('title-type').textContent = profile.type;
            document.getElementById('title-seal').textContent = profile.seal;
            
            // 填充契合度
            renderAffinity(liBaiValue, zhugeValue, zhaoValue, totalValue, result.type);
            
            // 填充导师寄语
            document.getElementById('message-from').innerHTML = 
                `<span class="message-from-icon">${profile.icon}</span>
                 <span class="message-from-name">${profile.name} 寄语</span>`;
            document.getElementById('message-text').textContent = profile.message;
            
            // 填充旅行推荐
            renderTravel(profile.travel);
            
            // 延迟触发契合度条动画
            setTimeout(() => {
                document.querySelectorAll('.affinity-bar-fill').forEach(bar => {
                    bar.style.width = bar.dataset.width;
                });
            }, 800);
        }
        
        // 判定游魂类型
        function determineSoulType(li, zhuge, zhao) {
            const values = [
                { id: 'liBai', value: li },
                { id: 'zhugeLiang', value: zhuge },
                { id: 'zhaoYun', value: zhao }
            ];
            
            // 降序排列
            values.sort((a, b) => b.value - a.value);
            
            const max = values[0].value;
            const second = values[1].value;
            const third = values[2].value;
            
            // 三个值相等 → 均衡
            if (max === third) {
                return { type: 'balanced', primary: 'balanced' };
            }
            
            // 前两个并列最高 → 双修
            if (max === second && second > third) {
                const pair = [values[0].id, values[1].id].sort().join('_');
                return { type: 'dual_' + pair, primary: values[0].id };
            }
            
            // 单一最高
            return { type: values[0].id, primary: values[0].id };
        }
        
        // 渲染契合度卡片
        function renderAffinity(liVal, zhugeVal, zhaoVal, total, soulType) {
            const grid = document.getElementById('affinity-grid');
            grid.innerHTML = '';
            
            const mentors = [
                { id: 'liBai', name: '李白', icon: '🍷', color: '#60E0FF', value: liVal, label1: '诗心', label2: '酒意', data: getSoulData().liBai || {} },
                { id: 'zhugeLiang', name: '诸葛亮', icon: '🎯', color: '#0066CC', value: zhugeVal, label1: '智谋', label2: '效率', data: getSoulData().zhugeLiang || {} },
                { id: 'zhaoYun', name: '赵云', icon: '⚔️', color: '#C8C8D7', value: zhaoVal, label1: '勇气', label2: '守护', data: getSoulData().zhaoYun || {} }
            ];
            
            // 计算百分比
            const maxVal = Math.max(...mentors.map(m => m.value), 1);
            
            mentors.forEach(m => {
                const percent = total > 0 ? Math.round((m.value / total) * 100) : 0;
                const barPercent = Math.round((m.value / maxVal) * 100);
                const isPrimary = soulType === m.id || 
                    (soulType.startsWith('dual_') && soulType.includes(m.id)) || 
                    soulType === 'balanced';
                
                const card = document.createElement('div');
                card.className = `affinity-card${isPrimary ? ' primary' : ''}`;
                card.innerHTML = `
                    <div class="affinity-icon">${m.icon}</div>
                    <div class="affinity-name" style="color: ${m.color}">${m.name}</div>
                    <div class="affinity-bar-container">
                        <div class="affinity-bar-label">
                            <span>${m.label1}：${m.data[m.label1 === '诗心' ? 'poem' : m.label1 === '智谋' ? 'strategy' : 'courage'] || 0}</span>
                            <span>${m.label2}：${m.data[m.label2 === '酒意' ? 'wine' : m.label2 === '效率' ? 'efficiency' : 'guard'] || 0}</span>
                        </div>
                        <div class="affinity-bar">
                            <div class="affinity-bar-fill" style="background: ${m.color}" data-width="${barPercent}%"></div>
                        </div>
                    </div>
                    <div class="affinity-value" style="color: ${m.color}">${percent}%</div>
                `;
                grid.appendChild(card);
            });
        }
        
        // 渲染旅行推荐
        function renderTravel(travelList) {
            const list = document.getElementById('travel-list');
            list.innerHTML = '';
            
            const tagLabels = { core: '核心匹配', secondary: '次选搭配', easter: '彩蛋体验' };
            const rankLabels = { core: '核心', secondary: '次选', easter: '彩蛋' };
            
            travelList.forEach(item => {
                const el = document.createElement('div');
                el.className = 'travel-item';
                el.innerHTML = `
                    <div class="travel-rank ${item.tag}">${rankLabels[item.tag]}</div>
                    <div class="travel-info">
                        <span class="travel-tag ${item.tag}">${tagLabels[item.tag]}</span>
                        <div class="travel-name">${item.name}</div>
                        <div class="travel-reason">${item.reason}</div>
                    </div>
                `;
                list.appendChild(el);
            });
        }
    </script>
