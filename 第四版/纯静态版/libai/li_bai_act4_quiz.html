<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李白线 · 第四幕 · 重构机甲诗篇</title>
    <link rel="icon" type="image/svg+xml" href="../genie.svg">
    <meta name="description" content="李白线第四幕 - 重构机甲诗篇拼图游戏">
    
    <!-- 引用公共CSS -->
    <link rel="stylesheet" href="../css/style.css">
    
    <!-- 李白线公共CSS -->
    <link rel="stylesheet" href="../css/hero-styles.css">
</head>
<body>
    <!-- 页面顶部 -->
    <div class="li-bai-header">
        <div class="container">
            <div class="hero-header">
                <div class="hero-info">
                    <h1 class="hero-name">
                        <span class="hero-name-icon">🍷</span>
                        李白 · 青莲剑仙
                    </h1>
                    <p class="hero-title">诗酒剑意 · 重构机甲诗篇</p>
                    
                    <div class="stats-container" id="li-bai-stats">
                        <!-- 状态数据会由JavaScript动态更新 -->
                        <div class="li-bai-stat">
                            <div class="stat-icon">📜</div>
                            <div class="stat-label">诗心</div>
                            <div class="stat-value" id="stat-poetry">0</div>
                        </div>
                        <div class="li-bai-stat">
                            <div class="stat-icon">🍶</div>
                            <div class="stat-label">酒意</div>
                            <div class="stat-value" id="stat-wine">0</div>
                        </div>
                        <div class="li-bai-stat">
                            <div class="stat-icon">🎮</div>
                            <div class="stat-label">步数</div>
                            <div class="stat-value" id="stat-moves">0</div>
                        </div>
                    </div>
                </div>
                
                <div class="act-indicator">
                    <div class="act-number" id="act-number">4</div>
                    <div class="act-text">第 <span id="act-text">四</span> 幕</div>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-secondary" data-action="go-home">
                    ← 返回首页
                </button>
            </div>
        </div>
    </div>
    
    <!-- 游戏主内容 -->
    <div class="container">
        <!-- 拼图游戏容器 -->
        <div class="puzzle-game-container">
            <h1 class="puzzle-title">第四幕：重构机甲诗篇</h1>
            <p class="puzzle-description">
                将数字按顺序排列，完成机甲诗篇的重构！<br>
                点击数字，让它们从1到8按顺序排列，空格最后。
            </p>
            
            <!-- 拼图网格 -->
            <div id="puzzle-grid" class="puzzle-grid">
                <!-- 拼图格子会由JavaScript动态生成 -->
            </div>
            
            <!-- 游戏控制 -->
            <div class="game-controls">
                <button id="reset-puzzle" class="btn">
                    重置拼图
                </button>
                <button id="hint-puzzle" class="btn btn-secondary">
                    提示 (3/3)
                </button>
                <div class="game-timer" id="timer">
                    ⏱️ 用时: 0秒
                </div>
                <div class="move-counter" id="move-counter">
                    🚶 步数: 0步
                </div>
            </div>
            
            <!-- 完成覆盖层 -->
            <div class="completion-overlay" id="completion-overlay">
                <div class="completion-title">🎉 恭喜通关！</div>
                <div class="completion-text" id="completion-text">
                    机甲诗篇重构完成！
                </div>
                <div class="completion-stats" id="completion-stats">
                    <!-- 游戏统计会由JavaScript动态生成 -->
                </div>
                <div class="game-controls">
                    <button id="play-again" class="btn">
                        再玩一次
                    </button>
                    <button id="to-quiz" class="btn btn-primary">
                        前往知识问答
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 引用公共JavaScript -->
    <script src="../js/common.js"></script>
    
    <!-- 第四幕特有JavaScript（拼图游戏） -->
    <script>
        // 李白线状态变量
        const liBaiState = {
            currentAct: 4,                // 当前幕数（改为4）
            poetryCount: 0,               // 诗心数量
            wineCount: 0,                 // 酒意数量
            quizScore: 0,                 // 答题分数（保留，用于后续）
            hasWineGift: false,          // 是否有侠客行礼物
            gameStats: {
                moves: 0,                // 移动步数
                time: 0,                 // 用时（秒）
                hintsUsed: 0,            // 已用提示数
                isComplete: false        // 是否已完成
            }
        };
        
        // 拼图游戏状态
        let puzzleGame = {
            board: [],                    // 当前棋盘状态
            emptyIndex: 8,               // 空格位置索引
            timerInterval: null,         // 计时器引用
            moveHistory: [],             // 移动历史
            hintsRemaining: 3            // 剩余提示数
        };
        
        // 解决方案
        const solution = [1, 2, 3, 4, 5, 6, 7, 8, ''];
        
        // ==================== 页面初始化 ====================
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('李白线第四幕页面已加载（拼图游戏）');
            
            // 如果是fresh进入，清除旧状态使对话从头开始
            clearActStateOnFreshEntry('liBaiState');
            
            // 加载李白线状态
            loadLiBaiState();
            
            // 初始化拼图游戏
            initPuzzleGame();
            
            // 绑定事件
            bindPuzzleEvents();
            
            // 更新状态显示
            updateLiBaiStats();
        });
        
        // ==================== 状态管理 ====================
        
        // 加载李白线状态
        function loadLiBaiState() {
            try {
                const savedState = localStorage.getItem('liBaiState');
                if (savedState) {
                    const parsed = JSON.parse(savedState);
                    Object.assign(liBaiState, parsed);
                }
                
                // 加载诗心、酒意、答题分数和礼物状态
                liBaiState.poetryCount = parseInt(localStorage.getItem('liBai_poetryCount')) || 0;
                liBaiState.wineCount = parseInt(localStorage.getItem('liBai_wineCount')) || 0;
                liBaiState.quizScore = parseInt(localStorage.getItem('liBai_quizScore')) || 0;
                liBaiState.hasWineGift = localStorage.getItem('liBai_hasWineGift') === 'true';
                
                // 加载游戏统计
                const savedStats = localStorage.getItem('liBai_gameStats');
                if (savedStats) {
                    liBaiState.gameStats = JSON.parse(savedStats);
                }
                
                // 已通关？加载最终属性并锁定（回看模式）
                if (isHeroLineCompleted('liBai')) {
                    const final = getHeroFinalAttrs('liBai');
                    if (final) {
                        liBaiState.poetryCount = final.poem;
                        liBaiState.wineCount = final.wine;
                        liBaiState._locked = true;
                    }
                }
                
                updateLiBaiStats();
                console.log('李白线状态已加载', liBaiState._locked ? '(锁定模式)' : '');
            } catch (error) {
                console.error('加载李白线状态失败:', error);
            }
        }
        
        // 保存李白线状态
        function saveLiBaiState() {
            try {
                localStorage.setItem('liBaiState', JSON.stringify(liBaiState));
                localStorage.setItem('liBai_poetryCount', liBaiState.poetryCount);
                localStorage.setItem('liBai_wineCount', liBaiState.wineCount);
                localStorage.setItem('liBai_quizScore', liBaiState.quizScore);
                localStorage.setItem('liBai_hasWineGift', liBaiState.hasWineGift);
                localStorage.setItem('liBai_gameStats', JSON.stringify(liBaiState.gameStats));
                
                // 同时保存到全局状态
                gameState.stats.poem = liBaiState.poetryCount;
                gameState.stats.wine = liBaiState.wineCount;
                saveGameState();
                
                console.log('李白线状态已保存');
            } catch (error) {
                console.error('保存李白线状态失败:', error);
            }
        }
        
        // 更新李白线状态显示
        function updateLiBaiStats() {
            document.getElementById('stat-poetry').textContent = liBaiState.poetryCount;
            document.getElementById('stat-wine').textContent = liBaiState.wineCount;
            document.getElementById('stat-moves').textContent = liBaiState.gameStats.moves;
            
            // 更新幕数显示
            document.getElementById('act-number').textContent = liBaiState.currentAct;
            const actText = ['一', '二', '三', '四'][liBaiState.currentAct - 1] || liBaiState.currentAct;
            document.getElementById('act-text').textContent = actText;
        }
        
        // ==================== 拼图游戏逻辑 ====================
        
        // 初始化拼图游戏
        function initPuzzleGame() {
            // 如果游戏已经完成，直接显示完成画面
            if (liBaiState.gameStats.isComplete) {
                showCompletionScreen();
                return;
            }
            
            // 创建棋盘
            puzzleGame.board = [1, 2, 3, 4, 5, 6, 7, 8, ''];
            puzzleGame.emptyIndex = 8;
            puzzleGame.moveHistory = [];
            puzzleGame.hintsRemaining = 3;
            
            // 打乱棋盘（保证可解性）
            shufflePuzzle();
            
            // 创建网格
            createPuzzleGrid();
            
            // 更新移动计数器
            updateMoveCounter();
            
            // 更新提示按钮文本
            updateHintButton();
            
            // 启动计时器
            startTimer();
            
            // 解锁第四幕成就（改为第四幕）
            unlockAchievement('libai_puzzle_start', '重构机甲', '进入李白线第四幕拼图游戏');
        }
        
        // 创建拼图网格
        function createPuzzleGrid() {
            const grid = document.getElementById('puzzle-grid');
            grid.innerHTML = '';
            
            puzzleGame.board.forEach((value, index) => {
                const tile = document.createElement('div');
                tile.className = 'puzzle-tile';
                tile.dataset.index = index;
                
                if (value === '') {
                    tile.classList.add('empty');
                    tile.innerHTML = '';
                } else {
                    tile.innerHTML = `<img src="../images/libai_games_pictures/${value}.png" alt="${value}" class="puzzle-tile-img">`;
                }
                
                // 所有格子都添加点击事件，handleTileClick会检查是否是空格
                tile.addEventListener('click', function() {
                    handleTileClick(parseInt(this.dataset.index));
                });
                
                grid.appendChild(tile);
            });
        }
        
        // 打乱拼图（可解性打乱）
        function shufflePuzzle() {
            let moveCount = 0;
            const maxMoves = 100;
            
            while (moveCount < maxMoves) {
                const neighbors = getNeighbors(puzzleGame.emptyIndex);
                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                
                // 交换空格和邻居
                swapTiles(puzzleGame.emptyIndex, randomNeighbor);
                puzzleGame.emptyIndex = randomNeighbor;
                
                moveCount++;
            }
            
            // 记录初始状态到移动历史
            puzzleGame.moveHistory.push([...puzzleGame.board]);
        }
        
        // 获取相邻可移动的位置
        function getNeighbors(index) {
            const neighbors = [];
            const row = Math.floor(index / 3);
            const col = index % 3;
            
            // 上
            if (row > 0) neighbors.push(index - 3);
            // 下
            if (row < 2) neighbors.push(index + 3);
            // 左
            if (col > 0) neighbors.push(index - 1);
            // 右
            if (col < 2) neighbors.push(index + 1);
            
            return neighbors;
        }
        
        // 处理格子点击
        function handleTileClick(index) {
            // 如果游戏已经完成，不处理点击
            if (liBaiState.gameStats.isComplete) return;
            
            // 不能点击空格
            if (index === puzzleGame.emptyIndex) return;
            
            // 检查是否相邻
            const neighbors = getNeighbors(puzzleGame.emptyIndex);
            if (!neighbors.includes(index)) return;
            
            // 交换格子和空格
            swapTiles(index, puzzleGame.emptyIndex);
            
            // 记录移动
            puzzleGame.moveHistory.push([...puzzleGame.board]);
            liBaiState.gameStats.moves++;
            puzzleGame.emptyIndex = index;
            
            // 更新显示
            updatePuzzleDisplay();
            updateMoveCounter();
            updateLiBaiStats();
            
            // 检查是否完成
            checkCompletion();
        }
        
        // 交换两个格子的位置
        function swapTiles(index1, index2) {
            const temp = puzzleGame.board[index1];
            puzzleGame.board[index1] = puzzleGame.board[index2];
            puzzleGame.board[index2] = temp;
            
            // 更新显示 - 不再交换data-index属性，只更新内容
            updatePuzzleDisplay();
        }
        
        // 更新拼图显示
        function updatePuzzleDisplay() {
            const tiles = document.querySelectorAll('.puzzle-tile');
            tiles.forEach((tile) => {
                const index = parseInt(tile.dataset.index);
                const value = puzzleGame.board[index];
                tile.innerHTML = value ? `<img src="../images/libai_games_pictures/${value}.png" alt="${value}" class="puzzle-tile-img">` : '';
                
                // 更新空格状态
                if (value === '') {
                    tile.classList.add('empty');
                } else {
                    tile.classList.remove('empty');
                }
            });
        }
        
        // 更新移动计数器
        function updateMoveCounter() {
            document.getElementById('move-counter').textContent = `🚶 步数: ${liBaiState.gameStats.moves}步`;
        }
        
        // 更新提示按钮
        function updateHintButton() {
            document.getElementById('hint-puzzle').textContent = `提示 (${puzzleGame.hintsRemaining}/3)`;
        }
        
        // 启动计时器
        function startTimer() {
            clearInterval(puzzleGame.timerInterval);
            
            // 重置时间
            if (!liBaiState.gameStats.time) {
                liBaiState.gameStats.time = 0;
            }
            
            puzzleGame.timerInterval = setInterval(() => {
                liBaiState.gameStats.time++;
                document.getElementById('timer').textContent = `⏱️ 用时: ${liBaiState.gameStats.time}秒`;
            }, 1000);
        }
        
        // 检查是否完成
        function checkCompletion() {
            const isSolved = puzzleGame.board.every((value, index) => value === solution[index]);
            
            if (isSolved) {
                // 停止计时器
                clearInterval(puzzleGame.timerInterval);
                
                // 标记游戏为完成
                liBaiState.gameStats.isComplete = true;
                
                // 显示完成画面
                showCompletionScreen();
                
                // 解锁成就和计算奖励
                calculateRewards();
                
                // 保存状态
                saveLiBaiState();
            }
        }
        
        // 计算游戏奖励
        function calculateRewards() {
            // 基础成就
            unlockAchievement('libai_puzzle_complete', '诗篇重构师', '完成李白线第四幕拼图游戏');
            
            // 根据酒意选择解锁酒中仙成就
            if (liBaiState.wineCount >= 2) {
                unlockAchievement('libai_wine_master', '酒中仙', '全程酒意选择占优');
            }
            
            // 如果有侠客行礼物，给予特殊奖励
            if (liBaiState.hasWineGift) {
                liBaiState.wineCount += 2;
            }
        }
        
        // 显示完成画面
        function showCompletionScreen() {
            // 停止计时器
            clearInterval(puzzleGame.timerInterval);
            
            // 更新完成画面内容
            const titleText = document.getElementById('completion-text');
            const statsText = document.getElementById('completion-stats');
            
            // 生成评价
            let evaluation = '';
            if (liBaiState.gameStats.moves <= 50 && liBaiState.gameStats.time <= 60) {
                evaluation = "完美重构！步数精准，速度惊人，真乃诗篇重构大师！";
            } else if (liBaiState.gameStats.moves <= 100 && liBaiState.gameStats.time <= 120) {
                evaluation = "优秀重构！思路清晰，操作娴熟，诗篇完美复原！";
            } else {
                evaluation = "重构完成！虽然费了些功夫，但机甲诗篇终得复原！";
            }
            
            titleText.textContent = evaluation;
            
            // 生成统计数据
            statsText.innerHTML = `
                <strong>游戏统计：</strong><br>
                ✅ 步数：${liBaiState.gameStats.moves}步<br>
                ⏱️ 用时：${liBaiState.gameStats.time}秒<br>
                💡 提示使用：${3 - puzzleGame.hintsRemaining}/3<br>
                📜 诗心奖励：+${Math.max(1, Math.floor((liBaiState.poetryCount - (parseInt(localStorage.getItem('liBai_poetryCount')) || 0)) / 10) * 10)}<br>
                🍶 酒意状态：${liBaiState.wineCount}点<br>
                🎯 答题得分：${liBaiState.quizScore}分
            `;
            
            // 显示完成画面
            document.getElementById('completion-overlay').classList.add('show');
            
            // 解锁最终成就
            unlockAchievement('libai_complete', '李白线全通', '完成李白线全部五幕内容');
        }
        
        // 提供提示
        function provideHint() {
            if (puzzleGame.hintsRemaining <= 0 || liBaiState.gameStats.isComplete) return;
            
            // 减少提示次数
            puzzleGame.hintsRemaining--;
            updateHintButton();
            
            // 找出需要移动的格子
            for (let i = 0; i < puzzleGame.board.length; i++) {
                if (puzzleGame.board[i] !== '' && puzzleGame.board[i] !== solution[i]) {
                    // 高亮显示该格子
                    const tile = document.querySelector(`.puzzle-tile[data-index="${i}"]`);
                    if (tile) {
                        // 高亮效果
                        const originalBackground = tile.style.background;
                        tile.style.background = 'rgba(255, 193, 7, 0.3)';
                        tile.style.boxShadow = '0 0 20px rgba(255, 193, 7, 0.5)';
                        
                        // 3秒后恢复
                        setTimeout(() => {
                            tile.style.background = originalBackground;
                            tile.style.boxShadow = '';
                        }, 3000);
                    }
                    break;
                }
            }
            
            // 保存状态
            saveLiBaiState();
        }
        
        // ==================== 事件绑定 ====================
        
        function bindPuzzleEvents() {
            // 返回首页按钮
            const backHomeBtn = document.querySelector('[data-action="go-home"]');
            if (backHomeBtn) {
                backHomeBtn.addEventListener('click', goHome);
            }
            
            // 重置拼图按钮
            const resetBtn = document.getElementById('reset-puzzle');
            if (resetBtn) {
                resetBtn.addEventListener('click', function() {
                    // 重置游戏统计（保留时间）
                    const currentTime = liBaiState.gameStats.time;
                    liBaiState.gameStats = {
                        moves: 0,
                        time: currentTime,  // 保留时间
                        hintsUsed: 0,
                        isComplete: false
                    };
                    
                    // 重新初始化游戏
                    initPuzzleGame();
                });
            }
            
            // 提示按钮
            const hintBtn = document.getElementById('hint-puzzle');
            if (hintBtn) {
                hintBtn.addEventListener('click', provideHint);
            }
            
            // 再玩一次按钮
            const playAgainBtn = document.getElementById('play-again');
            if (playAgainBtn) {
                playAgainBtn.addEventListener('click', function() {
                    // 完全重置游戏统计
                    liBaiState.gameStats = {
                        moves: 0,
                        time: 0,
                        hintsUsed: 0,
                        isComplete: false
                    };
                    
                    // 重新初始化游戏
                    initPuzzleGame();
                    
                    // 隐藏完成画面
                    document.getElementById('completion-overlay').classList.remove('show');
                });
            }
            
            // 前往知识问答按钮
            const toQuizBtn = document.getElementById('to-quiz');
            if (toQuizBtn) {
                toQuizBtn.addEventListener('click', function() {
                    // 保存拼图游戏状态到LocalStorage，以便知识问答页面读取
                    localStorage.setItem('liBai_poetryCount', liBaiState.poetryCount);
                    localStorage.setItem('liBai_wineCount', liBaiState.wineCount);
                    localStorage.setItem('liBai_quizScore', liBaiState.quizScore);
                    localStorage.setItem('liBai_gameStats', JSON.stringify(liBaiState.gameStats));
                    
                    // 保存进度到第5幕（进入但未领证书）
                    saveProgress('liBai', 4);
                    
                    // 跳转到第五幕（知识问答游戏）
                    window.location.href = "li_bai_act5_puzzle.html";
                });
            }
        }
        // 返回首页函数
        function goHome() {
            console.log('返回首页');
            if (confirm('确定要返回首页吗？未完成的进度可能会丢失。')) {
                window.location.href = "../index.html";
            }
        }
    </script>
</body>
</html>
