<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李白线 · 第五幕 · 诗酒知识问答</title>
    <link rel="icon" type="image/svg+xml" href="../genie.svg">
    <meta name="description" content="李白线第五幕 - 诗酒知识问答考核">
    
    <!-- 引用公共CSS -->
    <link rel="stylesheet" href="../css/style.css">
    
    <!-- 李白线公共CSS -->
    <link rel="stylesheet" href="../css/hero-styles.css">
</head>
<body>
    <!-- 页面顶部 -->
    <div class="li-bai-header">
        <div class="container">
            <div class="hero-header">
                <div class="hero-info">
                    <h1 class="hero-name">
                        <span class="hero-name-icon">🍷</span>
                        李白 · 青莲剑仙
                    </h1>
                    <p class="hero-title">诗酒剑意 · 知识问答考核</p>
                    
                    <div class="stats-container" id="li-bai-stats">
                        <div class="li-bai-stat">
                            <div class="stat-icon">📜</div>
                            <div class="stat-label">诗心</div>
                            <div class="stat-value" id="stat-poetry">0</div>
                        </div>
                        <div class="li-bai-stat">
                            <div class="stat-icon">🍶</div>
                            <div class="stat-label">酒意</div>
                            <div class="stat-value" id="stat-wine">0</div>
                        </div>
                        <div class="li-bai-stat">
                            <div class="stat-icon">✅</div>
                            <div class="stat-label">答题</div>
                            <div class="stat-value" id="stat-quiz">0/5</div>
                        </div>
                    </div>
                </div>
                
                <div class="act-indicator">
                    <div class="act-number" id="act-number">5</div>
                    <div class="act-text">第 <span id="act-text">五</span> 幕</div>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-secondary" data-action="go-home">
                    ← 返回首页
                </button>
            </div>
        </div>
    </div>
    
    <!-- 游戏主内容 -->
    <div class="container">
        <div class="quiz-container" id="quiz-container">
            <!-- 内容会由JavaScript动态生成 -->
            <div id="quiz-content">
                <!-- 开场内容 -->
                <h2 class="quiz-title">第五幕：诗酒知识问答</h2>
                <p class="quiz-subtitle">检验你对前三幕内容的掌握程度</p>
                
                <div id="opening-content" style="text-align: center;">
                    <!-- 对话容器（用于动态对话） -->
                    <div id="dialogue-log" class="dialogue-log" style="height: 150px; max-height: 200px; overflow-y: auto; padding: 18px; border: 1px solid var(--li-bai-color-light); border-radius: 8px; background: rgba(20, 20, 30, 0.9); margin-bottom: 25px; text-align: left; color: rgba(255, 255, 255, 0.95);">
                        <!-- 对话会动态生成 -->
                    </div>
                    
                    <p style="color: rgba(255, 255, 255, 0.8); font-size: 1.2rem; line-height: 1.6; margin-bottom: 30px;">
                        本卷共五题，皆为前三幕所历之事。<br>
                        每题皆基于游历所见，仔细回想，选出正确答案。
                    </p>
                    
                    <p style="color: var(--li-bai-color); font-size: 1.3rem; font-weight: bold; margin-bottom: 40px;">
                        李白：且将诗酒试英才，来吧！
                    </p>
                    
                    <button id="start-quiz-btn" class="quiz-btn" style="padding: 15px 50px; font-size: 1.2rem;">
                        开始问答
                    </button>
                </div>
                
                <!-- 问答界面（初始隐藏） -->
                <div id="question-container" style="display: none;">
                    <!-- 对话容器（用于答案反馈） -->
                    <div id="quiz-dialogue-log" class="dialogue-log" style="height: 100px; max-height: 150px; overflow-y: auto; padding: 15px; border: 1px solid var(--li-bai-color-light); border-radius: 8px; background: rgba(20, 20, 30, 0.9); margin-bottom: 20px; text-align: left; color: rgba(255, 255, 255, 0.95);">
                        <!-- 李白的答案反馈会动态生成 -->
                    </div>
                    
                    <div class="question-number" id="question-number">第 1 题 / 共 5 题</div>
                    <div class="question-text" id="question-text">题目加载中...</div>
                    
                    <div class="options-container" id="options-container">
                        <!-- 选项会动态生成 -->
                    </div>
                    
                    <div class="answer-feedback" id="answer-feedback">
                        <!-- 答案解析会动态生成 -->
                    </div>
                    
                    <div class="quiz-navigation">
                        <div class="quiz-progress" id="quiz-progress">已答：0/5</div>
                        <button id="next-question-btn" class="quiz-btn" disabled>下一题</button>
                    </div>
                </div>
                
                <!-- 结果界面（初始隐藏） -->
                <div id="results-container" style="display: none;">
                    <!-- 结果会动态生成 -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- 引用公共JavaScript -->
    <script src="../js/common.js"></script>
    
    <!-- 第五幕特有JavaScript（知识问答） -->
    <script>
        // 李白线状态变量
        const liBaiState = {
            currentAct: 5,
            poetryCount: 0,
            wineCount: 0,
            quizStarted: false,
            currentQuestion: 0,
            userAnswers: [],
            quizScore: 0
        };
        
        // 知识问答题目（诗酒知识问答）
        const quizQuestions = [
            {
                question: "鲁班七号全球首展在哪里举办？",
                options: [
                    "A. 成都IFS七层",
                    "B. 武侯祠"
                ],
                correctAnswer: 0,
                correctFeedback: "不错不错，看来你记性尚可！",
                wrongFeedback: "哎呀，这都忘了？首展在成都IFS七层啊！",
                explanation: "鲁班七号全球首展在成都IFS七层举办，这是西南首个王者荣耀机甲主题展。"
            },
            {
                question: "宽窄巷子的鲁班茶肆是什么店？",
                options: [
                    "A. 传统木匠铺",
                    "B. 王者荣耀文创店"
                ],
                correctAnswer: 1,
                correctFeedback: "好眼光！文创与古巷，本是天作之合。",
                wrongFeedback: "木匠铺？你可太小看鲁班茶肆了！那是全国首家王者荣耀文创店。",
                explanation: "鲁班茶肆是全国首家王者荣耀文创店，采用「前店后厂」设计，前厅售周边，后院可饮茶观赛。"
            },
            {
                question: "Daji Cafe 是什么主题餐厅？",
                options: [
                    "A. 李白主题餐厅",
                    "B. 妲己主题餐厅"
                ],
                correctAnswer: 1,
                correctFeedback: "哈！果然识得此店，粉红洛丽塔风格令人印象深刻。",
                wrongFeedback: "李白主题餐厅？我虽爱酒，但这家店可不是我的风格。那是妲己主题餐厅！",
                explanation: "Daji Cafe是妲己主题餐厅，采用粉红洛丽塔风格，与东郊记忆的铁血厂房形成鲜明对比。"
            },
            {
                question: "鲁班茶肆的「王者请坐Bar」里可以做什么？",
                options: [
                    "A. 观看KPL赛事",
                    "B. 玩木匠手工"
                ],
                correctAnswer: 0,
                correctFeedback: "正是！饮茶观赛，人生一大乐事也。",
                wrongFeedback: "木匠手工？那是后院观赛的地方——「王者请坐Bar」！",
                explanation: "「王者请坐Bar」是茶肆后院改造的茶座，可以饮茶观赛，感受古宅幽深与赛事热烈的奇妙结合。"
            },
            {
                question: "在东郊记忆的Daji Cafe，除了拍照还能享受什么特色？",
                options: [
                    "A. 全息投影技术表演",
                    "B. 妲己拉花咖啡和狐狸尾座椅"
                ],
                correctAnswer: 1,
                correctFeedback: "妙哉！妲己拉花配狐狸尾座椅，恍如置身王者峡谷野区！",
                wrongFeedback: "全息投影？你想多了！那家店的特色是妲己拉花咖啡和狐狸尾座椅。",
                explanation: "妲己拉花的咖啡和狐狸尾座椅让人恍如置身王者峡谷野区，是餐厅的特色亮点。"
            }
        ];

        // ==================== 对话系统 ====================
        
        // 添加对话
        function addLiBaiDialogue(text, speaker = '玩家') {
            // 尝试找到对话容器（优先使用问答界面的，其次使用开场界面的）
            let dialogueLog = document.getElementById('quiz-dialogue-log');
            if (!dialogueLog) {
                dialogueLog = document.getElementById('dialogue-log');
            }
            
            if (!dialogueLog) return;
            
            const messageDiv = document.createElement('div');
            
            // 根据说话者选择样式类
            messageDiv.className = speaker === '李白' ? 'li-bai-message' : 'player-message';
            
            const speakerName = speaker === '李白' ? '李白' : '玩家';
            messageDiv.innerHTML = `<strong>${speakerName}：</strong> ${text}`;
            
            dialogueLog.appendChild(messageDiv);
            
            // 自动滚动到底部
            dialogueLog.scrollTop = dialogueLog.scrollHeight;
        }

        // ==================== 页面初始化 ====================
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('李白线第五幕页面已加载（知识问答）');
            
            // 如果是fresh进入，清除旧状态使对话从头开始
            clearActStateOnFreshEntry('liBaiState');
            
            // 加载李白线状态
            loadLiBaiState();
            
            // 绑定事件
            bindQuizEvents();
            
            // 添加开场对话
            setTimeout(() => {
                addLiBaiDialogue("三站已毕，你游历了IFS、宽窄巷子、东郊记忆，所学几何？我有一卷考题，皆出自你此行所见所闻。答对五题，方算不虚此行。", "李白");
            }, 500);
            
            // 确保页面可见
            document.body.style.display = 'block';
        });
        
        // ==================== 状态管理 ====================
        
        // 加载李白线状态
        function loadLiBaiState() {
            try {
                // 每次进入都重置答题状态，只保留诗心和酒意
                liBaiState.poetryCount = parseInt(localStorage.getItem('liBai_poetryCount')) || 0;
                liBaiState.wineCount = parseInt(localStorage.getItem('liBai_wineCount')) || 0;
                liBaiState.currentAct = 5;
                liBaiState.quizStarted = false;
                liBaiState.currentQuestion = 0;
                liBaiState.userAnswers = [];
                liBaiState.quizScore = 0;
                
                // 已通关？加载最终属性并锁定（回看模式）
                if (isHeroLineCompleted('liBai')) {
                    const final = getHeroFinalAttrs('liBai');
                    if (final) {
                        liBaiState.poetryCount = final.poem;
                        liBaiState.wineCount = final.wine;
                        liBaiState._locked = true;
                    }
                }
                
                updateLiBaiStats();
                console.log('李白线状态已加载', liBaiState._locked ? '(锁定模式)' : '');
            } catch (error) {
                console.error('加载李白线状态失败:', error);
            }
        }
        
        // 更新李白线状态显示
        function updateLiBaiStats() {
            const poetryElement = document.getElementById('stat-poetry');
            const wineElement = document.getElementById('stat-wine');
            const quizElement = document.getElementById('stat-quiz');
            
            const answeredCount = liBaiState.userAnswers.filter(answer => answer !== undefined).length;
            
            if (poetryElement) poetryElement.textContent = liBaiState.poetryCount;
            if (wineElement) wineElement.textContent = liBaiState.wineCount;
            if (quizElement) quizElement.textContent = `${answeredCount}/${quizQuestions.length}`;
            
            // 更新幕数显示
            const actNumber = document.getElementById('act-number');
            const actText = document.getElementById('act-text');
            if (actNumber) actNumber.textContent = liBaiState.currentAct;
            if (actText) actText.textContent = ['一', '二', '三', '四', '五'][liBaiState.currentAct - 1] || liBaiState.currentAct;
        }
        
        // ==================== 问答系统 ====================
        
        // 开始问答
        function startQuiz() {
            liBaiState.quizStarted = true;
            liBaiState.currentQuestion = 0;
            liBaiState.userAnswers = [];
            liBaiState.quizScore = 0;
            
            // 隐藏开场内容，显示第一题
            document.getElementById('opening-content').style.display = 'none';
            document.getElementById('question-container').style.display = 'block';
            
            // 显示第一题
            showQuestion(0);
        }
        
        // 显示题目
        function showQuestion(questionIndex) {
            const question = quizQuestions[questionIndex];
            
            // 更新题目编号
            document.getElementById('question-number').textContent = `第 ${questionIndex + 1} 题 / 共 ${quizQuestions.length} 题`;
            
            // 更新题目文本
            document.getElementById('question-text').textContent = question.question;
            
            // 清空选项容器
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            // 添加选项
            question.options.forEach((optionText, index) => {
                const optionElement = document.createElement('button');
                optionElement.className = 'quiz-option';
                optionElement.textContent = optionText;
                
                // 检查是否已经回答过此题
                if (liBaiState.userAnswers[questionIndex] !== undefined) {
                    // 已回答，显示结果状态
                    optionElement.disabled = true;
                    
                    if (index === question.correctAnswer) {
                        optionElement.classList.add('correct');
                    } else if (index === liBaiState.userAnswers[questionIndex]) {
                        optionElement.classList.add('incorrect');
                    }
                    
                    if (index === liBaiState.userAnswers[questionIndex]) {
                        optionElement.classList.add('selected');
                    }
                } else {
                    // 未回答，添加点击事件
                    optionElement.addEventListener('click', () => {
                        selectAnswer(questionIndex, index);
                    });
                }
                
                optionsContainer.appendChild(optionElement);
            });
            
            // 更新导航按钮
            updateNavigationButtons(questionIndex);
            
            // 显示或隐藏答案解析
            const feedbackElement = document.getElementById('answer-feedback');
            if (liBaiState.userAnswers[questionIndex] !== undefined && question.explanation) {
                feedbackElement.innerHTML = `<strong>📚 解析：</strong>${question.explanation}`;
                feedbackElement.classList.add('show');
            } else {
                feedbackElement.classList.remove('show');
            }
        }
        
        // 选择答案
        function selectAnswer(questionIndex, answerIndex) {
            // 记录用户答案
            liBaiState.userAnswers[questionIndex] = answerIndex;
            
            // 检查是否正确
            const isCorrect = answerIndex === quizQuestions[questionIndex].correctAnswer;
            if (isCorrect) {
                liBaiState.quizScore++;
            }
            
            // 禁用所有选项并显示结果状态
            const options = document.querySelectorAll('.quiz-option');
            options.forEach((option, index) => {
                option.disabled = true;
                
                if (index === quizQuestions[questionIndex].correctAnswer) {
                    option.classList.add('correct');
                } else if (index === answerIndex && !isCorrect) {
                    option.classList.add('incorrect');
                }
                
                if (index === answerIndex) {
                    option.classList.add('selected');
                }
            });
            
            // 显示李白的即时反馈（使用对话系统）
            const question = quizQuestions[questionIndex];
            let liBaiFeedback = '';
            
            if (isCorrect) {
                liBaiFeedback = question.correctFeedback || "不错不错！";
            } else {
                liBaiFeedback = question.wrongFeedback || "哎呀，答错了！";
            }
            
            // 使用对话系统显示李白的反馈
            addLiBaiDialogue(liBaiFeedback, '李白');
            
            // 显示答案解析
            const feedbackElement = document.getElementById('answer-feedback');
            if (question.explanation) {
                feedbackElement.innerHTML = `<strong>📚 解析：</strong>${question.explanation}`;
                feedbackElement.classList.add('show');
            } else {
                feedbackElement.classList.remove('show');
            }
            
            // 更新导航按钮
            updateNavigationButtons(questionIndex);
            
            // 更新进度和状态显示
            updateProgress();
            updateLiBaiStats();
        }
        
        // 更新导航按钮
        function updateNavigationButtons(questionIndex) {
            const nextBtn = document.getElementById('next-question-btn');
            
            if (liBaiState.userAnswers[questionIndex] !== undefined) {
                // 已回答此题，启用下一题按钮
                nextBtn.disabled = false;
                
                if (questionIndex === quizQuestions.length - 1) {
                    // 最后一题，修改按钮文本
                    nextBtn.textContent = '查看结果';
                    nextBtn.onclick = showResults;
                } else {
                    // 不是最后一题
                    nextBtn.textContent = '下一题';
                    nextBtn.onclick = () => {
                        showQuestion(questionIndex + 1);
                    };
                }
            } else {
                // 未回答此题，禁用下一题按钮
                nextBtn.disabled = true;
            }
        }
        
        // 更新进度显示
        function updateProgress() {
            const answeredCount = liBaiState.userAnswers.filter(answer => answer !== undefined).length;
            document.getElementById('quiz-progress').textContent = `已答：${answeredCount}/${quizQuestions.length}`;
        }
        
        // 显示结果
        function showResults() {
            // 隐藏问题容器，显示结果容器
            document.getElementById('question-container').style.display = 'none';
            document.getElementById('results-container').style.display = 'block';
            
            // 计算结果
            const score = liBaiState.quizScore;
            const total = quizQuestions.length;
            const percentage = Math.round((score / total) * 100);
            
            // 根据得分给予评价和奖励
            let rating = '';
            let description = '';
            let poetryBonus = 0;
            let wineBonus = 0;
            
            if (percentage === 100) {
                rating = '博闻强识';
                description = '五题全对！你对游蜀之行的所见所闻了然于心，真乃诗酒才子！古今风物，尽收眼底，可称当代李太白。';
                poetryBonus = 3;
                wineBonus = 2;
            } else if (percentage >= 80) {
                rating = '诗酒才子';
                description = '答对四题，表现优异。你对游历中的所见所闻已有深刻记忆，但某些细节仍需回味。';
                poetryBonus = 2;
                wineBonus = 1;
            } else if (percentage >= 60) {
                rating = '尚可一饮';
                description = '答对三题，勉强及格。你掌握了基本见闻，但距离真正的"诗酒"之道尚有距离。需再多游历、多品鉴。';
                poetryBonus = 1;
                wineBonus = 1;
            } else {
                rating = '再来一壶';
                description = '答对不足三题，尚未合格。你对游历之所见尚浅。建议复盘前三幕，重新领略蜀地风华。';
                poetryBonus = 0;
                wineBonus = 0;
            }
            
            // 添加属性奖励（已通关时跳过，避免覆盖最终值）
            if (!liBaiState._locked) {
                liBaiState.poetryCount += poetryBonus;
                liBaiState.wineCount += wineBonus;
            }
            
            // 生成结果HTML
            const resultsHTML = `
                <div class="results-container">
                    <h2 class="results-title">问答完成</h2>
                    <div class="results-score">${score}/${total}</div>
                    <div class="results-subtitle">正确率 ${percentage}%</div>
                    <div class="results-rating">${rating}</div>
                    
                    <p class="results-description">${description}</p>
                    
                    <div style="background: rgba(96, 224, 255, 0.1); padding: 20px; border-radius: 10px; margin-bottom: 30px; max-width: 500px; margin-left: auto; margin-right: auto;">
                        <div style="color: var(--li-bai-color); font-weight: bold; margin-bottom: 10px;">本场奖励</div>
                        <div style="display: flex; justify-content: space-around;">
                            <div>
                                <div style="font-size: 2rem; color: white;">+${poetryBonus}</div>
                                <div style="color: rgba(255, 255, 255, 0.7);">诗心</div>
                            </div>
                            <div>
                                <div style="font-size: 2rem; color: white;">+${wineBonus}</div>
                                <div style="color: rgba(255, 255, 255, 0.7);">酒意</div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="margin-top: 40px;">
                        <p style="color: rgba(255, 255, 255, 0.7); margin-bottom: 20px;">恭喜完成李白线全部内容！</p>
                        <button id="view-certificate-btn" class="quiz-btn" style="padding: 15px 50px; font-size: 1.2rem;">
                            领取结业证书
                        </button>
                    </div>
                </div>
            `;
            
            document.getElementById('results-container').innerHTML = resultsHTML;
            
            // 绑定查看证书按钮事件
            document.getElementById('view-certificate-btn').addEventListener('click', viewCertificate);
            
            // 更新状态显示
            updateLiBaiStats();
            
            // 保存状态
            localStorage.setItem('liBai_poetryCount', liBaiState.poetryCount);
            localStorage.setItem('liBai_wineCount', liBaiState.wineCount);
        }
        
        // 查看证书
        function viewCertificate() {
            // 保存答题分数
            localStorage.setItem('liBai_quizScore', liBaiState.quizScore * 10);
            localStorage.setItem('liBai_poetryCount', liBaiState.poetryCount);
            localStorage.setItem('liBai_wineCount', liBaiState.wineCount);
            
            // 标记李白线已通关（5幕全完成）
            saveProgress('liBai', 5);
            
            // 检查全能学徒成就（体验所有三条英雄路线）
            checkAllHeroesAchievement();
            
            // 检查完美收集者成就（解锁所有成就）
            checkAllAchievementsAchievement();
            
            // 保存游魂数据（诗心+酒意综合值）
            saveSoulData('liBai', {
                poem: liBaiState.poetryCount,
                wine: liBaiState.wineCount,
                soulValue: liBaiState.poetryCount + liBaiState.wineCount
            });
            
            // 计算称号
            let title = "诗酒电竞师";
            
            if (liBaiState.poetryCount >= liBaiState.wineCount * 2) {
                title = "青莲诗仙";
            } else if (liBaiState.wineCount >= liBaiState.poetryCount * 2) {
                title = "酒中剑仙";
            } else if (liBaiState.quizScore * 10 >= 40) {
                title = "博闻电竞师";
            }
            
            // 跳转到证书页面，传递参数
            const params = new URLSearchParams({
                title: title,
                hero: '李白',
                poetry: liBaiState.poetryCount,
                wine: liBaiState.wineCount,
                quiz: liBaiState.quizScore * 10,
                moves: 0,
                time: 0
            });
            
            window.location.href = `../certificate.html?${params.toString()}`;
        }
        
        // ==================== 事件绑定 ====================
        
        function bindQuizEvents() {
            // 开始问答按钮
            const startQuizBtn = document.getElementById('start-quiz-btn');
            if (startQuizBtn) {
                startQuizBtn.addEventListener('click', startQuiz);
            }
            
            // 返回首页按钮（common.js已自动绑定，无需重复绑定）
        }
    </script>
</body>
</html>
