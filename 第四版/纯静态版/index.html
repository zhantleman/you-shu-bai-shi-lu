<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游蜀拜师录 · 王者荣耀电竞文旅</title>
    <link rel="icon" type="image/svg+xml" href="genie.svg">
    <meta name="description" content="游蜀拜师录 — 王者荣耀电竞文旅互动网页游戏">
    
    <!-- 引用公共CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- 页面特有样式 -->
    <style>
        /* ========================================
           首页 · 英雄选择仪式场
           ======================================== */

        /* ===== 全屏舞台容器 ===== */
        .home-hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
            background: #0a0a0a;
        }

        /* 背景层：主界面背景图 */
        .home-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('images/home-bg.jpeg') center center / cover no-repeat;
            opacity: 0.35;
            filter: brightness(0.6) saturate(1.2);
            pointer-events: none;
        }

        /* 背景层：纵深暗角 + 聚焦中心光 */
        .home-hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse 70% 50% at 50% 55%, rgba(96, 224, 255, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 100% 80% at 50% 50%, transparent 30%, rgba(5, 5, 10, 0.7) 70%, rgba(5, 5, 10, 0.95) 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* 粒子容器 */
        .particles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: rgba(96, 224, 255, 0.5);
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-100vh) translateX(30px);
                opacity: 0;
            }
        }

        /* ===== 内容层 ===== */
        .hero-content {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 1200px;
            width: 100%;
        }

        /* ===== 右上角图标按钮组 ===== */
        .corner-nav {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .corner-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .corner-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(96, 224, 255, 0.4);
            color: #fff;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(96, 224, 255, 0.2);
        }

        .corner-btn .tooltip {
            position: absolute;
            top: 110%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 30, 0.95);
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .corner-btn:hover .tooltip {
            opacity: 1;
        }

        /* ===== 标题区域 ===== */
        .hero-title {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(45deg, #60E0FF, #D4AF37, #FF8C00, #C82828);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 3s ease-in-out infinite alternate;
            letter-spacing: 0.15em;
            position: relative;
        }

        /* 标题光晕层 */
        .hero-title::after {
            content: '游蜀拜师录';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(45deg, #60E0FF, #D4AF37, #FF8C00, #C82828);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: blur(20px);
            opacity: 0.4;
            animation: titleGlow 3s ease-in-out infinite alternate;
            pointer-events: none;
            letter-spacing: 0.15em;
        }

        /* 装饰横幅 — 蜀地纹样 */
        .hero-banner {
            display: inline-flex;
            align-items: center;
            gap: 16px;
            padding: 10px 36px;
            margin: 16px auto 24px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(96, 224, 255, 0.06) 15%,
                rgba(212, 175, 55, 0.08) 50%,
                rgba(96, 224, 255, 0.06) 85%,
                transparent 100%);
            border-top: 1px solid rgba(212, 175, 55, 0.25);
            border-bottom: 1px solid rgba(212, 175, 55, 0.25);
            position: relative;
        }

        .hero-banner::before,
        .hero-banner::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.4));
        }
        .hero-banner::before { left: -30px; }
        .hero-banner::after { right: -30px; transform: rotate(180deg); }

        .banner-deco {
            font-size: 0.9rem;
            opacity: 0.5;
        }

        .hero-slogan {
            font-size: 1.1rem;
            color: rgba(212, 175, 55, 0.85);
            letter-spacing: 0.3em;
            font-weight: 500;
        }

        /* 描述文字 — 精炼过渡 */
        .hero-description {
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 50px;
            font-size: 0.95rem;
            line-height: 1.8;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ===== 导师卡片区 ===== */
        .mentors-section {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 1.6rem;
            margin-bottom: 50px;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
            letter-spacing: 0.1em;
        }

        /* 弧形舞台排列 */
        .mentor-grid {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 36px;
            perspective: 1200px;
        }

        .mentor-card-wrapper {
            position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            /* 弧形排列：两侧后退，中间前移 */
        }

        .mentor-card-wrapper:nth-child(1) {
            transform: rotateY(8deg) translateZ(-40px) translateY(12px);
        }
        .mentor-card-wrapper:nth-child(2) {
            transform: rotateY(0deg) translateZ(30px) translateY(-8px);
            z-index: 2;
        }
        .mentor-card-wrapper:nth-child(3) {
            transform: rotateY(-8deg) translateZ(-40px) translateY(12px);
        }

        /* 聚光灯效果 */
        .mentor-card-wrapper::after {
            content: '';
            position: absolute;
            top: -140px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 180px;
            background: conic-gradient(from 180deg at 50% 0%,
                transparent 38%,
                rgba(96, 224, 255, 0.07) 45%,
                rgba(255, 255, 255, 0.06) 50%,
                rgba(96, 224, 255, 0.07) 55%,
                transparent 62%);
            clip-path: polygon(40% 0%, 60% 0%, 100% 100%, 0% 100%);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            z-index: 10;
        }

        .mentor-card-wrapper:hover::after {
            opacity: 1;
        }

        /* 悬停：当前卡片放大上浮，非悬停卡片压暗 */
        .mentor-grid:hover .mentor-card-wrapper {
            filter: brightness(0.55);
            transform: scale(0.96);
        }
        .mentor-grid:hover .mentor-card-wrapper:nth-child(1) {
            transform: rotateY(8deg) translateZ(-50px) translateY(12px) scale(0.96);
        }
        .mentor-grid:hover .mentor-card-wrapper:nth-child(3) {
            transform: rotateY(-8deg) translateZ(-50px) translateY(12px) scale(0.96);
        }

        .mentor-grid:hover .mentor-card-wrapper:hover {
            filter: brightness(1);
            transform: scale(1.05) translateY(-12px) !important;
            z-index: 10;
        }

        .mentor-highlight {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 20px;
            background: linear-gradient(45deg, #60E0FF, #C82828, #D4AF37);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .mentor-card-wrapper:hover .mentor-highlight {
            opacity: 0.35;
        }

        .mentor-icon {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        /* ===== 卡牌式导师卡片布局 ===== */
        .mentor-card {
            padding: 0 !important;
            overflow: hidden;
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mentor-banner {
            width: 100%;
            height: 220px;
            position: relative;
            overflow: hidden;
        }

        .banner-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            transition: transform 0.6s ease;
        }

        .mentor-card-wrapper:hover .banner-img {
            transform: scale(1.1);
        }

        .banner-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, rgba(10, 10, 10, 0.95) 0%, rgba(10, 10, 10, 0.4) 60%, transparent 100%);
            pointer-events: none;
        }

        .mentor-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 15px rgba(96, 224, 255, 0.4), 0 4px 12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            margin: -44px auto 0;
            position: relative;
            z-index: 2;
            transition: box-shadow 0.4s ease, transform 0.4s ease;
        }

        .mentor-card-wrapper:hover .mentor-avatar {
            box-shadow: 0 0 30px rgba(96, 224, 255, 0.7), 0 4px 16px rgba(0, 0, 0, 0.6);
            transform: scale(1.08);
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .mentor-info {
            padding: 12px 24px 24px;
            text-align: center;
        }

        .mentor-description {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 25px;
            line-height: 1.6;
            min-height: 80px;
        }

        .mentor-progress {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mentor-progress .progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .mentor-progress .progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .mentor-progress .progress-text {
            white-space: nowrap;
        }

        /* ===== 游魂鉴定 — 独立居中 ===== */
        .soul-section {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 50px;
            width: 100%;
        }

        .soul-btn-wrapper {
            display: inline-block;
        }

        .soul-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.9);
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
        }

        /* 锁定态悬停tooltip */
        .soul-btn-tooltip {
            position: absolute;
            top: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) translateY(-5px);
            background: rgba(168, 85, 247, 0.95);
            color: white;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 0.8rem;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
            z-index: 100;
        }

        .soul-btn-tooltip::before {
            content: '';
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-bottom: 5px solid rgba(168, 85, 247, 0.95);
        }

        /* 只有锁定态悬停才显示tooltip */
        .soul-btn.locked:hover .soul-btn-tooltip {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .soul-btn.unlocked {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(96, 224, 255, 0.2));
            border-color: rgba(168, 85, 247, 0.5);
            cursor: pointer;
            animation: soulGlow 2s ease-in-out infinite alternate;
        }

        .soul-btn.unlocked:hover {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.35), rgba(96, 224, 255, 0.35));
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 10px 40px rgba(168, 85, 247, 0.3), 0 0 60px rgba(168, 85, 247, 0.15);
        }

        /* 解锁破碎锁链动画 */
        .soul-btn.unlocked .lock-icon {
            animation: chainBreak 0.8s ease-out forwards;
        }

        @keyframes chainBreak {
            0% { transform: scale(1); opacity: 1; }
            30% { transform: scale(1.3) rotate(15deg); opacity: 0.8; }
            60% { transform: scale(0.5) rotate(-30deg); opacity: 0.3; }
            100% { transform: scale(0) rotate(45deg); opacity: 0; display: none; }
        }

        .soul-btn.locked {
            opacity: 0.35;
            cursor: not-allowed;
            filter: grayscale(0.8);
        }

        .soul-btn.locked:hover {
            opacity: 0.45;
        }

        /* 锁定态脉冲暗示 */
        .soul-btn.locked::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 16px;
            border: 1px solid rgba(168, 85, 247, 0.15);
            animation: soulPulse 3s ease-in-out infinite;
        }

        @keyframes soulPulse {
            0%, 100% { opacity: 0; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.04); }
        }

        .soul-btn .soul-icon {
            font-size: 1.3rem;
        }

        .soul-btn .lock-icon {
            font-size: 0.8rem;
            position: absolute;
            top: 6px;
            right: 8px;
            opacity: 0.6;
        }

        @keyframes soulGlow {
            0% { box-shadow: 0 0 5px rgba(168, 85, 247, 0.1); }
            100% { box-shadow: 0 0 25px rgba(168, 85, 247, 0.35), 0 0 50px rgba(168, 85, 247, 0.1); }
        }

        /* ===== 续玩弹窗 ===== */
        .resume-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .resume-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .resume-dialog {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .resume-overlay.active .resume-dialog {
            transform: scale(1);
        }

        .resume-dialog h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #fff;
        }

        .resume-dialog p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .resume-dialog .act-name {
            color: #60E0FF;
        }

        .resume-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .resume-btn {
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            width: 100%;
        }

        .resume-btn-primary {
            background: linear-gradient(135deg, #60E0FF, #0066CC);
            color: white;
        }

        .resume-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(96, 224, 255, 0.3);
        }

        .resume-btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .resume-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            color: white;
        }

        .resume-btn-cancel {
            background: transparent;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
        }

        .resume-btn-cancel:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        /* ===== Footer 弱化 ===== */
        .footer {
            margin-top: 80px;
            text-align: right;
            color: rgba(255, 255, 255, 0.2);
            padding: 20px;
            width: 100%;
        }

        .footer-text {
            font-size: 0.7rem;
            letter-spacing: 0.05em;
        }

        /* ===== 标题光晕动画（增强版） ===== */
        @keyframes titleGlow {
            0% {
                filter: brightness(1) drop-shadow(0 0 15px rgba(96, 224, 255, 0.4)) drop-shadow(0 0 40px rgba(212, 175, 55, 0.15));
            }
            100% {
                filter: brightness(1.25) drop-shadow(0 0 25px rgba(96, 224, 255, 0.6)) drop-shadow(0 0 60px rgba(212, 175, 55, 0.25));
            }
        }

        /* ===== 移动端响应式 ===== */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2.6rem;
                letter-spacing: 0.1em;
            }

            .hero-title::after {
                font-size: 2.6rem;
                letter-spacing: 0.1em;
            }

            .hero-slogan {
                font-size: 0.9rem;
                letter-spacing: 0.2em;
            }

            .hero-banner {
                padding: 8px 24px;
                gap: 10px;
            }

            .banner-deco {
                font-size: 0.7rem;
            }

            .hero-description {
                font-size: 0.85rem;
                margin-bottom: 35px;
            }

            .mentor-grid {
                flex-direction: column;
                align-items: center;
                gap: 24px;
                perspective: none;
            }

            .mentor-card-wrapper:nth-child(1),
            .mentor-card-wrapper:nth-child(2),
            .mentor-card-wrapper:nth-child(3) {
                transform: none !important;
            }

            .mentor-grid:hover .mentor-card-wrapper {
                filter: none;
                transform: none !important;
            }

            .mentor-grid:hover .mentor-card-wrapper:hover {
                transform: scale(1.02) translateY(-6px) !important;
            }

            .mentor-card-wrapper {
                max-width: 360px;
                width: 100%;
            }

            .mentor-banner {
                height: 200px;
            }

            .mentor-avatar {
                width: 70px;
                height: 70px;
                margin-top: -38px;
            }

            .mentor-info {
                padding: 10px 18px 20px;
            }

            .mentor-name {
                font-size: 1.4rem;
            }

            .corner-nav {
                top: 12px;
                right: 12px;
                gap: 8px;
            }

            .corner-btn {
                width: 38px;
                height: 38px;
                font-size: 1rem;
            }

            .soul-section {
                margin-top: 35px;
            }

            .section-title {
                font-size: 1.3rem;
                margin-bottom: 35px;
            }
        }

        @media (max-width: 480px) {
            .hero-title {
                font-size: 2rem;
            }
            .hero-title::after {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- 右上角功能图标 -->
    <div class="corner-nav">
        <button class="corner-btn" data-action="achievements">
            🏆
            <span class="tooltip">成就陈列馆</span>
        </button>
        <button class="corner-btn" data-action="settings">
            ⚙️
            <span class="tooltip">设置</span>
        </button>
    </div>

    <!-- 首页主内容 -->
    <div class="home-hero">
        <!-- 粒子层 -->
        <div class="particles-container" id="particles"></div>

        <div class="hero-content">
            <h1 class="hero-title">游蜀拜师录</h1>

            <!-- 蜀地纹样装饰横幅 -->
            <div class="hero-banner">
                <span class="banner-deco">☁</span>
                <span class="hero-slogan">寻访三国 · 电竞新章</span>
                <span class="banner-deco">☁</span>
            </div>

            <p class="hero-description">
                穿越千年，选择一位英雄导师，<br>
                在诗、酒、剑、智、勇的交织中，探寻属于你的传奇。
            </p>

            <div class="mentors-section">
                <h2 class="section-title">选择一位导师，开启你的旅程</h2>

                <div class="mentor-grid">
                    <!-- 李白 -->
                    <div class="mentor-card-wrapper">
                        <div class="mentor-highlight"></div>
                        <div class="mentor-card" data-hero="liBai">
                            <div class="mentor-banner">
                                <img src="images/libai-full.png" alt="李白全身立绘" class="banner-img">
                                <div class="banner-overlay"></div>
                            </div>
                            <div class="mentor-avatar">
                                <img src="images/libai-avatar.jpg" alt="李白头像" class="avatar-img">
                            </div>
                            <div class="mentor-info">
                                <h3 class="mentor-name">李白</h3>
                                <p class="mentor-title">青莲剑仙 · 诗酒剑意</p>
                                <p class="mentor-description">诗心与酒意的融合，创造无限可能。跟随剑仙，探索成都的诗意与文化。</p>
                                <button class="mentor-btn" data-hero="liBai">选择李白</button>
                            </div>
                        </div>
                    </div>

                    <!-- 诸葛亮 -->
                    <div class="mentor-card-wrapper">
                        <div class="mentor-highlight"></div>
                        <div class="mentor-card" data-hero="zhugeLiang">
                            <div class="mentor-banner">
                                <img src="images/zhuge-full.png" alt="诸葛亮全身立绘" class="banner-img">
                                <div class="banner-overlay"></div>
                            </div>
                            <div class="mentor-avatar">
                                <img src="images/zhuge-avatar.jpg" alt="诸葛亮头像" class="avatar-img">
                            </div>
                            <div class="mentor-info">
                                <h3 class="mentor-name">诸葛亮</h3>
                                <p class="mentor-title">绝代智谋 · 一步三算</p>
                                <p class="mentor-description">智谋与效率的结合，规划完美战略。与军师同行，解谜策略，运筹帷幄。</p>
                                <button class="mentor-btn" data-hero="zhugeLiang">选择诸葛亮</button>
                            </div>
                        </div>
                    </div>

                    <!-- 赵云 -->
                    <div class="mentor-card-wrapper">
                        <div class="mentor-highlight"></div>
                        <div class="mentor-card" data-hero="zhaoYun">
                            <div class="mentor-banner">
                                <img src="images/zhaoyun-full.png" alt="赵云全身立绘" class="banner-img">
                                <div class="banner-overlay"></div>
                            </div>
                            <div class="mentor-avatar">
                                <img src="images/zhaoyun-avatar.jpg" alt="赵云头像" class="avatar-img">
                            </div>
                            <div class="mentor-info">
                                <h3 class="mentor-name">赵云</h3>
                                <p class="mentor-title">苍天翔龙 · 勇者之誓</p>
                                <p class="mentor-description">勇气与守护的融合，成就无敌战神。随龙将探索，锻炼胆识，守护信仰。</p>
                                <button class="mentor-btn" data-hero="zhaoYun">选择赵云</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 游魂鉴定 — 独立居中区域 -->
            <div class="soul-section">
                <div class="soul-btn-wrapper">
                    <button class="soul-btn locked" id="soul-analysis-btn">
                        <span class="lock-icon">🔒</span>
                        <span class="soul-icon">👻</span>
                        <span>游魂鉴定</span>
                        <span class="soul-btn-tooltip">完成三条导师线之旅以解锁</span>
                    </button>
                </div>
            </div>

            <div class="footer">
                <p class="footer-text">© 2026 游蜀拜师录 · 王者荣耀电竞文旅项目</p>
            </div>
        </div>
    </div>
    
    <!-- 续玩选择弹窗 -->
    <div class="resume-overlay" id="resume-overlay">
        <div class="resume-dialog">
            <h3 id="resume-title">继续旅程</h3>
            <p id="resume-message">你上次进行到了<span class="act-name" id="resume-act-name"></span>，要继续吗？</p>
            <div class="resume-buttons">
                <button class="resume-btn resume-btn-primary" id="resume-continue-btn">继续旅程</button>
                <button class="resume-btn resume-btn-secondary" id="resume-restart-btn">从头开始</button>
                <button class="resume-btn resume-btn-cancel" id="resume-cancel-btn">取消</button>
            </div>
        </div>
    </div>

    <!-- 引用公共JavaScript -->
    <script src="js/common.js"></script>
    
    <!-- 页面特有JavaScript -->
    <script>
        // 当前待续玩的英雄ID
        let pendingResumeHero = null;

        // ===== 粒子系统 =====
        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            const count = 25;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = (60 + Math.random() * 40) + '%';
                p.style.animationDuration = (8 + Math.random() * 12) + 's';
                p.style.animationDelay = (Math.random() * 10) + 's';
                p.style.width = (1.5 + Math.random() * 2) + 'px';
                p.style.height = p.style.width;
                // 随机颜色：琉璃青/墨金/紫
                const colors = [
                    'rgba(96, 224, 255, 0.4)',
                    'rgba(212, 175, 55, 0.35)',
                    'rgba(168, 85, 247, 0.3)'
                ];
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                container.appendChild(p);
            }
        }

        // 页面特有初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('首页已加载');

            // 创建粒子
            createParticles();

            // 更新进度显示
            updateProgressDisplay();

            // 更新游魂鉴定按钮状态
            updateSoulButton();

            // 英雄卡片点击效果
            const mentorCards = document.querySelectorAll('.mentor-card');
            mentorCards.forEach(card => {
                card.addEventListener('click', function() {
                    const heroId = this.getAttribute('data-hero');
                    handleHeroSelect(heroId);
                });
            });

            // 导师按钮点击效果
            const mentorBtns = document.querySelectorAll('.mentor-btn');
            mentorBtns.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const heroId = this.getAttribute('data-hero');
                    handleHeroSelect(heroId);
                });
            });

            // 右上角功能按钮绑定
            const cornerBtns = document.querySelectorAll('.corner-btn');
            cornerBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const action = this.getAttribute('data-action');
                    switch(action) {
                        case 'achievements':
                            navigateTo('achievements');
                            break;
                        case 'settings':
                            navigateTo('settings');
                            break;
                    }
                });
            });

            // 绑定续玩弹窗按钮
            document.getElementById('resume-continue-btn').addEventListener('click', function() {
                if (pendingResumeHero) {
                    const progress = getProgress(pendingResumeHero);
                    goToAct(pendingResumeHero, progress);
                }
                closeResumeDialog();
            });

            document.getElementById('resume-restart-btn').addEventListener('click', function() {
                if (pendingResumeHero) {
                    goToAct(pendingResumeHero, 1);
                }
                closeResumeDialog();
            });

            document.getElementById('resume-cancel-btn').addEventListener('click', function() {
                closeResumeDialog();
            });

            // 点击弹窗外部关闭
            document.getElementById('resume-overlay').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeResumeDialog();
                }
            });

            // 整体入场动画
            const heroContent = document.querySelector('.hero-content');
            if (heroContent) {
                heroContent.style.opacity = '0';
                heroContent.style.transform = 'translateY(30px)';

                setTimeout(() => {
                    heroContent.style.transition = 'opacity 1s ease, transform 1s ease';
                    heroContent.style.opacity = '1';
                    heroContent.style.transform = 'translateY(0)';
                }, 100);
            }

            // 卡片弧形入场动画（适配新的 flex 布局）
            const wrappers = document.querySelectorAll('.mentor-card-wrapper');
            wrappers.forEach((wrapper, index) => {
                const card = wrapper.querySelector('.mentor-card');
                if (!card) return;
                card.style.opacity = '0';
                card.style.transform = 'translateY(40px) scale(0.95)';

                setTimeout(() => {
                    card.style.transition = `opacity 0.7s cubic-bezier(0.4,0,0.2,1) ${index * 0.15}s, transform 0.7s cubic-bezier(0.4,0,0.2,1) ${index * 0.15}s`;
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0) scale(1)';
                }, 400 + index * 150);
            });
        });

        // 更新所有英雄卡片的进度显示
        function updateProgressDisplay() {
            const allProgress = getAllProgress();

            ['liBai', 'zhugeLiang', 'zhaoYun'].forEach(heroId => {
                const card = document.querySelector(`.mentor-card[data-hero="${heroId}"]`);
                if (!card) return;

                const progress = allProgress[heroId] || 0;
                const acts = heroActs[heroId];
                const totalActs = acts.length;

                // 移除旧的进度显示
                const oldProgress = card.querySelector('.mentor-progress');
                if (oldProgress) oldProgress.remove();

                // 创建进度显示
                const progressDiv = document.createElement('div');
                progressDiv.className = 'mentor-progress';

                if (progress > 0) {
                    const currentActName = acts[Math.min(progress - 1, totalActs - 1)].name;
                    const percent = Math.round((progress / totalActs) * 100);
                    const heroColor = heroes[heroId].color;

                    if (progress >= totalActs) {
                        progressDiv.innerHTML = `
                            <div class="progress-bar"><div class="progress-fill" style="width:100%;background:${heroColor}"></div></div>
                            <span class="progress-text" style="color:${heroColor}">已通关</span>
                        `;
                    } else {
                        progressDiv.innerHTML = `
                            <div class="progress-bar"><div class="progress-fill" style="width:${percent}%;background:${heroColor}"></div></div>
                            <span class="progress-text">进行到${currentActName}</span>
                        `;
                    }
                } else {
                    progressDiv.innerHTML = `
                        <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
                        <span class="progress-text">未开始</span>
                    `;
                }

                // 插入到按钮之前
                const btn = card.querySelector('.mentor-btn');
                const infoDiv = card.querySelector('.mentor-info');
                if (btn && infoDiv) {
                    infoDiv.insertBefore(progressDiv, btn);
                } else if (infoDiv) {
                    infoDiv.appendChild(progressDiv);
                } else {
                    card.appendChild(progressDiv);
                }
            });
        }

        // 处理英雄选择（有进度时弹窗，无进度时直接开始）
        function handleHeroSelect(heroId) {
            // 首次游戏成就
            unlockAchievement('first_game', '初入蜀地', '第一次开始游戏');
            
            const progress = getProgress(heroId);
            const acts = heroActs[heroId];

            // 没有进度 或 已通关 → 从头开始
            if (progress <= 0 || progress >= acts.length) {
                goToAct(heroId, 1);
                return;
            }

            // 有未完成进度 → 弹窗选择
            pendingResumeHero = heroId;
            const actName = acts[Math.min(progress - 1, acts.length - 1)].name;
            const heroName = heroes[heroId].name;

            document.getElementById('resume-title').textContent = `${heroName}的旅程`;
            document.getElementById('resume-act-name').textContent = actName;
            document.getElementById('resume-message').innerHTML =
                `你上次进行到了<span class="act-name">${actName}</span>，要继续吗？`;

            openResumeDialog();
        }

        // 打开续玩弹窗
        function openResumeDialog() {
            document.getElementById('resume-overlay').classList.add('active');
        }

        // 关闭续玩弹窗
        function closeResumeDialog() {
            document.getElementById('resume-overlay').classList.remove('active');
            pendingResumeHero = null;
        }

        // 更新游魂鉴定按钮状态
        function updateSoulButton() {
            const btn = document.getElementById('soul-analysis-btn');
            const hint = document.getElementById('soul-hint');
            if (!btn) return;

            if (isSoulAnalysisUnlocked()) {
                btn.classList.remove('locked');
                btn.classList.add('unlocked');
                btn.title = '鉴定你的蜀地游魂本相';
                // 破碎锁链动画由CSS自动触发
                // 更新提示文字
                if (hint) {
                    hint.textContent = '揭示你的蜀地游魂本相';
                    hint.style.color = 'rgba(168, 85, 247, 0.5)';
                }
                // 点击跳转
                btn.addEventListener('click', function() {
                    window.location.href = 'soul_analysis.html';
                });
            }
        }
    </script>
</body>
</html>
