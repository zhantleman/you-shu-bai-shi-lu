<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诸葛亮线 · 游蜀拜师录</title>
    <link rel="icon" type="image/svg+xml" href="../genie.svg">
    <meta name="description" content="诸葛亮线 - 智谋计算的蜀地之旅">
    
    <!-- 引用公共CSS -->
    <link rel="stylesheet" href="../css/style.css">
    
    <!-- 诸葛亮线公共CSS -->
    <link rel="stylesheet" href="../css/hero-styles.css">
</head>
<body class="act-bg" style="background-image: url('../images/canyon-diner.png');">
    <!-- 页面顶部 -->
    <div class="zhuge-header">
        <div class="container">
            <div class="hero-header">
                <div class="hero-info">
                    <h1 class="hero-name">
                        <span class="hero-name-icon">🧮</span>
                        诸葛亮 · 卧龙先生
                    </h1>
                    <p class="hero-title">智谋计算 · 峡谷·盛宴餐厅</p>
                    
                    <div class="stats-container" id="zhuge-stats">
                        <!-- 状态数据会由JavaScript动态更新 -->
                        <div class="zhuge-stat">
                            <div class="stat-icon">⚔️</div>
                            <div class="stat-label">谋略</div>
                            <div class="stat-value" id="stat-strategy">0</div>
                        </div>
                        <div class="zhuge-stat">
                            <div class="stat-icon">⚡</div>
                            <div class="stat-label">效率</div>
                            <div class="stat-value" id="stat-efficiency">0</div>
                        </div>
                        <div class="zhuge-stat">
                            <div class="stat-icon">🎯</div>
                            <div class="stat-label">探索</div>
                            <div class="stat-value" id="stat-explored">0/2</div>
                        </div>
                    </div>
                </div>
                
                <div class="act-indicator">
                    <div class="act-number" id="act-number">2</div>
                    <div class="act-text">第 <span id="act-text">二</span> 幕</div>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-secondary" data-action="go-home">
                    ← 返回首页
                </button>
            </div>
        </div>
    </div>
    
    <!-- 游戏主内容 -->
    <div class="container">
        <!-- 剧情对话区域 -->
        <div class="game-scene" id="dialogue-scene">
            <div class="dialogue-container">
                <h3 class="scene-title" id="scene-title">第二幕 · 峡谷·盛宴餐厅</h3>
                
                <div id="dialogue-log" class="dialogue-log">
                    <!-- 对话内容会由JavaScript动态添加 -->
                </div>
                
                <div class="zhuge-options" id="zhuge-options">
                    <!-- 选项按钮会由JavaScript动态生成 -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- 引用公共JavaScript -->
    <script src="../js/common.js"></script>
    
    <!-- 诸葛亮线特有JavaScript -->
    <script>
        // 诸葛亮线状态变量（完全复制李白线结构）
        const zhugeState = {
            currentAct: 2,                // 当前幕数
            currentStep: 'opening',       // 当前步骤：opening/explore/quiz/choice
            quizScore: 0,                 // 知识验证答对数
            strategyCount: 0,             // 谋略数量
            efficiencyCount: 0,           // 效率数量
            exploredOptions: {            // 探索选项是否已点（与李白线完全一致）
                option1: false,
                option2: false
            },
            isGameStarted: false          // 游戏是否已经开始
        };
        
        // 游戏内容数据（根据你的文案要求）
        const gameContent = {
            opening: {
                dialogues: [
                    { speaker: "诸葛亮", text: "移步此地。菜单以技能为名，灯光随战局而变。表面是食肆，实则是对用户需求的一次精准'数据采样'。你有何见解？" },
                    { speaker: "诸葛亮", text: "继续发问。这'数据采样点'的设计，何处令你困惑？" }
                ]
            },
            exploreOptions: {
                option1: {
                    label: "一份菜单，还分'骨灰版'和'小白版'，这算不算过度设计？",
                    speaker: "玩家",
                    text: "一份菜单，还分'骨灰版'和'小白版'，这算不算过度设计？",
                    response: {
                        speaker: "诸葛亮",
                        text: "这叫'精细化运营'，不是过度设计。对核心玩家，'骨灰版'是共鸣与彩蛋，是身份认同。对路人，'小白版'是友好引导，降低决策门槛。一石二鸟，覆盖全域用户，是标准的数据驱动策略。"
                    }
                },
                option2: {
                    label: "在这消费，折扣居然看游戏段位？这运营脑回路怎么长的？",
                    speaker: "玩家",
                    text: "在这消费，折扣居然看游戏段位？这运营脑回路怎么长的？",
                    response: {
                        speaker: "诸葛亮",
                        text: "将虚拟世界的成就接入现实权益体系，构建'游戏-生活'闭环。这不仅是促销，更是一种高效的'用户分层'与'社群激励'。让高段位玩家在现实中也能享受'段位红利'，极大地增强了用户粘性与付费意愿。此等设计，堪称经典。"
                    }
                }
            },
            quiz: {
                question: "我来考考你的数据敏感度。峡谷·盛宴的'段位折扣'机制，其根本目的是什么？",
                options: [
                    { text: "筛选高价值用户，并利用其成就心理提升复购与忠诚度。", correct: true },
                    { text: "做个噱头，显得这家店很懂游戏而已。", correct: false }
                ],
                responses: {
                    correct: "计算无误。洞察人性，方为上策。",
                    incorrect: "以你的智商，恐怕很难理解'用户终身价值'这个概念。罢了。"
                }
            },
            finalChoice: {
                question: "那么，此店的设计，其高明之处更在于'对用户心理的精准算计'，还是'对体验闭环的完备构建'？",
                options: [
                    { text: "心理算计是根，无洞察则无后续一切。", type: 'strategy' },
                    { text: "体验闭环是果，无闭环则算计终是空谈。", type: 'efficiency' }
                ],
                responses: {
                    strategy: "善。谋于未动，制于未发。你已初窥门径。",
                    efficiency: "尚可。知行之辩，你选择了更务实的一端。"
                }
            },
            specialGift: {
                condition: 'strategy', // 需要连续两幕都选择谋略
                dialogues: [
                    { speaker: "诸葛亮", text: "连番着眼算计与布局，思路尚算清晰。" },
                    { speaker: "诸葛亮", text: "这卷《数据化运营精要》手稿赠你，望你莫要辱没了其中的公式。" }
                ],
                reward: "+1 谋略"
            }
        };

        // ==================== 页面初始化 ====================
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('诸葛亮线第二幕页面已加载');
            
            // 如果是fresh进入，清除旧状态使对话从头开始
            clearActStateOnFreshEntry('zhugeState');
            
            // 加载诸葛亮线状态
            loadZhugeState();
            
            // 开始第二幕
            startZhugeSecondAct();
            
            // 绑定事件
            bindZhugeEvents();
            
            // 确保页面可见
            document.body.style.display = 'block';
        });
        
        // ==================== 状态管理 ====================
        
        // 加载诸葛亮线状态
        function loadZhugeState() {
            try {
                const savedState = localStorage.getItem('zhugeState');
                if (savedState) {
                    const parsed = JSON.parse(savedState);
                    Object.assign(zhugeState, parsed);
                }
                
                // 加载谋略和效率
                zhugeState.strategyCount = parseInt(localStorage.getItem('zhuge_strategyCount')) || 0;
                zhugeState.efficiencyCount = parseInt(localStorage.getItem('zhuge_efficiencyCount')) || 0;
                
                // 已通关？加载最终属性并锁定（回看模式）
                if (isHeroLineCompleted('zhugeLiang')) {
                    const final = getHeroFinalAttrs('zhugeLiang');
                    if (final) {
                        zhugeState.strategyCount = final.strategy;
                        zhugeState.efficiencyCount = final.efficiency;
                        zhugeState._locked = true;
                    }
                }
                
                updateZhugeStats();
                console.log('诸葛亮线状态已加载', zhugeState._locked ? '(锁定模式)' : '');
            } catch (error) {
                console.error('加载诸葛亮线状态失败:', error);
            }
        }
        
        // 保存诸葛亮线状态
        function saveZhugeState() {
            try {
                localStorage.setItem('zhugeState', JSON.stringify(zhugeState));
                localStorage.setItem('zhuge_strategyCount', zhugeState.strategyCount);
                localStorage.setItem('zhuge_efficiencyCount', zhugeState.efficiencyCount);
                
                // 同时保存到全局状态
                gameState.stats.strategy = zhugeState.strategyCount;
                gameState.stats.efficiency = zhugeState.efficiencyCount;
                saveGameState();
                
                console.log('诸葛亮线状态已保存');
            } catch (error) {
                console.error('保存诸葛亮线状态失败:', error);
            }
        }
        
        // 更新诸葛亮线统计显示
        function updateZhugeStats() {
            const strategyElement = document.getElementById('stat-strategy');
            const efficiencyElement = document.getElementById('stat-efficiency');
            const exploredElement = document.getElementById('stat-explored');
            
            if (strategyElement) strategyElement.textContent = zhugeState.strategyCount;
            if (efficiencyElement) efficiencyElement.textContent = zhugeState.efficiencyCount;
            
            // 计算已探索选项数量（与李白线完全一致）
            const exploredCount = (zhugeState.exploredOptions.option1 ? 1 : 0) + 
                                 (zhugeState.exploredOptions.option2 ? 1 : 0);
            if (exploredElement) exploredElement.textContent = `${exploredCount}/2`;
        }
        
        // ==================== 对话系统 ====================
        
        // 添加对话（与李白线完全一致）
        function addZhugeDialogue(text, speaker = '玩家') {
            const dialogueLog = document.getElementById('dialogue-log');
            if (!dialogueLog) return;
            
            const messageDiv = document.createElement('div');
            
            // 根据说话者选择样式类
            // 如果是诸葛亮用 .zhuge-message，其他用 .player-message
            messageDiv.className = speaker === '诸葛亮' ? 'zhuge-message' : 'player-message';
            
            const speakerName = speaker === '诸葛亮' ? '诸葛亮' : '玩家';
            messageDiv.innerHTML = `<strong>${speakerName}：</strong> ${text}`;
            
            dialogueLog.appendChild(messageDiv);
            
            // 自动滚动到底部
            dialogueLog.scrollTop = dialogueLog.scrollHeight;
        }
        
        // ==================== 游戏流程控制 ====================
        
        // 开始诸葛亮线第二幕
        function startZhugeSecondAct() {
            // 设置幕数
            const actNumberElement = document.getElementById('act-number');
            const actTextElement = document.getElementById('act-text');
            
            if (actNumberElement) actNumberElement.textContent = zhugeState.currentAct;
            if (actTextElement) {
                const chineseNumbers = ['一', '二', '三', '四', '五'];
                actTextElement.textContent = chineseNumbers[zhugeState.currentAct - 1] || '一';
            }
            
            // 重置探索选项（每幕独立）
            zhugeState.exploredOptions = { option1: false, option2: false };
            zhugeState.quizScore = 0;
            
            // 根据当前步骤继续游戏
            if (zhugeState.currentStep === 'choice' && (zhugeState.strategyCount > 0 || zhugeState.efficiencyCount > 0)) {
                // 从上一幕的最终选择状态继续
                zhugeState.currentStep = 'opening';
            }
            
            zhugeState.isGameStarted = true;
            showOpeningDialogues();
        }
        
        // 显示开场对话（使用固定延迟，不受设置影响）
        function showOpeningDialogues() {
            zhugeState.currentStep = 'opening';
            
            // 清空对话
            const dialogueLog = document.getElementById('dialogue-log');
            if (dialogueLog) dialogueLog.innerHTML = '';
            
            // 显示开场对话（固定1.5秒间隔）
            gameContent.opening.dialogues.forEach((dialogue, index) => {
                setTimeout(() => {
                    addZhugeDialogue(dialogue.text, dialogue.speaker);
                    
                    // 最后一句对话后进入探索阶段
                    if (index === gameContent.opening.dialogues.length - 1) {
                        setTimeout(enterExploreStep, 500);
                    }
                }, index * 1500);
            });
            
            saveZhugeState();
        }
        
        // 进入探索阶段
        function enterExploreStep() {
            zhugeState.currentStep = 'explore';
            updateZhugeOptions();
            saveZhugeState();
        }
        
        // 更新诸葛亮线选项（完全复制李白线逻辑）
        function updateZhugeOptions() {
            const optionsContainer = document.getElementById('zhuge-options');
            if (!optionsContainer) return;
            
            optionsContainer.innerHTML = '';
            
            const btn1 = document.createElement('button');
            const btn2 = document.createElement('button');
            const btn3 = document.createElement('button');
            
            btn1.className = 'zhuge-option';
            btn2.className = 'zhuge-option';
            btn3.className = 'zhuge-option';
            
            // 根据当前步骤设置按钮（与李白线完全一致）
            switch(zhugeState.currentStep) {
                case 'explore':
                    btn1.textContent = "一份菜单，还分'骨灰版'和'小白版'，这算不算过度设计？";
                    btn2.textContent = "在这消费，折扣居然看游戏段位？这运营脑回路怎么长的？";
                    btn3.textContent = "前往下一站";
                    
                    // 禁用已探索的选项（与李白线完全一致：变灰而不是消失）
                    if (zhugeState.exploredOptions.option1) {
                        btn1.disabled = true;
                        btn1.style.opacity = '0.5';
                    }
                    if (zhugeState.exploredOptions.option2) {
                        btn2.disabled = true;
                        btn2.style.opacity = '0.5';
                    }
                    
                    // 隐藏第三个按钮（用于占位）
                    btn3.style.display = 'none';
                    
                    btn1.onclick = () => exploreOption1();
                    btn2.onclick = () => exploreOption2();
                    break;
                    
                case 'quiz':
                    btn1.textContent = "筛选高价值用户，并利用其成就心理提升复购与忠诚度。";
                    btn2.textContent = "做个噱头，显得这家店很懂游戏而已。";
                    btn3.textContent = "前往下一站";
                    btn3.style.display = 'none';
                    
                    btn1.onclick = () => quizAnswer(true);
                    btn2.onclick = () => quizAnswer(false);
                    break;
                    
                case 'choice':
                    btn1.textContent = "心理算计是根，无洞察则无后续一切。";
                    btn2.textContent = "体验闭环是果，无闭环则算计终是空谈。";
                    btn3.textContent = "前往下一站";
                    
                    // 如果已经做出了选择，显示第三个按钮
                    if (zhugeState.strategyCount > 0 || zhugeState.efficiencyCount > 0) {
                        btn3.style.display = 'inline-block';
                        btn3.onclick = nextScene;
                    } else {
                        btn3.style.display = 'none';
                    }
                    
                    btn1.onclick = () => finalChoice('strategy');
                    btn2.onclick = () => finalChoice('efficiency');
                    break;
            }
            
            optionsContainer.appendChild(btn1);
            optionsContainer.appendChild(btn2);
            optionsContainer.appendChild(btn3);
            
            updateZhugeStats();
        }
        
        // 探索选项1（与李白线完全一致的结构）
        function exploreOption1() {
            addZhugeDialogue("一份菜单，还分'骨灰版'和'小白版'，这算不算过度设计？", '玩家');
            
            setTimeout(() => {
                addZhugeDialogue("这叫'精细化运营'，不是过度设计。对核心玩家，'骨灰版'是共鸣与彩蛋，是身份认同。对路人，'小白版'是友好引导，降低决策门槛。一石二鸟，覆盖全域用户，是标准的数据驱动策略。", '诸葛亮');
            }, 800);
            
            zhugeState.exploredOptions.option1 = true;
            updateZhugeStats();
            
            setTimeout(() => {
                checkAllExplored();
            }, 1500);
            
            saveZhugeState();
        }
        
        // 探索选项2（与李白线完全一致的结构）
        function exploreOption2() {
            addZhugeDialogue("在这消费，折扣居然看游戏段位？这运营脑回路怎么长的？", '玩家');
            
            setTimeout(() => {
                addZhugeDialogue("将虚拟世界的成就接入现实权益体系，构建'游戏-生活'闭环。这不仅是促销，更是一种高效的'用户分层'与'社群激励'。让高段位玩家在现实中也能享受'段位红利'，极大地增强了用户粘性与付费意愿。此等设计，堪称经典。", '诸葛亮');
            }, 800);
            
            zhugeState.exploredOptions.option2 = true;
            updateZhugeStats();
            
            setTimeout(() => {
                checkAllExplored();
            }, 1500);
            
            saveZhugeState();
        }
        
        // 检查是否所有探索都已完成（与李白线完全一致）
        function checkAllExplored() {
            const exploredCount = (zhugeState.exploredOptions.option1 ? 1 : 0) + 
                                 (zhugeState.exploredOptions.option2 ? 1 : 0);
            
            if (exploredCount === 2) {
                setTimeout(() => {
                    zhugeState.currentStep = 'quiz';
                    enterQuizStep();
                }, 1000);
            } else {
                updateZhugeOptions();
            }
        }
        
        // 验证阶段入口
        function enterQuizStep() {
            // 清空选项
            const optionsContainer = document.getElementById('zhuge-options');
            if (optionsContainer) optionsContainer.innerHTML = '';
            
            // 显示问题
            setTimeout(() => {
                addZhugeDialogue(gameContent.quiz.question, '诸葛亮');
                
                // 显示答案选项
                setTimeout(() => {
                    updateZhugeOptions();
                }, 800);
            }, 500);
            
            saveZhugeState();
        }
        
        // 知识验证回答
        function quizAnswer(isCorrect) {
            const response = isCorrect ? gameContent.quiz.responses.correct : gameContent.quiz.responses.incorrect;
            
            if (isCorrect) {
                zhugeState.quizScore++;
                addZhugeDialogue(gameContent.quiz.options[0].text, '玩家');
            } else {
                addZhugeDialogue(gameContent.quiz.options[1].text, '玩家');
            }
            
            setTimeout(() => {
                addZhugeDialogue(response, '诸葛亮');
                
                // 进入最终选择
                setTimeout(() => {
                    zhugeState.currentStep = 'choice';
                    enterChoiceStep();
                }, 1000);
            }, 800);
            
            saveZhugeState();
        }
        
        // 最终选择阶段入口
        function enterChoiceStep() {
            // 清空选项
            const optionsContainer = document.getElementById('zhuge-options');
            if (optionsContainer) optionsContainer.innerHTML = '';
            
            // 显示问题
            setTimeout(() => {
                addZhugeDialogue(gameContent.finalChoice.question, '诸葛亮');
                
                // 显示最终选项
                setTimeout(() => {
                    updateZhugeOptions();
                }, 800);
            }, 500);
            
            saveZhugeState();
        }
        
        // 最终选择
        function finalChoice(type) {
            if (type === 'strategy') {
                addZhugeDialogue("心理算计是根，无洞察则无后续一切。", '玩家');
                if (!zhugeState._locked) zhugeState.strategyCount++;
                
                // 检查是否触发特殊礼物（连续两幕选择谋略）
                if (zhugeState.currentAct === 2) {
                    // 检查第一幕的选择记录
                    try {
                        const savedState = localStorage.getItem('zhugeState');
                        if (savedState) {
                            const parsed = JSON.parse(savedState);
                            // 如果第一幕也选择了谋略，且当前是第二幕选择谋略，则触发礼物
                            if (parsed.currentAct === 1 && parsed.strategyCount > 0) {
                                setTimeout(() => {
                                    showSpecialGift();
                                }, 1500);
                            }
                        }
                    } catch (error) {
                        console.error('检查特殊礼物失败:', error);
                    }
                }
            } else {
                addZhugeDialogue("体验闭环是果，无闭环则算计终是空谈。", '玩家');
                zhugeState.efficiencyCount++;
            }
            
            // 检查成就：谋略累计3次
            if (zhugeState.strategyCount >= 3) {
                unlockAchievement('zhuge_wisdom', '智谋初显', '在诸葛亮线完成三次智慧选择');
            }
            // 检查成就：效率累计3次
            if (zhugeState.efficiencyCount >= 3) {
                unlockAchievement('zhuge_efficiency', '效率专家', '在诸葛亮线完成三次效率选择');
            }
            
            const response = gameContent.finalChoice.responses[type];
            
            setTimeout(() => {
                addZhugeDialogue(response, '诸葛亮');
                
                // 显示下一站按钮
                setTimeout(() => {
                    updateZhugeOptions();
                }, 800);
            }, 800);
            
            updateZhugeStats();
            saveZhugeState();
        }
        
        // 显示特殊礼物
        function showSpecialGift() {
            // 显示礼物对话
            gameContent.specialGift.dialogues.forEach((dialogue, index) => {
                setTimeout(() => {
                    addZhugeDialogue(dialogue.text, dialogue.speaker);
                }, index * 1500);
            });
            
            // 额外增加谋略值
            setTimeout(() => {
                if (!zhugeState._locked) zhugeState.strategyCount++;
                updateZhugeStats();
                saveZhugeState();
            }, 3000);
        }
        
        // 前往下一站
        function nextScene() {
            // 保存游戏状态
            saveZhugeState();
            
            // 保存进度到第3幕
            saveProgress('zhugeLiang', 3);
            
            // 跳转到第三幕
            window.location.href = 'zhuge_act3.html';
        }
        
        // ==================== 事件绑定 ====================
        
        function bindZhugeEvents() {
            // 返回首页按钮
            const goHomeBtn = document.querySelector('[data-action="go-home"]');
            if (goHomeBtn) {
                goHomeBtn.addEventListener('click', function() {
                    window.location.href = '../index.html';
                });
            }
        }
    </script>
</body>
</html>
