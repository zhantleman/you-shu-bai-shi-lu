<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赵云线 · 游蜀拜师录</title>
    <link rel="icon" type="image/svg+xml" href="../genie.svg">
    <meta name="description" content="赵云线第二幕 - 锦江突围">
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/hero-styles.css">
</head>
<body class="act-bg" style="background-image: url('../images/jinjiang-river.jpeg');">
    <div class="zhao-header">
        <div class="container">
            <div class="hero-header">
                <div class="hero-info">
                    <h1 class="hero-name">
                        <span class="hero-name-icon">⚔️</span>
                        赵云 · 苍天翔龙
                    </h1>
                    <p class="hero-title">勇者之誓 · 锦江突围</p>
                    
                    <div class="stats-container" id="zhao-stats">
                        <div class="zhao-stat">
                            <div class="stat-icon">💪</div>
                            <div class="stat-label">勇气</div>
                            <div class="stat-value" id="stat-courage">0</div>
                        </div>
                        <div class="zhao-stat">
                            <div class="stat-icon">🛡️</div>
                            <div class="stat-label">守护</div>
                            <div class="stat-value" id="stat-guard">0</div>
                        </div>
                        <div class="zhao-stat">
                            <div class="stat-icon">🎯</div>
                            <div class="stat-label">探索</div>
                            <div class="stat-value" id="stat-explored">0/2</div>
                        </div>
                    </div>
                </div>
                
                <div class="act-indicator">
                    <div class="act-number" id="act-number">2</div>
                    <div class="act-text">第 <span id="act-text">二</span> 幕</div>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-secondary" data-action="go-home">
                    ← 返回首页
                </button>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="game-scene" id="dialogue-scene">
            <div class="dialogue-container">
                <h3 class="scene-title" id="scene-title">第二幕 · 锦江突围</h3>
                
                <div id="dialogue-log" class="dialogue-log">
                </div>
                
                <div class="zhao-options" id="zhao-options">
                </div>
            </div>
        </div>
    </div>
    
    <script src="../js/common.js"></script>
    
    <script>
        const zhaoState = {
            currentAct: 2,
            currentStep: 'opening',
            courage: 0,
            guard: 0,
            exploredOptions: {
                option1: false,
                option2: false
            },
            isGameStarted: false
        };
        
        const gameContent = {
            opening: {
                dialogues: [
                    { speaker: "赵云", text: "锦江夜色虽美，却暗藏危机。此地水上救援与夜游安保并行，是勇气与守护的真正试炼场。你可敢一试？" },
                    { speaker: "赵云", text: "来吧，看看这江面上的守卫之道。你有什么想了解的？" }
                ]
            },
            exploreOptions: {
                option1: {
                    label: "锦江夜游的应急救援体系如何保障游客安全？",
                    speaker: "玩家",
                    text: "锦江夜游的应急救援体系如何保障游客安全？",
                    response: {
                        speaker: "赵云",
                        text: "每艘游船配备AED除颤仪与救生装备，沿岸每500米设一个救援站，无人机巡航覆盖全流域。一旦有人落水，90秒内救援到达。这不是纸上谈兵，而是实打实的守护。"
                    }
                },
                option2: {
                    label: "夜游经济如何在安全与体验之间取得平衡？",
                    speaker: "玩家",
                    text: "夜游经济如何在安全与体验之间取得平衡？",
                    response: {
                        speaker: "赵云",
                        text: "好问题！他们用'沉浸式安全'——将安全提示融入灯光秀和剧情讲解，游客在不知不觉中完成安全培训。安全不应该是束缚，而应是底色。真正的守护，让人感觉不到它的存在。"
                    }
                }
            },
            quiz: {
                question: "验证你的判断力：锦江夜游应急救援体系的核心理念是什么？",
                options: [
                    { text: "速度与预防并重——90秒响应是底线，但让救援站'隐形'于体验中才是上策。", correct: true },
                    { text: "配备足够多的救生员就行了，安全设施越显眼越好。", correct: false }
                ],
                responses: {
                    correct: "好！你理解了——最好的守护是不动声色的。勇气不仅是冲锋，更是未雨绸缪。",
                    incorrect: "错了。显眼的安全设施只会破坏体验，让人焦虑。真正的守护，是润物无声。"
                }
            },
            finalChoice: {
                question: "那么，面对危机，你更看重的是'一往无前的突击能力'，还是'滴水不漏的防御体系'？",
                options: [
                    { text: "突击能力！危机来临时，唯有勇猛冲锋才能化险为夷。", type: 'courage' },
                    { text: "防御体系！不战而屈人之兵，方为上策。让危机无机可乘。", type: 'guard' }
                ],
                responses: {
                    courage: "好！狭路相逢勇者胜。有此气魄，危局可破。",
                    guard: "善！上兵伐谋，不战而胜。防患于未然，才是大将之风。"
                }
            }
        };

        document.addEventListener('DOMContentLoaded', function() {
            console.log('赵云线第二幕页面已加载');
            clearActStateOnFreshEntry('zhaoState');
            loadZhaoState();
            startZhaoSecondAct();
            bindZhaoEvents();
            document.body.style.display = 'block';
        });
        
        function loadZhaoState() {
            try {
                const savedState = localStorage.getItem('zhaoState');
                if (savedState) {
                    const parsed = JSON.parse(savedState);
                    Object.assign(zhaoState, parsed);
                }
                zhaoState.courage = parseInt(localStorage.getItem('zhao_courage')) || 0;
                zhaoState.guard = parseInt(localStorage.getItem('zhao_guard')) || 0;
                
                // 已通关？加载最终属性并锁定（回看模式）
                if (isHeroLineCompleted('zhaoYun')) {
                    const final = getHeroFinalAttrs('zhaoYun');
                    if (final) {
                        zhaoState.courage = final.courage;
                        zhaoState.guard = final.guard;
                        zhaoState._locked = true;
                    }
                }
                
                updateZhaoStats();
                console.log('赵云线状态已加载', zhaoState._locked ? '(锁定模式)' : '');
            } catch (error) {
                console.error('加载赵云线状态失败:', error);
            }
        }
        
        function saveZhaoState() {
            try {
                localStorage.setItem('zhaoState', JSON.stringify(zhaoState));
                localStorage.setItem('zhao_courage', zhaoState.courage);
                localStorage.setItem('zhao_guard', zhaoState.guard);
                gameState.stats.courage = zhaoState.courage;
                gameState.stats.guard = zhaoState.guard;
                saveGameState();
                console.log('赵云线状态已保存');
            } catch (error) {
                console.error('保存赵云线状态失败:', error);
            }
        }
        
        function updateZhaoStats() {
            const courageEl = document.getElementById('stat-courage');
            const guardEl = document.getElementById('stat-guard');
            const exploredEl = document.getElementById('stat-explored');
            if (courageEl) courageEl.textContent = zhaoState.courage;
            if (guardEl) guardEl.textContent = zhaoState.guard;
            const exploredCount = (zhaoState.exploredOptions.option1 ? 1 : 0) + (zhaoState.exploredOptions.option2 ? 1 : 0);
            if (exploredEl) exploredEl.textContent = `${exploredCount}/2`;
        }
        
        function addZhaoDialogue(text, speaker = '玩家') {
            const dialogueLog = document.getElementById('dialogue-log');
            if (!dialogueLog) return;
            const messageDiv = document.createElement('div');
            messageDiv.className = speaker === '赵云' ? 'zhao-message' : 'player-message';
            const speakerName = speaker === '赵云' ? '赵云' : '玩家';
            messageDiv.innerHTML = `<strong>${speakerName}：</strong> ${text}`;
            dialogueLog.appendChild(messageDiv);
            dialogueLog.scrollTop = dialogueLog.scrollHeight;
        }
        
        function startZhaoSecondAct() {
            const actNumberElement = document.getElementById('act-number');
            const actTextElement = document.getElementById('act-text');
            if (actNumberElement) actNumberElement.textContent = zhaoState.currentAct;
            if (actTextElement) {
                const chineseNumbers = ['一', '二', '三', '四', '五'];
                actTextElement.textContent = chineseNumbers[zhaoState.currentAct - 1] || '二';
            }
            zhaoState.exploredOptions = { option1: false, option2: false };
            if (zhaoState.currentStep === 'choice' && (zhaoState.courage > 0 || zhaoState.guard > 0)) {
                zhaoState.currentStep = 'opening';
            }
            zhaoState.isGameStarted = true;
            showOpeningDialogues();
        }
        
        function showOpeningDialogues() {
            zhaoState.currentStep = 'opening';
            const dialogueLog = document.getElementById('dialogue-log');
            if (dialogueLog) dialogueLog.innerHTML = '';
            gameContent.opening.dialogues.forEach((dialogue, index) => {
                setTimeout(() => {
                    addZhaoDialogue(dialogue.text, dialogue.speaker);
                    if (index === gameContent.opening.dialogues.length - 1) {
                        setTimeout(enterExploreStep, 500);
                    }
                }, index * 1500);
            });
            saveZhaoState();
        }
        
        function enterExploreStep() {
            zhaoState.currentStep = 'explore';
            updateZhaoOptions();
            saveZhaoState();
        }
        
        function updateZhaoOptions() {
            const optionsContainer = document.getElementById('zhao-options');
            if (!optionsContainer) return;
            optionsContainer.innerHTML = '';
            const btn1 = document.createElement('button');
            const btn2 = document.createElement('button');
            const btn3 = document.createElement('button');
            btn1.className = 'zhao-option';
            btn2.className = 'zhao-option';
            btn3.className = 'zhao-option';
            switch(zhaoState.currentStep) {
                case 'explore':
                    btn1.textContent = gameContent.exploreOptions.option1.label;
                    btn2.textContent = gameContent.exploreOptions.option2.label;
                    btn3.textContent = "前往下一站";
                    if (zhaoState.exploredOptions.option1) { btn1.disabled = true; btn1.style.opacity = '0.5'; }
                    if (zhaoState.exploredOptions.option2) { btn2.disabled = true; btn2.style.opacity = '0.5'; }
                    btn3.style.display = 'none';
                    btn1.onclick = () => exploreOption1();
                    btn2.onclick = () => exploreOption2();
                    break;
                case 'quiz':
                    btn1.textContent = gameContent.quiz.options[0].text;
                    btn2.textContent = gameContent.quiz.options[1].text;
                    btn3.textContent = "前往下一站";
                    btn3.style.display = 'none';
                    btn1.onclick = () => quizAnswer(true);
                    btn2.onclick = () => quizAnswer(false);
                    break;
                case 'choice':
                    btn1.textContent = gameContent.finalChoice.options[0].text;
                    btn2.textContent = gameContent.finalChoice.options[1].text;
                    btn3.textContent = "前往下一站";
                    if (zhaoState.courage > 0 || zhaoState.guard > 0) {
                        btn3.style.display = 'inline-block';
                        btn3.onclick = nextScene;
                    } else {
                        btn3.style.display = 'none';
                    }
                    btn1.onclick = () => finalChoice('courage');
                    btn2.onclick = () => finalChoice('guard');
                    break;
            }
            optionsContainer.appendChild(btn1);
            optionsContainer.appendChild(btn2);
            optionsContainer.appendChild(btn3);
            updateZhaoStats();
        }
        
        function exploreOption1() {
            addZhaoDialogue(gameContent.exploreOptions.option1.text, '玩家');
            setTimeout(() => {
                addZhaoDialogue(gameContent.exploreOptions.option1.response.text, '赵云');
            }, 800);
            zhaoState.exploredOptions.option1 = true;
            updateZhaoStats();
            setTimeout(() => checkAllExplored(), 1500);
            saveZhaoState();
        }
        
        function exploreOption2() {
            addZhaoDialogue(gameContent.exploreOptions.option2.text, '玩家');
            setTimeout(() => {
                addZhaoDialogue(gameContent.exploreOptions.option2.response.text, '赵云');
            }, 800);
            zhaoState.exploredOptions.option2 = true;
            updateZhaoStats();
            setTimeout(() => checkAllExplored(), 1500);
            saveZhaoState();
        }
        
        function checkAllExplored() {
            const exploredCount = (zhaoState.exploredOptions.option1 ? 1 : 0) + (zhaoState.exploredOptions.option2 ? 1 : 0);
            if (exploredCount === 2) {
                setTimeout(() => {
                    zhaoState.currentStep = 'quiz';
                    enterQuizStep();
                }, 1000);
            } else {
                updateZhaoOptions();
            }
        }
        
        function enterQuizStep() {
            const optionsContainer = document.getElementById('zhao-options');
            if (optionsContainer) optionsContainer.innerHTML = '';
            setTimeout(() => {
                addZhaoDialogue(gameContent.quiz.question, '赵云');
                setTimeout(() => updateZhaoOptions(), 800);
            }, 500);
            saveZhaoState();
        }
        
        function quizAnswer(isCorrect) {
            const response = isCorrect ? gameContent.quiz.responses.correct : gameContent.quiz.responses.incorrect;
            addZhaoDialogue(gameContent.quiz.options[isCorrect ? 0 : 1].text, '玩家');
            setTimeout(() => {
                addZhaoDialogue(response, '赵云');
                setTimeout(() => {
                    zhaoState.currentStep = 'choice';
                    enterChoiceStep();
                }, 1000);
            }, 800);
            saveZhaoState();
        }
        
        function enterChoiceStep() {
            const optionsContainer = document.getElementById('zhao-options');
            if (optionsContainer) optionsContainer.innerHTML = '';
            setTimeout(() => {
                addZhaoDialogue(gameContent.finalChoice.question, '赵云');
                setTimeout(() => updateZhaoOptions(), 800);
            }, 500);
            saveZhaoState();
        }
        
        function finalChoice(type) {
            if (type === 'courage') {
                addZhaoDialogue(gameContent.finalChoice.options[0].text, '玩家');
                if (!zhaoState._locked) zhaoState.courage++;
            } else {
                addZhaoDialogue(gameContent.finalChoice.options[1].text, '玩家');
                if (!zhaoState._locked) zhaoState.guard++;
            }
            
            // 检查成就：勇气选择累计3次
            if (zhaoState.courage >= 3) {
                unlockAchievement('zhao_courage', '勇者无畏', '在赵云线完成三次勇气选择');
            }
            // 检查成就：守护选择累计3次
            if (zhaoState.guard >= 3) {
                unlockAchievement('zhao_guard', '守护者', '在赵云线完成三次守护选择');
            }
            
            const response = gameContent.finalChoice.responses[type];
            setTimeout(() => {
                addZhaoDialogue(response, '赵云');
                setTimeout(() => updateZhaoOptions(), 800);
            }, 800);
            updateZhaoStats();
            saveZhaoState();
        }
        
        function nextScene() {
            saveZhaoState();
            saveProgress('zhaoYun', 3);
            window.location.href = 'zhao_yun_act3.html';
        }
        
        function bindZhaoEvents() {
            const goHomeBtn = document.querySelector('[data-action="go-home"]');
            if (goHomeBtn) {
                goHomeBtn.addEventListener('click', function() {
                    window.location.href = '../index.html';
                });
            }
        }
    </script>
</body>
</html>
