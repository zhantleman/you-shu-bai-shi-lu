<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赵云线 · 游蜀拜师录</title>
    <link rel="icon" type="image/svg+xml" href="../genie.svg">
    <meta name="description" content="赵云线第五幕 - 勇者问答">
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/hero-styles.css">
</head>
<body>
    <div class="zhao-header">
        <div class="container">
            <div class="hero-header">
                <div class="hero-info">
                    <h1 class="hero-name">
                        <span class="hero-name-icon">⚔️</span>
                        赵云 · 苍天翔龙
                    </h1>
                    <p class="hero-title">勇者之誓 · 勇者问答</p>
                    
                    <div class="stats-container" id="zhao-stats">
                        <div class="zhao-stat">
                            <div class="stat-icon">💪</div>
                            <div class="stat-label">勇气</div>
                            <div class="stat-value" id="stat-courage">0</div>
                        </div>
                        <div class="zhao-stat">
                            <div class="stat-icon">🛡️</div>
                            <div class="stat-label">守护</div>
                            <div class="stat-value" id="stat-guard">0</div>
                        </div>
                        <div class="zhao-stat">
                            <div class="stat-icon">🎯</div>
                            <div class="stat-label">进度</div>
                            <div class="stat-value" id="stat-progress">5/5</div>
                        </div>
                    </div>
                </div>
                
                <div class="act-indicator">
                    <div class="act-number" id="act-number">5</div>
                    <div class="act-text">第 <span id="act-text">五</span> 幕</div>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-secondary" data-action="go-home">
                    ← 返回首页
                </button>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="quiz-container" id="quiz-container">
            <div id="quiz-content">
                <h2 class="quiz-title">赵云线第五幕：勇者之誓·本线策问</h2>
                <p class="quiz-subtitle">最终考验 - 验证你的勇气与守护之道</p>
                
                <div id="opening-content" style="text-align: center;">
                    <div id="dialogue-log" class="dialogue-log" style="height: 150px; max-height: 200px; overflow-y: auto; padding: 18px; border: 1px solid var(--zhao-color-light); border-radius: 8px; background: rgba(20, 20, 30, 0.9); margin-bottom: 25px; text-align: left; color: rgba(255, 255, 255, 0.95);">
                    </div>
                    
                    <p style="color: rgba(255, 255, 255, 0.8); font-size: 1.2rem; line-height: 1.6; margin-bottom: 30px;">
                        本卷共五题，皆为现代安全守护与古之勇气的对照。<br>
                        每题皆基于前三幕所学，仔细审题，选择最佳策略。
                    </p>
                    
                    <p style="color: var(--zhao-color); font-size: 1.3rem; font-weight: bold; margin-bottom: 40px;">
                        赵云：勇者无惧，智者不惑。开始吧。
                    </p>
                    
                    <button id="start-quiz-btn" class="quiz-btn" style="padding: 15px 50px; font-size: 1.2rem;">
                        开始策问
                    </button>
                </div>
                
                <div id="question-container" style="display: none;">
                    <div id="quiz-dialogue-log" class="dialogue-log" style="height: 100px; max-height: 150px; overflow-y: auto; padding: 15px; border: 1px solid var(--zhao-color-light); border-radius: 8px; background: rgba(20, 20, 30, 0.9); margin-bottom: 20px; text-align: left; color: rgba(255, 255, 255, 0.95);">
                    </div>
                    
                    <div class="question-number" id="question-number">第 1 题 / 共 5 题</div>
                    <div class="question-text" id="question-text">题目加载中...</div>
                    
                    <div class="options-container" id="options-container">
                    </div>
                    
                    <div class="answer-feedback" id="answer-feedback">
                    </div>
                    
                    <div class="quiz-navigation">
                        <div class="quiz-progress" id="quiz-progress">已答：0/5</div>
                        <button id="next-question-btn" class="quiz-btn" disabled>下一题</button>
                    </div>
                </div>
                
                <div id="results-container" style="display: none;">
                </div>
            </div>
        </div>
    </div>
    
    <script src="../js/common.js"></script>
    
    <script>
        const zhaoState = {
            currentAct: 5,
            courage: 0,
            guard: 0,
            quizStarted: false,
            currentQuestion: 0,
            userAnswers: [],
            quizScore: 0
        };
        
        const quizQuestions = [
            {
                question: "赵云： 第一题，验算基础。武侯祠安保体系采用'智能监控+人工巡查'双轨制，其核心设计理念是什么？",
                options: [
                    "A. 全靠智能系统就够了，人工只是摆设",
                    "B. 技术为盾，人为剑——智能系统提供全域覆盖，但最终决策与行动依赖人的勇气与判断"
                ],
                correctAnswer: 1,
                correctFeedback: "判断无误。勇气，是驾驭工具的根本。",
                wrongFeedback: "错了。再强的系统，也需要勇者来驾驭。技术是工具，勇气才是根本。"
            },
            {
                question: "赵云： 第二题，考察洞察。锦江夜游将安全提示融入灯光秀和剧情讲解，这种策略的核心是什么？",
                options: [
                    "A. 沉浸式安全——让安全培训隐形于体验中，不破坏游客感受的同时保障安全",
                    "B. 安全提示不重要，游客自己看着办就行"
                ],
                correctAnswer: 0,
                correctFeedback: "判断无误。最好的守护，让人感觉不到它的存在。",
                wrongFeedback: "错了。显眼的安全设施只会破坏体验。真正的守护，是润物无声。"
            },
            {
                question: "赵云： 第三题，分析策略。青城山户外运动采用'分级挑战'机制，其根本目的是什么？",
                options: [
                    "A. 限制游客自由，省得惹麻烦",
                    "B. 让每个人在可控风险内找到自己的极限边界——冒险不是莽撞，而是在边界处突破"
                ],
                correctAnswer: 1,
                correctFeedback: "判断无误。真正的勇者不是无所畏惧，而是明知危险仍能冷静前行。",
                wrongFeedback: "错了。没有安全边界的冒险是莽撞，不是勇气。"
            },
            {
                question: "赵云： 第四题，解读现象。锦江应急救援体系要求90秒内到达落水者，这体现了什么原则？",
                options: [
                    "A. 速度与预防并重——响应速度是底线，但将救援站'隐形'于体验中才是上策",
                    "B. 追求数据好看而已，实际做不到"
                ],
                correctAnswer: 0,
                correctFeedback: "判断无误。速度是勇气的度量，但预防才是守护的智慧。",
                wrongFeedback: "错了。这不仅是数字，而是对生命的承诺。勇者不轻诺，诺必行。"
            },
            {
                question: "赵云： 最终题，总结核心。电竞从业者于武侯祠中寻求'勇气与守护的校准'，其本质是为何？",
                options: [
                    "A. 就是个噱头，拜拜神求个心理安慰",
                    "B. 为纯粹的理性决策模型，注入感性的担当与坚守——勇气是行动力，守护是方向感"
                ],
                correctAnswer: 1,
                correctFeedback: "判断无误。勇气是行动力，守护是方向感。二者合一，方为真勇。",
                wrongFeedback: "若勇气仅靠玄学，这行业早已倾覆。你需要更深的思考。"
            }
        ];

        function addZhaoDialogue(text, speaker = '玩家') {
            let dialogueLog = null;
            if (zhaoState.quizStarted) {
                dialogueLog = document.getElementById('quiz-dialogue-log');
            }
            if (!dialogueLog) {
                dialogueLog = document.getElementById('dialogue-log');
            }
            if (!dialogueLog) return;
            const messageDiv = document.createElement('div');
            messageDiv.className = speaker === '赵云' ? 'zhao-message' : 'player-message';
            const speakerName = speaker === '赵云' ? '赵云' : '玩家';
            messageDiv.innerHTML = `<strong>${speakerName}：</strong> ${text}`;
            dialogueLog.appendChild(messageDiv);
            dialogueLog.scrollTop = dialogueLog.scrollHeight;
        }

        document.addEventListener('DOMContentLoaded', function() {
            console.log('赵云线第五幕页面已加载');
            clearActStateOnFreshEntry('zhaoState');
            loadZhaoState();
            bindQuizEvents();
            
            setTimeout(() => {
                addZhaoDialogue("四关已过，勇气与守护皆有所成。亮有一卷考题，皆出自你我此行所言。答对五题，方为真勇。", "赵云");
            }, 500);
            
            document.body.style.display = 'block';
        });
        
        function loadZhaoState() {
            try {
                const savedState = localStorage.getItem('zhaoState');
                if (savedState) {
                    const parsed = JSON.parse(savedState);
                    Object.assign(zhaoState, parsed);
                }
                zhaoState.courage = parseInt(localStorage.getItem('zhao_courage')) || 0;
                zhaoState.guard = parseInt(localStorage.getItem('zhao_guard')) || 0;
                
                // 已通关？加载最终属性并锁定（回看模式）
                if (isHeroLineCompleted('zhaoYun')) {
                    const final = getHeroFinalAttrs('zhaoYun');
                    if (final) {
                        zhaoState.courage = final.courage;
                        zhaoState.guard = final.guard;
                        zhaoState._locked = true;
                    }
                }
                
                updateZhaoStats();
                console.log('赵云线状态已加载', zhaoState._locked ? '(锁定模式)' : '');
            } catch (error) {
                console.error('加载赵云线状态失败:', error);
            }
        }
        
        function saveZhaoState() {
            try {
                localStorage.setItem('zhaoState', JSON.stringify(zhaoState));
                localStorage.setItem('zhao_courage', zhaoState.courage);
                localStorage.setItem('zhao_guard', zhaoState.guard);
                gameState.stats.courage = zhaoState.courage;
                gameState.stats.guard = zhaoState.guard;
                saveGameState();
                console.log('赵云线状态已保存');
            } catch (error) {
                console.error('保存赵云线状态失败:', error);
            }
        }
        
        function updateZhaoStats() {
            const courageEl = document.getElementById('stat-courage');
            const guardEl = document.getElementById('stat-guard');
            const progressEl = document.getElementById('stat-progress');
            if (courageEl) courageEl.textContent = zhaoState.courage;
            if (guardEl) guardEl.textContent = zhaoState.guard;
            if (progressEl) progressEl.textContent = '5/5';
        }
        
        function startQuiz() {
            zhaoState.quizStarted = true;
            zhaoState.currentQuestion = 0;
            zhaoState.userAnswers = [];
            zhaoState.quizScore = 0;
            document.getElementById('opening-content').style.display = 'none';
            document.getElementById('question-container').style.display = 'block';
            showQuestion(0);
        }
        
        function showQuestion(questionIndex) {
            const question = quizQuestions[questionIndex];
            document.getElementById('question-number').textContent = `第 ${questionIndex + 1} 题 / 共 ${quizQuestions.length} 题`;
            document.getElementById('question-text').textContent = question.question;
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            question.options.forEach((optionText, index) => {
                const optionElement = document.createElement('button');
                optionElement.className = 'quiz-option';
                optionElement.textContent = optionText;
                if (zhaoState.userAnswers[questionIndex] !== undefined) {
                    optionElement.disabled = true;
                    if (index === question.correctAnswer) optionElement.classList.add('correct');
                    else if (index === zhaoState.userAnswers[questionIndex]) optionElement.classList.add('incorrect');
                    if (index === zhaoState.userAnswers[questionIndex]) optionElement.classList.add('selected');
                } else {
                    optionElement.addEventListener('click', () => selectAnswer(questionIndex, index));
                }
                optionsContainer.appendChild(optionElement);
            });
            updateNavigationButtons(questionIndex);
            const feedbackElement = document.getElementById('answer-feedback');
            feedbackElement.classList.remove('show');
        }
        
        function selectAnswer(questionIndex, answerIndex) {
            zhaoState.userAnswers[questionIndex] = answerIndex;
            const isCorrect = answerIndex === quizQuestions[questionIndex].correctAnswer;
            if (isCorrect) zhaoState.quizScore++;
            
            const options = document.querySelectorAll('.quiz-option');
            options.forEach((option, index) => {
                option.disabled = true;
                if (index === quizQuestions[questionIndex].correctAnswer) option.classList.add('correct');
                else if (index === answerIndex && !isCorrect) option.classList.add('incorrect');
                if (index === answerIndex) option.classList.add('selected');
            });
            
            const question = quizQuestions[questionIndex];
            const zhaoFeedback = isCorrect ? (question.correctFeedback || "判断无误。") : (question.wrongFeedback || "错了。");
            addZhaoDialogue(zhaoFeedback, '赵云');
            
            updateNavigationButtons(questionIndex);
            updateProgress();
        }
        
        function updateNavigationButtons(questionIndex) {
            const nextBtn = document.getElementById('next-question-btn');
            if (zhaoState.userAnswers[questionIndex] !== undefined) {
                nextBtn.disabled = false;
                if (questionIndex === quizQuestions.length - 1) {
                    nextBtn.textContent = '查看结果';
                    nextBtn.onclick = showResults;
                } else {
                    nextBtn.textContent = '下一题';
                    nextBtn.onclick = () => showQuestion(questionIndex + 1);
                }
            } else {
                nextBtn.disabled = true;
            }
        }
        
        function updateProgress() {
            const answeredCount = zhaoState.userAnswers.filter(a => a !== undefined).length;
            document.getElementById('quiz-progress').textContent = `已答：${answeredCount}/${quizQuestions.length}`;
        }
        
        function showResults() {
            document.getElementById('question-container').style.display = 'none';
            document.getElementById('results-container').style.display = 'block';
            
            const score = zhaoState.quizScore;
            const total = quizQuestions.length;
            const percentage = Math.round((score / total) * 100);
            
            let rating = '', description = '', courageBonus = 0, guardBonus = 0;
            
            if (percentage === 100) {
                rating = '万夫莫敌';
                description = '五题全对，勇冠三军！你对勇气与守护的理解已臻化境。古今勇者，融会贯通，可称当代子龙。';
                courageBonus = 3; guardBonus = 2;
            } else if (percentage >= 80) {
                rating = '一骑当千';
                description = '答对四题，表现优异。你对勇气与守护之道已有深刻把握，但仍需锤炼。';
                courageBonus = 2; guardBonus = 1;
            } else if (percentage >= 60) {
                rating = '初露锋芒';
                description = '答对三题，勉强及格。你掌握了基本概念，但距离真正的勇者之道尚有距离。';
                courageBonus = 1; guardBonus = 1;
            } else {
                rating = '尚需磨砺';
                description = '答对不足三题，尚未合格。你对勇气与守护的理解尚浅。建议复盘前三幕，重新思考。';
                courageBonus = 0; guardBonus = 0;
            }
            
            if (!zhaoState._locked) {
                zhaoState.courage += courageBonus;
                zhaoState.guard += guardBonus;
            }
            
            // 检查成就：勇气选择累计3次
            if (zhaoState.courage >= 3) {
                unlockAchievement('zhao_courage', '勇者无畏', '在赵云线完成三次勇气选择');
            }
            // 检查成就：守护选择累计3次
            if (zhaoState.guard >= 3) {
                unlockAchievement('zhao_guard', '守护者', '在赵云线完成三次守护选择');
            }
            
            const resultsHTML = `
                <div class="results-container">
                    <h2 class="results-title">问答完成</h2>
                    <div class="results-score">${score}/${total}</div>
                    <div class="results-subtitle">正确率 ${percentage}%</div>
                    <div class="results-rating">${rating}</div>
                    <p class="results-description">${description}</p>
                    <div style="background: rgba(200, 200, 215, 0.1); padding: 20px; border-radius: 10px; margin-bottom: 30px; max-width: 500px; margin-left: auto; margin-right: auto;">
                        <div style="color: var(--zhao-color); font-weight: bold; margin-bottom: 10px;">本场奖励</div>
                        <div style="display: flex; justify-content: space-around;">
                            <div>
                                <div style="font-size: 2rem; color: white;">+${courageBonus}</div>
                                <div style="color: rgba(255, 255, 255, 0.7);">勇气</div>
                            </div>
                            <div>
                                <div style="font-size: 2rem; color: white;">+${guardBonus}</div>
                                <div style="color: rgba(255, 255, 255, 0.7);">守护</div>
                            </div>
                        </div>
                    </div>
                    <div style="margin-top: 40px;">
                        <p style="color: rgba(255, 255, 255, 0.7); margin-bottom: 20px;">恭喜完成赵云线全部内容！</p>
                        <button id="view-certificate-btn" class="quiz-btn" style="padding: 15px 50px; font-size: 1.2rem;">
                            查看最终证书
                        </button>
                    </div>
                </div>
            `;
            
            document.getElementById('results-container').innerHTML = resultsHTML;
            document.getElementById('view-certificate-btn').addEventListener('click', viewCertificate);
            updateZhaoStats();
            saveZhaoState();
        }
        
        function viewCertificate() {
            saveZhaoState();
            saveProgress('zhaoYun', 5);
            
            // 解锁赵云线全通成就
            unlockAchievement('zhao_complete', '赵云线全通', '完成赵云线全部五幕内容');
            
            // 检查全能学徒成就（体验所有三条英雄路线）
            checkAllHeroesAchievement();
            
            // 检查完美收集者成就（解锁所有成就）
            checkAllAchievementsAchievement();
            
            // 保存游魂数据（勇气+守护综合值）
            saveSoulData('zhaoYun', {
                courage: zhaoState.courage,
                guard: zhaoState.guard,
                soulValue: zhaoState.courage + zhaoState.guard
            });
            
            // 计算称号
            let title = "勇武电竞师";
            
            if (zhaoState.courage >= zhaoState.guard * 2) {
                title = "苍天翔龙";
            } else if (zhaoState.guard >= zhaoState.courage * 2) {
                title = "坚壁守将";
            } else if (zhaoState.quizScore * 10 >= 40) {
                title = "万夫莫敌";
            }
            
            // 跳转到证书页面，传递参数
            const params = new URLSearchParams({
                title: title,
                hero: '赵云',
                courage: zhaoState.courage,
                guard: zhaoState.guard,
                quiz: zhaoState.quizScore * 10
            });
            
            window.location.href = `../certificate.html?${params.toString()}`;
        }
        
        function bindQuizEvents() {
            const startQuizBtn = document.getElementById('start-quiz-btn');
            if (startQuizBtn) startQuizBtn.addEventListener('click', startQuiz);
            const goHomeBtn = document.querySelector('[data-action="go-home"]');
            if (goHomeBtn) goHomeBtn.addEventListener('click', function() { window.location.href = '../index.html'; });
        }
    </script>
</body>
</html>
