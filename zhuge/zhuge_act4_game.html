<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诸葛亮线 · 游蜀拜师录</title>
    <link rel="icon" type="image/svg+xml" href="../genie.svg">
    <meta name="description" content="诸葛亮线第四幕 - 八阵图·推演">
    
    <!-- 引用公共CSS -->
    <link rel="stylesheet" href="../css/style.css">
    
    <!-- 诸葛亮线公共CSS -->
    <link rel="stylesheet" href="../css/hero-styles.css">
</head>
<body>
    <!-- 页面顶部 -->
    <div class="zhuge-header">
        <div class="container">
            <div class="hero-header">
                <div class="hero-info">
                    <h1 class="hero-name">
                        <span class="hero-name-icon">🧮</span>
                        诸葛亮 · 卧龙先生
                    </h1>
                    <p class="hero-title">智谋计算 · 八阵图推演</p>
                    
                    <div class="stats-container" id="zhuge-stats">
                        <div class="zhuge-stat">
                            <div class="stat-icon">⚔️</div>
                            <div class="stat-label">谋略</div>
                            <div class="stat-value" id="stat-strategy">0</div>
                        </div>
                        <div class="zhuge-stat">
                            <div class="stat-icon">⚡</div>
                            <div class="stat-label">效率</div>
                            <div class="stat-value" id="stat-efficiency">0</div>
                        </div>
                        <div class="zhuge-stat">
                            <div class="stat-icon">🎯</div>
                            <div class="stat-label">进度</div>
                            <div class="stat-value" id="stat-progress">4/5</div>
                        </div>
                    </div>
                </div>
                
                <div class="act-indicator">
                    <div class="act-number" id="act-number">4</div>
                    <div class="act-text">第 <span id="act-text">四</span> 幕</div>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-secondary" data-action="go-home">
                    ← 返回首页
                </button>
            </div>
        </div>
    </div>
    
    <!-- 游戏主内容 -->
    <div class="container">
        <div class="game-scene" id="dialogue-scene">
            <div class="dialogue-container">
                <h3 class="scene-title" id="scene-title">第四幕 · 八阵图·推演</h3>
                
                <div id="dialogue-log" class="dialogue-log">
                </div>
                
                <div class="zhuge-options" id="zhuge-options">
                </div>
            </div>
        </div>
    </div>
    
    <!-- 引用公共JavaScript -->
    <script src="../js/common.js"></script>
    
    <!-- 诸葛亮线第四幕特有JavaScript -->
    <script>
        // ==================== 诸葛亮线状态 ====================
        const zhugeState = {
            currentAct: 4,
            isGameStarted: false,
            strategyCount: 0,
            efficiencyCount: 0,
            gameCompleted: false,
            currentLevel: 1
        };

        // ==================== 关卡数据 ====================
        // 符号: . = 空地, # = 墙, P = 玩家, A = 箱A, B = 箱B, X = 目标A, Y = 目标B
        // 渲染时: 墙/玩家/箱子/目标在各自层，空地=地面
        const LEVELS = [
            {
                name: '教学关·绕行',
                hint: '到粮草箱左侧推其向右至营地X，再绕到军机箱下方推其向上至营地Y。',
                // 教学关：两箱各推一步+一步即可
                // P(3,1) A(3,2)→X(3,3) B(2,2)→Y(1,2)
                map: [
                    ['#', '#', '#', '#', '#'],
                    ['#', '.', 'Y', '.', '#'],
                    ['#', '.', 'B', '.', '#'],
                    ['#', 'P', 'A', 'X', '#'],
                    ['#', '#', '#', '#', '#']
                ]
            },
            {
                name: '进阶关·精算',
                hint: '将粮草箱推至左下营地X，军机箱推至右下营地Y。注意两墙之间的通道！',
                // 进阶关：两侧有墙，需精确计算推动路线
                // P(2,2) A(1,1)→X(4,0) B(1,3)→Y(4,4)
                map: [
                    ['.', '.', '.', '.', '.'],
                    ['.', 'A', '.', 'B', '.'],
                    ['.', '.', 'P', '.', '.'],
                    ['#', '.', '.', '.', '#'],
                    ['X', '.', '.', '.', 'Y']
                ]
            }
        ];

        // ==================== 游戏运行状态 ====================
        let game = {
            grid: [],          // 底层（空地/墙/目标）
            playerR: 0,
            playerC: 0,
            boxA: { r: 0, c: 0 },
            boxB: { r: 0, c: 0 },
            targetA: { r: 0, c: 0 },
            targetB: { r: 0, c: 0 },
            steps: 0,
            level: 0,
            won: false,
            stuck: false
        };

        // ==================== 页面初始化 ====================
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('诸葛亮线第四幕页面已加载');
            
            clearActStateOnFreshEntry('zhugeState');
            loadZhugeState();
            startZhugeFourthAct();
            bindZhugeEvents();
        });

        // ==================== 状态管理 ====================
        
        function loadZhugeState() {
            try {
                const savedState = localStorage.getItem('zhugeState');
                if (savedState) {
                    const parsed = JSON.parse(savedState);
                    Object.assign(zhugeState, parsed);
                }
                zhugeState.strategyCount = parseInt(localStorage.getItem('zhuge_strategyCount')) || 0;
                zhugeState.efficiencyCount = parseInt(localStorage.getItem('zhuge_efficiencyCount')) || 0;
                
                // 已通关？加载最终属性并锁定（回看模式）
                if (isHeroLineCompleted('zhugeLiang')) {
                    const final = getHeroFinalAttrs('zhugeLiang');
                    if (final) {
                        zhugeState.strategyCount = final.strategy;
                        zhugeState.efficiencyCount = final.efficiency;
                        zhugeState._locked = true;
                    }
                }
                
                updateZhugeStats();
                console.log('诸葛亮线状态已加载', zhugeState._locked ? '(锁定模式)' : '');
            } catch (error) {
                console.error('加载诸葛亮线状态失败:', error);
            }
        }
        
        function saveZhugeState() {
            try {
                localStorage.setItem('zhugeState', JSON.stringify(zhugeState));
                localStorage.setItem('zhuge_strategyCount', zhugeState.strategyCount);
                localStorage.setItem('zhuge_efficiencyCount', zhugeState.efficiencyCount);
                gameState.stats.strategy = zhugeState.strategyCount;
                gameState.stats.efficiency = zhugeState.efficiencyCount;
                saveGameState();
                console.log('诸葛亮线状态已保存');
            } catch (error) {
                console.error('保存诸葛亮线状态失败:', error);
            }
        }
        
        function updateZhugeStats() {
            const strategyElement = document.getElementById('stat-strategy');
            const efficiencyElement = document.getElementById('stat-efficiency');
            const progressElement = document.getElementById('stat-progress');
            
            if (strategyElement) strategyElement.textContent = zhugeState.strategyCount;
            if (efficiencyElement) efficiencyElement.textContent = zhugeState.efficiencyCount;
            if (progressElement) progressElement.textContent = '4/5';
        }

        // ==================== 对话系统 ====================
        
        function addZhugeDialogue(text, speaker = '玩家') {
            const dialogueLog = document.getElementById('dialogue-log');
            if (!dialogueLog) return;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = speaker === '诸葛亮' ? 'zhuge-message' : 'player-message';
            
            const speakerName = speaker === '诸葛亮' ? '诸葛亮' : (speaker === '系统提示' ? '系统提示' : '玩家');
            messageDiv.innerHTML = `<strong>${speakerName}：</strong> ${text}`;
            
            dialogueLog.appendChild(messageDiv);
            dialogueLog.scrollTop = dialogueLog.scrollHeight;
        }

        // ==================== 剧情流程 ====================
        
        function startZhugeFourthAct() {
            const actNumberElement = document.getElementById('act-number');
            const actTextElement = document.getElementById('act-text');
            
            if (actNumberElement) actNumberElement.textContent = zhugeState.currentAct;
            if (actTextElement) {
                const chineseNumbers = ['一', '二', '三', '四', '五'];
                actTextElement.textContent = chineseNumbers[zhugeState.currentAct - 1] || '四';
            }
            
            zhugeState.isGameStarted = true;
            showOpeningDialogues();
        }

        function showOpeningDialogues() {
            const dialogueLog = document.getElementById('dialogue-log');
            if (dialogueLog) dialogueLog.innerHTML = '';
            
            const dialogues = [
                { speaker: "诸葛亮", text: "兵法云：运筹帷幄之中，决胜千里之外。今日便让你一试'推演'之功。" },
                { speaker: "诸葛亮", text: "此为八阵图推演。你需操控令旗，将粮草箱与军机箱分别推至对应的前线营地。" },
                { speaker: "诸葛亮", text: "切记：箱子只能推不能拉，一着不慎满盘皆输。用方向键或WASD移动令旗。" }
            ];
            
            dialogues.forEach((dialogue, index) => {
                setTimeout(() => {
                    addZhugeDialogue(dialogue.text, dialogue.speaker);
                    
                    if (index === dialogues.length - 1) {
                        setTimeout(() => {
                            showSokobanGame(0);
                        }, 800);
                    }
                }, index * 1500);
            });
        }

        // ==================== 推箱子游戏核心 ====================
        
        function loadLevel(levelIndex) {
            const level = LEVELS[levelIndex];
            game = {
                grid: [],
                playerR: 0, playerC: 0,
                boxA: { r: 0, c: 0 },
                boxB: { r: 0, c: 0 },
                targetA: { r: 0, c: 0 },
                targetB: { r: 0, c: 0 },
                steps: 0,
                level: levelIndex,
                won: false,
                stuck: false
            };
            
            for (let r = 0; r < 5; r++) {
                game.grid[r] = [];
                for (let c = 0; c < 5; c++) {
                    const ch = level.map[r][c];
                    switch (ch) {
                        case '#': game.grid[r][c] = 'wall'; break;
                        case 'P':
                            game.grid[r][c] = 'floor';
                            game.playerR = r; game.playerC = c;
                            break;
                        case 'A':
                            game.grid[r][c] = 'floor';
                            game.boxA = { r, c };
                            break;
                        case 'B':
                            game.grid[r][c] = 'floor';
                            game.boxB = { r, c };
                            break;
                        case 'X':
                            game.grid[r][c] = 'targetA';
                            game.targetA = { r, c };
                            break;
                        case 'Y':
                            game.grid[r][c] = 'targetB';
                            game.targetB = { r, c };
                            break;
                        default:
                            game.grid[r][c] = 'floor';
                    }
                }
            }
        }

        function isBox(r, c) {
            return (game.boxA.r === r && game.boxA.c === c) ||
                   (game.boxB.r === r && game.boxB.c === c);
        }

        function getBoxType(r, c) {
            if (game.boxA.r === r && game.boxA.c === c) return 'A';
            if (game.boxB.r === r && game.boxB.c === c) return 'B';
            return null;
        }

        function isWall(r, c) {
            if (r < 0 || r >= 5 || c < 0 || c >= 5) return true;
            return game.grid[r][c] === 'wall';
        }

        function isTarget(r, c) {
            return game.grid[r][c] === 'targetA' || game.grid[r][c] === 'targetB';
        }

        function tryMove(dr, dc) {
            if (game.won) return;
            
            const newR = game.playerR + dr;
            const newC = game.playerC + dc;
            
            // 检查墙壁
            if (isWall(newR, newC)) return;
            
            // 检查是否有箱子
            if (isBox(newR, newC)) {
                const boxNewR = newR + dr;
                const boxNewC = newC + dc;
                
                // 箱子前方不能是墙或其他箱子
                if (isWall(boxNewR, boxNewC) || isBox(boxNewR, boxNewC)) return;
                
                // 移动箱子
                const boxType = getBoxType(newR, newC);
                if (boxType === 'A') {
                    game.boxA = { r: boxNewR, c: boxNewC };
                } else {
                    game.boxB = { r: boxNewR, c: boxNewC };
                }
            }
            
            // 移动玩家
            game.playerR = newR;
            game.playerC = newC;
            game.steps++;
            
            renderGrid();
            updateStepDisplay();
            
            // 检查胜利
            if (checkWin()) {
                game.won = true;
                onLevelWin();
            } else if (checkStuck()) {
                game.stuck = true;
                showStuckHint();
            }
        }

        function checkWin() {
            // 箱A必须在目标A，箱B必须在目标B
            return game.boxA.r === game.targetA.r && game.boxA.c === game.targetA.c &&
                   game.boxB.r === game.targetB.r && game.boxB.c === game.targetB.c;
        }

        function checkStuck() {
            // 检查每个箱子是否被困（在死角且不在目标上）
            const boxes = [
                { box: game.boxA, target: game.targetA, name: '粮草箱' },
                { box: game.boxB, target: game.targetB, name: '军机箱' }
            ];
            
            for (const { box, target, name } of boxes) {
                // 已在目标上则不算卡死
                if (box.r === target.r && box.c === target.c) continue;
                
                // 检查是否在死角（水平和垂直方向都有阻挡）
                const blockedH = isWall(box.r, box.c - 1) || isWall(box.r, box.c + 1);
                const blockedV = isWall(box.r - 1, box.c) || isWall(box.r + 1, box.c);
                
                // 角落判定：两个方向都有阻挡
                if (blockedH && blockedV) return true;
                
                // 检查箱子是否被另一个箱子卡住
                const otherBox = (name === '粮草箱') ? game.boxB : game.boxA;
                // 箱子并排靠墙
                if (box.r === otherBox.r) {
                    if (isWall(box.r, box.c - 1) || isWall(box.r, box.c + 1)) {
                        if (Math.abs(box.c - otherBox.c) === 1) {
                            // 两个箱子并排且其中一侧有墙
                            return true;
                        }
                    }
                }
                if (box.c === otherBox.c) {
                    if (isWall(box.r - 1, box.c) || isWall(box.r + 1, box.c)) {
                        if (Math.abs(box.r - otherBox.r) === 1) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // ==================== 渲染 ====================
        
        function renderGrid() {
            const container = document.getElementById('sokoban-grid');
            if (!container) return;
            container.innerHTML = '';
            
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 5; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'sokoban-cell';
                    
                    const gridType = game.grid[r][c];
                    
                    if (gridType === 'wall') {
                        cell.classList.add('cell-wall');
                    } else if (game.playerR === r && game.playerC === c) {
                        cell.classList.add('cell-player');
                        cell.textContent = '🚩';
                    } else if (game.boxA.r === r && game.boxA.c === c) {
                        cell.classList.add('cell-box-a');
                        if (r === game.targetA.r && c === game.targetA.c) {
                            cell.classList.add('cell-box-on-target');
                        }
                        cell.textContent = '粮';
                    } else if (game.boxB.r === r && game.boxB.c === c) {
                        cell.classList.add('cell-box-b');
                        if (r === game.targetB.r && c === game.targetB.c) {
                            cell.classList.add('cell-box-on-target');
                        }
                        cell.textContent = '机';
                    } else if (gridType === 'targetA') {
                        cell.classList.add('cell-target');
                        cell.textContent = '营';
                    } else if (gridType === 'targetB') {
                        cell.classList.add('cell-target');
                        cell.textContent = '营';
                    } else {
                        cell.classList.add('cell-empty');
                    }
                    
                    container.appendChild(cell);
                }
            }
        }

        function updateStepDisplay() {
            const stepEl = document.getElementById('sokoban-steps');
            if (stepEl) stepEl.textContent = `步数：${game.steps}`;
            
            const levelEl = document.getElementById('sokoban-level');
            if (levelEl) levelEl.textContent = `关卡：${game.level + 1}/2 · ${LEVELS[game.level].name}`;
        }

        // ==================== 游戏UI ====================
        
        function showSokobanGame(levelIndex) {
            loadLevel(levelIndex);
            
            // 解锁八卦阵法成就（进入策略解谜游戏）
            unlockAchievement('zhuge_act4', '八卦阵法', '进入诸葛亮线策略解谜游戏');
            
            const optionsContainer = document.getElementById('zhuge-options');
            if (!optionsContainer) return;
            optionsContainer.innerHTML = '';
            
            // 构建游戏UI
            const wrapper = document.createElement('div');
            wrapper.className = 'sokoban-container';
            wrapper.id = 'sokoban-wrapper';
            
            wrapper.innerHTML = `
                <div class="sokoban-title">八阵图 · 推演</div>
                <div class="sokoban-subtitle">${LEVELS[levelIndex].name}</div>
                <div class="sokoban-info">
                    <div class="sokoban-step-count" id="sokoban-steps">步数：0</div>
                    <div class="sokoban-level-info" id="sokoban-level">关卡：${levelIndex + 1}/2 · ${LEVELS[levelIndex].name}</div>
                </div>
                <div class="sokoban-grid" id="sokoban-grid"></div>
                <div class="sokoban-legend">
                    <div class="sokoban-legend-item">
                        <div class="sokoban-legend-icon" style="background:linear-gradient(135deg,#0066CC,#003d7a);">🚩</div>
                        <span>令旗</span>
                    </div>
                    <div class="sokoban-legend-item">
                        <div class="sokoban-legend-icon" style="background:linear-gradient(135deg,#e8590c,#c92a2a);color:white;font-size:0.6rem;">粮</div>
                        <span>粮草箱</span>
                    </div>
                    <div class="sokoban-legend-item">
                        <div class="sokoban-legend-icon" style="background:linear-gradient(135deg,#2b8a3e,#1a7a2e);color:white;font-size:0.6rem;">机</div>
                        <span>军机箱</span>
                    </div>
                    <div class="sokoban-legend-item">
                        <div class="sokoban-legend-icon" style="border:2px dashed #0066CC;font-size:0.5rem;">营</div>
                        <span>前线营地</span>
                    </div>
                </div>
                <div class="sokoban-controls">
                    <button class="sokoban-btn" id="sokoban-reset" onclick="resetLevel()">重新推演</button>
                    <button class="sokoban-btn" id="sokoban-hint" onclick="showHint()">求助</button>
                </div>
                <div class="sokoban-dpad" id="sokoban-dpad">
                    <div class="sokoban-dpad-btn dpad-empty"></div>
                    <div class="sokoban-dpad-btn" ontouchstart="tryMove(-1,0);event.preventDefault();" onmousedown="tryMove(-1,0);">▲</div>
                    <div class="sokoban-dpad-btn dpad-empty"></div>
                    <div class="sokoban-dpad-btn" ontouchstart="tryMove(0,-1);event.preventDefault();" onmousedown="tryMove(0,-1);">◀</div>
                    <div class="sokoban-dpad-btn dpad-empty"></div>
                    <div class="sokoban-dpad-btn" ontouchstart="tryMove(0,1);event.preventDefault();" onmousedown="tryMove(0,1);">▶</div>
                    <div class="sokoban-dpad-btn dpad-empty"></div>
                    <div class="sokoban-dpad-btn" ontouchstart="tryMove(1,0);event.preventDefault();" onmousedown="tryMove(1,0);">▼</div>
                    <div class="sokoban-dpad-btn dpad-empty"></div>
                </div>
            `;
            
            optionsContainer.appendChild(wrapper);
            
            renderGrid();
            
            // 绑定键盘事件
            document.addEventListener('keydown', handleKeyDown);
        }

        function handleKeyDown(e) {
            const keyMap = {
                'ArrowUp': [-1, 0], 'w': [-1, 0], 'W': [-1, 0],
                'ArrowDown': [1, 0], 's': [1, 0], 'S': [1, 0],
                'ArrowLeft': [0, -1], 'a': [0, -1], 'A': [0, -1],
                'ArrowRight': [0, 1], 'd': [0, 1], 'D': [0, 1]
            };
            
            if (keyMap[e.key]) {
                e.preventDefault();
                const [dr, dc] = keyMap[e.key];
                tryMove(dr, dc);
            }
        }

        function resetLevel() {
            closeHint();
            showSokobanGame(game.level);
        }

        function showHint() {
            // 如果已有提示弹窗则关闭
            closeHint();
            
            const wrapper = document.getElementById('sokoban-wrapper');
            if (!wrapper) return;
            
            const hintModal = document.createElement('div');
            hintModal.className = 'sokoban-hint-modal';
            hintModal.id = 'sokoban-hint-modal';
            hintModal.innerHTML = `
                <h4>💡 推演提示</h4>
                <p>${LEVELS[game.level].hint}</p>
                <button class="sokoban-btn" onclick="closeHint()">知道了</button>
            `;
            wrapper.appendChild(hintModal);
        }

        function closeHint() {
            const existing = document.getElementById('sokoban-hint-modal');
            if (existing) existing.remove();
        }

        function showStuckHint() {
            const wrapper = document.getElementById('sokoban-wrapper');
            if (!wrapper) return;
            
            // 移除之前的提示
            const old = document.getElementById('sokoban-hint-modal');
            if (old) old.remove();
            
            const hintModal = document.createElement('div');
            hintModal.className = 'sokoban-hint-modal';
            hintModal.id = 'sokoban-hint-modal';
            hintModal.innerHTML = `
                <h4>⚠️ 箱子被困</h4>
                <p>箱子被推入了死角，无法再移动。请重新推演！</p>
                <button class="sokoban-btn" onclick="resetLevel()">重新推演</button>
            `;
            wrapper.appendChild(hintModal);
        }

        // ==================== 关卡通关 ====================
        
        function onLevelWin() {
            const wrapper = document.getElementById('sokoban-wrapper');
            if (!wrapper) return;
            
            if (game.level === 0) {
                // 第一关通关，进入第二关
                const victory = document.createElement('div');
                victory.className = 'sokoban-victory';
                victory.innerHTML = `
                    <div class="sokoban-victory-title">🎯 教学关通过！</div>
                    <div class="sokoban-victory-text">善！初窥门径，尚需精进。</div>
                    <div class="sokoban-victory-steps">用时 ${game.steps} 步</div>
                    <button class="sokoban-btn" onclick="goNextLevel()">进入进阶关</button>
                `;
                wrapper.appendChild(victory);
            } else {
                // 第二关通关，游戏完成
                if (!zhugeState._locked) {
                    zhugeState.strategyCount += 1;
                    zhugeState.efficiencyCount += 1;
                }
                zhugeState.gameCompleted = true;
                
                // 解锁阵法大师成就（完成策略解谜游戏）
                unlockAchievement('zhuge_strategy', '阵法大师', '完成诸葛亮线策略解谜游戏');
                
                updateZhugeStats();
                saveZhugeState();
                
                const victory = document.createElement('div');
                victory.className = 'sokoban-victory';
                victory.innerHTML = `
                    <div class="sokoban-victory-title">🏆 八阵图推演完成！</div>
                    <div class="sokoban-victory-text">善！调配有方，行止有度。</div>
                    <div class="sokoban-victory-steps">总计 ${game.steps} 步</div>
                    <div style="color:var(--zhuge-color);margin-bottom:20px;font-size:0.95rem;">谋略+1 效率+1</div>
                    <button class="sokoban-btn" onclick="showCompleteDialogues()">前往知识问答</button>
                `;
                wrapper.appendChild(victory);
            }
        }

        function goNextLevel() {
            // 清理键盘事件避免重复绑定
            document.removeEventListener('keydown', handleKeyDown);
            showSokobanGame(1);
        }

        function showCompleteDialogues() {
            document.removeEventListener('keydown', handleKeyDown);
            
            const dialogueLog = document.getElementById('dialogue-log');
            const optionsContainer = document.getElementById('zhuge-options');
            
            if (dialogueLog) dialogueLog.innerHTML = '';
            if (optionsContainer) optionsContainer.innerHTML = '';
            
            addZhugeDialogue("善！调配有方，行止有度。此番推演，你已略具将帅之姿。", '诸葛亮');
            
            setTimeout(() => {
                addZhugeDialogue("接下来，该考考你的真才实学了。", '诸葛亮');
                
                setTimeout(() => {
                    const continueBtn = document.createElement('button');
                    continueBtn.className = 'btn btn-primary';
                    continueBtn.textContent = '前往知识问答';
                    continueBtn.style.padding = '15px 40px';
                    continueBtn.style.fontSize = '1.1rem';
                    continueBtn.addEventListener('click', () => nextScene());
                    
                    optionsContainer.appendChild(continueBtn);
                }, 1500);
            }, 1500);
        }

        // ==================== 导航 ====================
        
        function nextScene() {
            saveZhugeState();
            saveProgress('zhugeLiang', 4);
            window.location.href = 'zhuge_act5_quiz.html';
        }

        // ==================== 事件绑定 ====================
        
        function bindZhugeEvents() {
            const goHomeBtn = document.querySelector('[data-action="go-home"]');
            if (goHomeBtn) {
                goHomeBtn.addEventListener('click', function() {
                    document.removeEventListener('keydown', handleKeyDown);
                    window.location.href = '../index.html';
                });
            }
        }
    </script>
</body>
</html>
