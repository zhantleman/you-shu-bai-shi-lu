<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赵云线 · 游蜀拜师录</title>
    <link rel="icon" type="image/svg+xml" href="../genie.svg">
    <meta name="description" content="赵云线第四幕 - 长坂反应">
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/hero-styles.css">
</head>
<body>
    <div class="zhao-header">
        <div class="container">
            <div class="hero-header">
                <div class="hero-info">
                    <h1 class="hero-name">
                        <span class="hero-name-icon">⚔️</span>
                        赵云 · 苍天翔龙
                    </h1>
                    <p class="hero-title">勇者之誓 · 长坂反应</p>
                    
                    <div class="stats-container" id="zhao-stats">
                        <div class="zhao-stat">
                            <div class="stat-icon">💪</div>
                            <div class="stat-label">勇气</div>
                            <div class="stat-value" id="stat-courage">0</div>
                        </div>
                        <div class="zhao-stat">
                            <div class="stat-icon">🛡️</div>
                            <div class="stat-label">守护</div>
                            <div class="stat-value" id="stat-guard">0</div>
                        </div>
                        <div class="zhao-stat">
                            <div class="stat-icon">🎯</div>
                            <div class="stat-label">进度</div>
                            <div class="stat-value" id="stat-progress">4/5</div>
                        </div>
                    </div>
                </div>
                
                <div class="act-indicator">
                    <div class="act-number" id="act-number">4</div>
                    <div class="act-text">第 <span id="act-text">四</span> 幕</div>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-secondary" data-action="go-home">
                    ← 返回首页
                </button>
            </div>
        </div>
    </div>
    
    <div class="container">
        <!-- 剧情对话区域 -->
        <div class="game-scene" id="dialogue-scene">
            <div class="dialogue-container">
                <h3 class="scene-title" id="scene-title">第四幕 · 长坂反应</h3>
                
                <div id="dialogue-log" class="dialogue-log">
                </div>
                
                <div class="zhao-options" id="zhao-options">
                </div>
            </div>
        </div>
        
        <!-- 反应测试游戏 -->
        <div class="reaction-game-container" id="reaction-game" style="display:none;">
            <h2 class="reaction-title">⚔️ 长坂反应 · 突袭训练</h2>
            <p class="reaction-subtitle">展现你的勇气和反应速度！在15秒内点击尽可能多的敌军目标，避开平民。</p>
            
            <div class="reaction-info-bar">
                <div class="reaction-info-item" id="game-timer">⏱️ 倒计时: 15秒</div>
                <div class="reaction-info-item" id="game-score">🎯 得分: 0</div>
                <div class="reaction-info-item" id="game-combo">🔥 连击: 0</div>
            </div>
            
            <div id="reaction-area" class="reaction-area">
            </div>
            
            <div class="reaction-controls">
                <button id="start-game-btn" class="sokoban-btn" style="background: linear-gradient(135deg, var(--zhao-color), #e64580);">开始突袭</button>
                <button id="restart-game-btn" class="sokoban-btn" style="display:none;">重新突袭</button>
            </div>
        </div>
    </div>
    
    <script src="../js/common.js"></script>
    
    <script>
        const zhaoState = {
            currentAct: 4,
            courage: 0,
            guard: 0,
            reactionScore: 0,
            gameCompleted: false
        };
        
        let reactionGame = {
            isActive: false,
            timeLeft: 15,
            score: 0,
            combo: 0,
            maxCombo: 0,
            timerInterval: null,
            targetInterval: null
        };
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('赵云线第四幕页面已加载');
            clearActStateOnFreshEntry('zhaoState');
            loadZhaoState();
            startZhaoFourthAct();
            bindZhaoEvents();
            document.body.style.display = 'block';
        });
        
        function loadZhaoState() {
            try {
                const savedState = localStorage.getItem('zhaoState');
                if (savedState) {
                    const parsed = JSON.parse(savedState);
                    Object.assign(zhaoState, parsed);
                }
                zhaoState.courage = parseInt(localStorage.getItem('zhao_courage')) || 0;
                zhaoState.guard = parseInt(localStorage.getItem('zhao_guard')) || 0;
                
                // 已通关？加载最终属性并锁定（回看模式）
                if (isHeroLineCompleted('zhaoYun')) {
                    const final = getHeroFinalAttrs('zhaoYun');
                    if (final) {
                        zhaoState.courage = final.courage;
                        zhaoState.guard = final.guard;
                        zhaoState._locked = true;
                    }
                }
                
                updateZhaoStats();
                console.log('赵云线状态已加载', zhaoState._locked ? '(锁定模式)' : '');
            } catch (error) {
                console.error('加载赵云线状态失败:', error);
            }
        }
        
        function saveZhaoState() {
            try {
                localStorage.setItem('zhaoState', JSON.stringify(zhaoState));
                localStorage.setItem('zhao_courage', zhaoState.courage);
                localStorage.setItem('zhao_guard', zhaoState.guard);
                gameState.stats.courage = zhaoState.courage;
                gameState.stats.guard = zhaoState.guard;
                saveGameState();
                console.log('赵云线状态已保存');
            } catch (error) {
                console.error('保存赵云线状态失败:', error);
            }
        }
        
        function updateZhaoStats() {
            const courageEl = document.getElementById('stat-courage');
            const guardEl = document.getElementById('stat-guard');
            const progressEl = document.getElementById('stat-progress');
            if (courageEl) courageEl.textContent = zhaoState.courage;
            if (guardEl) guardEl.textContent = zhaoState.guard;
            if (progressEl) progressEl.textContent = '4/5';
        }
        
        function addZhaoDialogue(text, speaker = '玩家') {
            const dialogueLog = document.getElementById('dialogue-log');
            if (!dialogueLog) return;
            const messageDiv = document.createElement('div');
            messageDiv.className = speaker === '赵云' ? 'zhao-message' : 'player-message';
            const speakerName = speaker === '赵云' ? '赵云' : '玩家';
            messageDiv.innerHTML = `<strong>${speakerName}：</strong> ${text}`;
            dialogueLog.appendChild(messageDiv);
            dialogueLog.scrollTop = dialogueLog.scrollHeight;
        }
        
        function startZhaoFourthAct() {
            document.getElementById('dialogue-scene').style.display = 'block';
            document.getElementById('reaction-game').style.display = 'none';
            
            if (zhaoState.gameCompleted) {
                showCompletedState();
                return;
            }
            
            addZhaoDialogue("三关已过，你的勇气与守护皆有所成。但真正的战场，容不得半点迟疑。", '赵云');
            
            setTimeout(() => {
                addZhaoDialogue("长坂坡前，七进七出——靠的不只是勇猛，更是超凡的反应与判断。现在，让我来试炼你的反应速度！", '赵云');
                
                setTimeout(() => {
                    const startBtn = document.createElement('button');
                    startBtn.className = 'zhao-option';
                    startBtn.textContent = '开始突袭试炼';
                    startBtn.style.fontSize = '1.2rem';
                    startBtn.style.padding = '15px 40px';
                    startBtn.addEventListener('click', () => enterReactionGame());
                    
                    const optionsContainer = document.getElementById('zhao-options');
                    optionsContainer.innerHTML = '';
                    optionsContainer.appendChild(startBtn);
                }, 1500);
            }, 1500);
        }
        
        function enterReactionGame() {
            document.getElementById('dialogue-scene').style.display = 'none';
            document.getElementById('reaction-game').style.display = 'block';
            
            // 解锁翔龙反应成就（进入反应测试游戏）
            unlockAchievement('zhao_act4', '翔龙反应', '进入赵云线反应测试游戏');
            
            initReactionGame();
        }
        
        function initReactionGame() {
            const area = document.getElementById('reaction-area');
            area.innerHTML = '';
            reactionGame = { isActive: false, timeLeft: 15, score: 0, combo: 0, maxCombo: 0, timerInterval: null, targetInterval: null };
            document.getElementById('game-timer').textContent = '⏱️ 倒计时: 15秒';
            document.getElementById('game-score').textContent = '🎯 得分: 0';
            document.getElementById('game-combo').textContent = '🔥 连击: 0';
            document.getElementById('start-game-btn').style.display = 'inline-block';
            document.getElementById('restart-game-btn').style.display = 'none';
        }
        
        function startReactionRound() {
            if (reactionGame.isActive) return;
            const area = document.getElementById('reaction-area');
            area.innerHTML = '';
            reactionGame.isActive = true;
            reactionGame.timeLeft = 15;
            reactionGame.score = 0;
            reactionGame.combo = 0;
            reactionGame.maxCombo = 0;
            
            document.getElementById('start-game-btn').style.display = 'none';
            document.getElementById('restart-game-btn').style.display = 'none';
            
            startTimer();
            generateTargets();
        }
        
        function startTimer() {
            clearInterval(reactionGame.timerInterval);
            reactionGame.timerInterval = setInterval(() => {
                reactionGame.timeLeft--;
                document.getElementById('game-timer').textContent = `⏱️ 倒计时: ${reactionGame.timeLeft}秒`;
                if (reactionGame.timeLeft <= 0) endReactionRound();
            }, 1000);
        }
        
        function generateTargets() {
            reactionGame.targetInterval = setInterval(() => {
                if (!reactionGame.isActive) { clearInterval(reactionGame.targetInterval); return; }
                const area = document.getElementById('reaction-area');
                
                // 70%敌军，30%平民
                const isEnemy = Math.random() < 0.7;
                const target = document.createElement('div');
                target.className = isEnemy ? 'reaction-target enemy-target' : 'reaction-target civilian-target';
                target.textContent = isEnemy ? '⚔️' : '🛡️';
                
                const x = Math.random() * (area.clientWidth - 60);
                const y = Math.random() * (area.clientHeight - 60);
                target.style.left = `${x}px`;
                target.style.top = `${y}px`;
                
                target.onclick = () => {
                    if (!reactionGame.isActive) return;
                    if (isEnemy) {
                        reactionGame.score++;
                        reactionGame.combo++;
                        if (reactionGame.combo > reactionGame.maxCombo) reactionGame.maxCombo = reactionGame.combo;
                        target.classList.add('hit');
                        setTimeout(() => target.remove(), 200);
                    } else {
                        // 点击平民扣分，连击归零
                        reactionGame.score = Math.max(0, reactionGame.score - 2);
                        reactionGame.combo = 0;
                        target.classList.add('miss');
                        setTimeout(() => target.remove(), 300);
                    }
                    document.getElementById('game-score').textContent = `🎯 得分: ${reactionGame.score}`;
                    document.getElementById('game-combo').textContent = `🔥 连击: ${reactionGame.combo}`;
                };
                
                // 自动消失
                setTimeout(() => {
                    if (target.parentNode && reactionGame.isActive) target.remove();
                }, isEnemy ? 1800 : 2500);
                
                area.appendChild(target);
            }, 700);
        }
        
        function endReactionRound() {
            reactionGame.isActive = false;
            clearInterval(reactionGame.targetInterval);
            clearInterval(reactionGame.timerInterval);
            
            const area = document.getElementById('reaction-area');
            area.innerHTML = '';
            
            document.getElementById('restart-game-btn').style.display = 'inline-block';
            
            // 计算奖励（阶梯式）
            let courageBonus = 0, guardBonus = 0;
            if (reactionGame.score >= 15) {
                courageBonus = 2;
                guardBonus = 1;
            } else if (reactionGame.score >= 10) {
                courageBonus = 1;
                guardBonus = 1;
            } else if (reactionGame.score >= 5) {
                courageBonus = 1;
                guardBonus = 0;
            }
            
            // 显示结果覆盖层
            const container = document.querySelector('.reaction-game-container');
            const resultDiv = document.createElement('div');
            resultDiv.className = 'sokoban-victory';
            resultDiv.innerHTML = `
                <div class="sokoban-victory-title">⚔️ 突袭结束！</div>
                <div class="sokoban-victory-text">最终得分: ${reactionGame.score}　最高连击: ${reactionGame.maxCombo}</div>
                <div class="sokoban-victory-steps">勇气+${courageBonus}　守护+${guardBonus}</div>
                <button class="sokoban-btn" onclick="this.parentElement.remove(); showGameComplete();">继续</button>
            `;
            container.appendChild(resultDiv);
            
            if (!zhaoState._locked) {
                zhaoState.courage += courageBonus;
                zhaoState.guard += guardBonus;
            }
            zhaoState.reactionScore = reactionGame.score;
            zhaoState.gameCompleted = true;
            
            // 解锁反应大师成就（得分10以上）
            if (reactionGame.score >= 10) {
                unlockAchievement('zhao_reaction_master', '反应大师', '在反应测试中获得10分以上');
            }
            
            saveZhaoState();
            updateZhaoStats();
        }
        
        function showGameComplete() {
            document.getElementById('reaction-game').style.display = 'none';
            document.getElementById('dialogue-scene').style.display = 'block';
            
            const dialogueLog = document.getElementById('dialogue-log');
            dialogueLog.innerHTML = '';
            const optionsContainer = document.getElementById('zhao-options');
            optionsContainer.innerHTML = '';
            
            addZhaoDialogue(`得分${zhaoState.reactionScore}！不错，你的反应速度可堪一用。战场上，快人一步便是生与死的差距。`, '赵云');
            
            setTimeout(() => {
                addZhaoDialogue("接下来，该考考你的真本事了。勇者不仅要有快反应，更要有真见识。", '赵云');
                
                setTimeout(() => {
                    const continueBtn = document.createElement('button');
                    continueBtn.className = 'zhao-option';
                    continueBtn.textContent = '前往勇者问答';
                    continueBtn.style.fontSize = '1.2rem';
                    continueBtn.style.padding = '15px 40px';
                    continueBtn.addEventListener('click', () => nextScene());
                    optionsContainer.appendChild(continueBtn);
                }, 1500);
            }, 1500);
        }
        
        function showCompletedState() {
            const dialogueLog = document.getElementById('dialogue-log');
            dialogueLog.innerHTML = '';
            const optionsContainer = document.getElementById('zhao-options');
            optionsContainer.innerHTML = '';
            
            addZhaoDialogue("突袭试炼已完成。准备好了就去面对最终的勇者问答吧。", '赵云');
            setTimeout(() => {
                const continueBtn = document.createElement('button');
                continueBtn.className = 'zhao-option';
                continueBtn.textContent = '前往勇者问答';
                continueBtn.style.fontSize = '1.2rem';
                continueBtn.style.padding = '15px 40px';
                continueBtn.addEventListener('click', () => nextScene());
                optionsContainer.appendChild(continueBtn);
            }, 800);
        }
        
        function nextScene() {
            saveZhaoState();
            saveProgress('zhaoYun', 4);
            window.location.href = 'zhao_yun_act5_quiz.html';
        }
        
        function bindZhaoEvents() {
            const goHomeBtn = document.querySelector('[data-action="go-home"]');
            if (goHomeBtn) {
                goHomeBtn.addEventListener('click', function() {
                    window.location.href = '../index.html';
                });
            }
            document.getElementById('start-game-btn').addEventListener('click', startReactionRound);
            document.getElementById('restart-game-btn').addEventListener('click', function() {
                initReactionGame();
                startReactionRound();
            });
        }
    </script>
    
    <style>
        .reaction-game-container {
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.9), rgba(30, 20, 20, 0.95));
            border-radius: 15px;
            padding: 30px;
            margin: 0 auto 40px;
            border: 1px solid var(--zhao-color-light);
            max-width: 700px;
            position: relative;
            overflow: hidden;
            text-align: center;
        }
        .reaction-title {
            font-size: 1.8rem;
            color: var(--zhao-color);
            margin-bottom: 8px;
        }
        .reaction-subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 20px;
        }
        .reaction-info-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .reaction-info-item {
            font-size: 1rem;
            color: var(--zhao-color);
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--zhao-color-light);
        }
        .reaction-area {
            width: 100%;
            height: 350px;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid rgba(200,200,215,0.15);
        }
        .reaction-target {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
            animation: targetAppear 0.3s ease;
        }
        .enemy-target {
            background: rgba(220, 50, 50, 0.3);
            border: 2px solid rgba(220, 50, 50, 0.6);
        }
        .civilian-target {
            background: rgba(50, 150, 220, 0.3);
            border: 2px solid rgba(50, 150, 220, 0.6);
        }
        .reaction-target.hit {
            background: rgba(50, 200, 50, 0.5);
            transform: scale(1.3);
            border-color: #51cf66;
        }
        .reaction-target.miss {
            background: rgba(200, 50, 50, 0.5);
            transform: scale(0.8);
            border-color: #dc3545;
        }
        .reaction-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        @keyframes targetAppear {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
        @media (max-width: 768px) {
            .reaction-area { height: 280px; }
            .reaction-target { width: 44px; height: 44px; font-size: 1.2rem; }
        }
        @media (max-width: 480px) {
            .reaction-game-container { padding: 20px; }
            .reaction-area { height: 240px; }
            .reaction-target { width: 40px; height: 40px; font-size: 1rem; }
            .reaction-title { font-size: 1.4rem; }
        }
    </style>
</body>
</html>
