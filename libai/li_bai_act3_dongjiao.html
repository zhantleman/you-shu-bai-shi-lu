<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李白线 · 第三幕 · 东郊记忆</title>
    <link rel="icon" type="image/svg+xml" href="../genie.svg">
    <meta name="description" content="李白线第三幕 - 东郊记忆·Daji Cafe">
    
    <!-- 引用公共CSS -->
    <link rel="stylesheet" href="../css/style.css">
    
    <!-- 李白线公共CSS -->
    <link rel="stylesheet" href="../css/hero-styles.css">
</head>
<body class="act-bg" style="background-image: url('../images/dongjiao-memory.jpeg');">
    <!-- 页面顶部 -->
    <div class="li-bai-header">
        <div class="container">
            <div class="hero-header">
                <div class="hero-info">
                    <h1 class="hero-name">
                        <span class="hero-name-icon">🍷</span>
                        李白 · 青莲剑仙
                    </h1>
                    <p class="hero-title">诗酒剑意 · 东郊记忆·Daji Cafe</p>
                    
                    <div class="stats-container" id="li-bai-stats">
                        <!-- 状态数据会由JavaScript动态更新 -->
                        <div class="li-bai-stat">
                            <div class="stat-icon">📜</div>
                            <div class="stat-label">诗心</div>
                            <div class="stat-value" id="stat-poetry">0</div>
                        </div>
                        <div class="li-bai-stat">
                            <div class="stat-icon">🍶</div>
                            <div class="stat-label">酒意</div>
                            <div class="stat-value" id="stat-wine">0</div>
                        </div>
                        <div class="li-bai-stat">
                            <div class="stat-icon">🎯</div>
                            <div class="stat-label">探索</div>
                            <div class="stat-value" id="stat-explored">0/2</div>
                        </div>
                    </div>
                </div>
                
                <div class="act-indicator">
                    <div class="act-number" id="act-number">3</div>
                    <div class="act-text">第 <span id="act-text">三</span> 幕</div>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-secondary" data-action="go-home">
                    ← 返回首页
                </button>
            </div>
        </div>
    </div>
    
    <!-- 游戏主内容 -->
    <div class="container">
        <!-- 剧情对话区域 -->
        <div class="game-scene" id="dialogue-scene">
            <div class="dialogue-container">
                <h3 class="scene-title" id="scene-title">第三幕 · 东郊记忆·Daji Cafe</h3>
                
                <div id="dialogue-log" class="dialogue-log">
                    <!-- 对话内容会由JavaScript动态添加 -->
                </div>
                
                <div class="li-bai-options" id="li-bai-options">
                    <!-- 选项按钮会由JavaScript动态生成 -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- 引用公共JavaScript -->
    <script src="../js/common.js"></script>
    
    <!-- 李白线第三幕特有JavaScript -->
    <script>
        // 李白线状态变量
        const liBaiState = {
            currentAct: 3,                // 当前幕数
            currentStep: 'opening',       // 当前步骤：opening/explore/quiz/choice
            quizScore: 0,                 // 知识验证答对数
            poetryCount: 0,               // 诗心数量
            wineCount: 0,                 // 酒意数量
            exploredOptions: {            // 探索选项是否已点
                option1: false,
                option2: false
            }
        };
        
        // ==================== 页面初始化 ====================
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('李白线第三幕页面已加载');
            
            // 如果是fresh进入，清除旧状态使对话从头开始
            clearActStateOnFreshEntry('liBaiState');
            
            // 加载李白线状态
            loadLiBaiState();
            
            // 开始第三幕
            startLiBaiThirdAct();
            
            // 绑定事件
            bindLiBaiEvents();
        });
        
        // ==================== 状态管理 ====================
        
        // 加载李白线状态
        function loadLiBaiState() {
            try {
                const savedState = localStorage.getItem('liBaiState');
                if (savedState) {
                    const parsed = JSON.parse(savedState);
                    Object.assign(liBaiState, parsed);
                }
                
                // 加载诗心和酒意
                liBaiState.poetryCount = parseInt(localStorage.getItem('liBai_poetryCount')) || 0;
                liBaiState.wineCount = parseInt(localStorage.getItem('liBai_wineCount')) || 0;
                
                // 已通关？加载最终属性并锁定（回看模式）
                if (isHeroLineCompleted('liBai')) {
                    const final = getHeroFinalAttrs('liBai');
                    if (final) {
                        liBaiState.poetryCount = final.poem;
                        liBaiState.wineCount = final.wine;
                        liBaiState._locked = true;
                    }
                }
                
                updateLiBaiStats();
                console.log('李白线状态已加载', liBaiState._locked ? '(锁定模式)' : '');
            } catch (error) {
                console.error('加载李白线状态失败:', error);
            }
        }
        
        // 保存李白线状态
        function saveLiBaiState() {
            try {
                localStorage.setItem('liBaiState', JSON.stringify(liBaiState));
                localStorage.setItem('liBai_poetryCount', liBaiState.poetryCount);
                localStorage.setItem('liBai_wineCount', liBaiState.wineCount);
                
                // 同时保存到全局状态
                gameState.stats.poem = liBaiState.poetryCount;
                gameState.stats.wine = liBaiState.wineCount;
                saveGameState();
                
                console.log('李白线状态已保存');
            } catch (error) {
                console.error('保存李白线状态失败:', error);
            }
        }
        
        // 更新李白线状态显示
        function updateLiBaiStats() {
            document.getElementById('stat-poetry').textContent = liBaiState.poetryCount;
            document.getElementById('stat-wine').textContent = liBaiState.wineCount;
            
            // 计算已探索数量
            const exploredCount = (liBaiState.exploredOptions.option1 ? 1 : 0) + 
                                 (liBaiState.exploredOptions.option2 ? 1 : 0);
            document.getElementById('stat-explored').textContent = `${exploredCount}/2`;
            
            // 更新幕数显示
            document.getElementById('act-number').textContent = liBaiState.currentAct;
            const actText = ['一', '二', '三', '四'][liBaiState.currentAct - 1] || liBaiState.currentAct;
            document.getElementById('act-text').textContent = actText;
        }
        
        // ==================== 剧情逻辑 ====================
        
        // 李白线第三幕开始
        function startLiBaiThirdAct() {
            liBaiState.currentAct = 3;
            liBaiState.currentStep = 'opening';
            liBaiState.exploredOptions = { option1: false, option2: false };
            
            // 清空对话日志
            const dialogueLog = document.getElementById('dialogue-log');
            dialogueLog.innerHTML = '';
            
            // 更新状态显示
            updateLiBaiStats();
            
            // 播放开场白
            addLiBaiDialogue("最后一站，东郊记忆。此地的Daji Cafe，乃妲己主题餐厅，粉妆玉砌，与那铁血厂房相映成趣。", '李白');
            
            // 延迟进入探索阶段
            setTimeout(() => {
                liBaiState.currentStep = 'explore';
                enterExploreStep();
            }, 2000);
            
            saveLiBaiState();
        }
        
        // 添加李白线对话
        function addLiBaiDialogue(text, speaker) {
            const dialogueLog = document.getElementById('dialogue-log');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = speaker === '李白' ? 'li-bai-message' : 'player-message';
            
            const speakerName = speaker === '李白' ? '李白' : '玩家';
            messageDiv.innerHTML = `<strong>${speakerName}：</strong> ${text}`;
            
            dialogueLog.appendChild(messageDiv);
            
            // 自动滚动到底部
            dialogueLog.scrollTop = dialogueLog.scrollHeight;
            
            // 确保对话历史已初始化
            if (!Array.isArray(gameState.dialogueHistory)) {
                gameState.dialogueHistory = [];
            }
            
            // 保存到对话历史
            gameState.dialogueHistory.push({
                text: text,
                speaker: speaker === '李白' ? 'hero' : 'player',
                heroName: speaker,
                timestamp: new Date().toISOString()
            });
            
            // 保存对话历史
            try {
                localStorage.setItem('game_dialogue_history', JSON.stringify(gameState.dialogueHistory));
            } catch (error) {
                console.error('保存对话历史失败:', error);
            }
        }
        
        // 进入探索阶段
        function enterExploreStep() {
            addLiBaiDialogue("这妲己餐厅挺有意思的，你有什么想问的？", '李白');
            updateLiBaiOptions();
        }
        
        // 更新李白线选项
        function updateLiBaiOptions() {
            const optionsContainer = document.getElementById('li-bai-options');
            optionsContainer.innerHTML = '';
            
            const btn1 = document.createElement('button');
            const btn2 = document.createElement('button');
            const btn3 = document.createElement('button');
            
            btn1.className = 'li-bai-option';
            btn2.className = 'li-bai-option';
            btn3.className = 'li-bai-option';
            
            // 根据当前步骤设置按钮
            switch(liBaiState.currentStep) {
                case 'explore':
                    btn1.textContent = "这粉红露台，和电竞的硬核感不太搭吧？";
                    btn2.textContent = "这里除了拍照，东西好吃吗？";
                    btn3.textContent = "畅饮美酒";
                    
                    // 禁用已探索的选项
                    if (liBaiState.exploredOptions.option1) {
                        btn1.disabled = true;
                        btn1.style.opacity = '0.5';
                    }
                    if (liBaiState.exploredOptions.option2) {
                        btn2.disabled = true;
                        btn2.style.opacity = '0.5';
                    }
                    
                    // 隐藏第三个按钮（用于占位）
                    btn3.style.display = 'none';
                    
                    btn1.onclick = () => exploreOption1();
                    btn2.onclick = () => exploreOption2();
                    break;
                    
                case 'quiz':
                    btn1.textContent = "粉红洛丽塔风";
                    btn2.textContent = "赛博朋克风";
                    btn3.textContent = "畅饮美酒";
                    btn3.style.display = 'none';
                    
                    btn1.onclick = () => quizAnswer(true);
                    btn2.onclick = () => quizAnswer(false);
                    break;
                    
                case 'choice':
                    btn1.textContent = "这粉红战场，凄美如诗，我欣赏这份柔美。";
                    btn2.textContent = "花里胡哨的，真英雄该去那边厂房！";
                    btn3.textContent = "前往知识问答";
                    
                    // 如果已经做出了选择，显示第三个按钮
                    if (liBaiState.poetryCount > 0 || liBaiState.wineCount > 0) {
                        btn3.style.display = 'inline-block';
                        btn3.onclick = nextScene;
                    } else {
                        btn3.style.display = 'none';
                    }
                    
                    btn1.onclick = () => finalChoice('poetry');
                    btn2.onclick = () => finalChoice('wine');
                    break;
            }
            
            optionsContainer.appendChild(btn1);
            optionsContainer.appendChild(btn2);
            optionsContainer.appendChild(btn3);
            
            updateLiBaiStats();
        }
        
        // 探索选项1
        function exploreOption1() {
            addLiBaiDialogue("这粉红露台，和电竞的硬核感不太搭吧？", '玩家');
            
            setTimeout(() => {
                addLiBaiDialogue("此言差矣！电竞之道，本就包容。少女心也好，工业风也罢，皆是热爱的一种模样。", '李白');
            }, 800);
            
            liBaiState.exploredOptions.option1 = true;
            updateLiBaiStats();
            
            setTimeout(() => {
                checkAllExplored();
            }, 1500);
            
            saveLiBaiState();
        }
        
        // 探索选项2
        function exploreOption2() {
            addLiBaiDialogue("这里除了拍照，东西好吃吗？", '玩家');
            
            setTimeout(() => {
                addLiBaiDialogue("牛排、意面皆是常物，妙在那杯妲己拉花的咖啡，与那狐狸尾座椅，让人恍如置身王者峡谷的野区。", '李白');
            }, 800);
            
            liBaiState.exploredOptions.option2 = true;
            updateLiBaiStats();
            
            setTimeout(() => {
                checkAllExplored();
            }, 1500);
            
            saveLiBaiState();
        }
        
        // 检查是否所有探索都已完成
        function checkAllExplored() {
            const exploredCount = (liBaiState.exploredOptions.option1 ? 1 : 0) + 
                                 (liBaiState.exploredOptions.option2 ? 1 : 0);
            
            if (exploredCount === 2) {
                setTimeout(() => {
                    liBaiState.currentStep = 'quiz';
                    enterQuizStep();
                }, 1000);
            } else {
                updateLiBaiOptions();
            }
        }
        
        // 验证阶段入口
        function enterQuizStep() {
            setTimeout(() => {
                addLiBaiDialogue("小子，说说看，Daji Cafe 的整体风格是什么？", '李白');
                liBaiState.currentStep = 'quiz';
                updateLiBaiOptions();
            }, 1000);
            
            saveLiBaiState();
        }
        
        // 知识验证回答
        function quizAnswer(isCorrect) {
            if (isCorrect) {
                addLiBaiDialogue("粉红洛丽塔风", '玩家');
                
                setTimeout(() => {
                    addLiBaiDialogue("不错！正是粉红洛丽塔风格，少女心满满。", '李白');
                    liBaiState.quizScore += 1;
                }, 800);
            } else {
                addLiBaiDialogue("赛博朋克风", '玩家');
                
                setTimeout(() => {
                    addLiBaiDialogue("哈哈，要是赛博朋克风格，就该是霓虹灯和机械义肢了。这里是粉红洛丽塔风格。", '李白');
                }, 800);
            }
            
            setTimeout(() => {
                liBaiState.currentStep = 'choice';
                enterChoiceStep();
            }, 1500);
            
            saveLiBaiState();
        }
        
        // 终极选择阶段入口
        function enterChoiceStep() {
            setTimeout(() => {
                addLiBaiDialogue("三站已游，你对这粉红战场是欣赏，还是嫌弃？", '李白');
                liBaiState.currentStep = 'choice';
                updateLiBaiOptions();
            }, 1000);
            
            saveLiBaiState();
        }
        
        // 最终选择
        function finalChoice(type) {
            if (type === 'poetry') {
                addLiBaiDialogue("这粉红战场，凄美如诗，我欣赏这份柔美。", '玩家');
                
                setTimeout(() => {
                    addLiBaiDialogue("好！能欣赏不同风格之美，诗心更上一层！", '李白');
                    if (!liBaiState._locked) liBaiState.poetryCount += 1;
                }, 800);
            } else {
                addLiBaiDialogue("花里胡哨的，真英雄该去那边厂房！", '玩家');
                
                setTimeout(() => {
                    addLiBaiDialogue("哈哈！还是喜欢硬朗风格，酒意又添一分！", '李白');
                    if (!liBaiState._locked) liBaiState.wineCount += 1;
                }, 800);
            }
            
            // 保存状态
            saveLiBaiState();
            
            setTimeout(() => {
                // 显示第三个按钮（前往诗词问答）
                updateLiBaiOptions();
            }, 1500);
        }
        
        // 前往第四幕（诗词问答）
        function nextScene() {
            addLiBaiDialogue("前往诗词问答", '玩家');
            
            setTimeout(() => {
                addLiBaiDialogue("好！三站已游，接下来考考你记得多少。走！", '李白');
                
                // 保存进度到第4幕
                saveProgress('liBai', 4);
                
                // 跳转到第四幕
                window.location.href = "li_bai_act4_quiz.html";
            }, 800);
            
            saveLiBaiState();
        }
        
        // ==================== 事件绑定 ====================
        
        function bindLiBaiEvents() {
            // 返回首页按钮
            const backHomeBtn = document.querySelector('[data-action="go-home"]');
            if (backHomeBtn) {
                backHomeBtn.addEventListener('click', goHome);
            }
        }
    </script>
</body>
</html>
