<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结业证书 · 游蜀拜师录</title>
    <link rel="icon" type="image/svg+xml" href="genie.svg">
    <meta name="description" content="结业证书 - 你的蜀地之旅圆满完成">
    
    <!-- 引用公共CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- 证书页面特有样式 -->
    <style>
        :root {
            --cert-gold: #ffd700;
            --cert-gold-dark: #b8860b;
            --cert-hero-color: #C8C8D7;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
        }

        .cert-wrapper {
            width: 100%;
            max-width: 680px;
            animation: certFadeIn 1s ease-out;
        }

        @keyframes certFadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .cert-card {
            background: linear-gradient(135deg, 
                rgba(255, 215, 0, 0.06), 
                rgba(255, 255, 255, 0.02),
                rgba(200, 200, 215, 0.03));
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 24px;
            padding: 50px 40px;
            position: relative;
            overflow: hidden;
        }

        /* 双层内边框 */
        .cert-card::before {
            content: '';
            position: absolute;
            top: 14px;
            left: 14px;
            right: 14px;
            bottom: 14px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 14px;
            pointer-events: none;
        }

        /* 背景水印 */
        .cert-card::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .cert-seal {
            position: absolute;
            top: 24px;
            right: 28px;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--cert-gold), var(--cert-gold-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            opacity: 0.8;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
        }

        .cert-top-label {
            text-align: center;
            font-size: 0.9rem;
            letter-spacing: 8px;
            color: rgba(255, 215, 0, 0.6);
            margin-bottom: 10px;
        }

        .cert-title {
            text-align: center;
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--cert-gold), #fff8dc, var(--cert-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: 6px;
        }

        .cert-subtitle {
            text-align: center;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
        }

        .cert-divider {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cert-gold), transparent);
            margin: 0 auto 30px;
        }

        .cert-body {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .cert-to {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
        }

        .cert-name {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: 3px;
        }

        .cert-title-earned {
            display: inline-block;
            padding: 6px 24px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 24px;
            letter-spacing: 2px;
        }

        .cert-title-earned.libai {
            background: linear-gradient(135deg, rgba(96, 224, 255, 0.3), rgba(212, 175, 55, 0.3));
            border: 1px solid rgba(96, 224, 255, 0.5);
            color: #60E0FF;
        }

        .cert-title-earned.zhuge {
            background: linear-gradient(135deg, rgba(0, 102, 204, 0.3), rgba(255, 140, 0, 0.3));
            border: 1px solid rgba(0, 102, 204, 0.5);
            color: #0066CC;
        }

        .cert-title-earned.zhao {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.3), rgba(255, 193, 7, 0.3));
            border: 1px solid rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
        }

        .cert-desc {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.8;
            margin-bottom: 30px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }

        .cert-stats {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .cert-stats-title {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 16px;
            letter-spacing: 2px;
        }

        .cert-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 16px;
        }

        .cert-stat-item {
            text-align: center;
        }

        .cert-stat-icon {
            font-size: 1.4rem;
            margin-bottom: 6px;
        }

        .cert-stat-value {
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .cert-stat-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .cert-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 215, 0, 0.15);
            position: relative;
            z-index: 1;
        }

        .cert-date {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
        }

        .cert-id {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.75rem;
            font-family: monospace;
        }

        /* 操作按钮区 */
        .cert-actions {
            text-align: center;
            margin-top: 30px;
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .cert-btn {
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .cert-btn-primary {
            background: linear-gradient(135deg, var(--cert-gold), var(--cert-gold-dark));
            color: #1a1a1a;
            font-weight: bold;
        }

        .cert-btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
        }

        .cert-btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.8);
        }

        .cert-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* 错误提示页 */
        .cert-error {
            text-align: center;
            padding: 80px 20px;
        }

        .cert-error-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .cert-error-text {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
        }

        @media (max-width: 640px) {
            .cert-card {
                padding: 36px 24px;
            }
            .cert-title {
                font-size: 2rem;
                letter-spacing: 4px;
            }
            .cert-name {
                font-size: 1.6rem;
            }
            .cert-stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="cert-wrapper" id="cert-wrapper">
        <!-- 由JS动态生成 -->
    </div>

    <!-- 引用公共JavaScript -->
    <script src="js/common.js"></script>

    <script>
        // 英雄线配置
        const heroConfig = {
            '李白': {
                icon: '🍷',
                heroClass: 'libai',
                statColor: '#60E0FF',
                statKeys: [
                    { key: 'poetry', label: '诗心', icon: '📜' },
                    { key: 'wine', label: '酒意', icon: '🍶' },
                    { key: 'quiz', label: '答题', icon: '✅' }
                ],
                completionText: '已完成李白线全部五幕旅程，在诗心与酒意的交融中探寻了成都的诗意与机甲文化。'
            },
            '诸葛亮': {
                icon: '🧮',
                heroClass: 'zhuge',
                statColor: '#0066CC',
                statKeys: [
                    { key: 'strategy', label: '谋略', icon: '⚔️' },
                    { key: 'efficiency', label: '效率', icon: '⚡' },
                    { key: 'quiz', label: '答题', icon: '🎯' }
                ],
                completionText: '已完成诸葛亮线全部五幕旅程，在智谋与效率的结合中运筹帷幄，决胜千里。'
            },
            '赵云': {
                icon: '⚔️',
                heroClass: 'zhao',
                statColor: '#ff6b6b',
                statKeys: [
                    { key: 'courage', label: '勇气', icon: '💪' },
                    { key: 'guard', label: '守护', icon: '🛡️' },
                    { key: 'quiz', label: '答题', icon: '🎯' }
                ],
                completionText: '已完成赵云线全部五幕旅程，在勇气与守护的融合中锻炼胆识，守护信仰。'
            }
        };

        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const hero = params.get('hero');
            const title = params.get('title');

            // 无参数时显示提示
            if (!hero || !title) {
                showError();
                return;
            }

            renderCertificate(params);
        });

        function renderCertificate(params) {
            const hero = params.get('hero');
            const title = params.get('title');
            const config = heroConfig[hero];

            if (!config) {
                showError();
                return;
            }

            // 收集属性数据
            const stats = {};
            config.statKeys.forEach(sk => {
                stats[sk.key] = params.get(sk.key) || 0;
            });

            // 生成证书ID
            const certId = 'CERT-' + hero.charAt(0) + '-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substr(2, 4).toUpperCase();

            // 格式化日期
            const now = new Date();
            const dateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });

            // 玩家名
            const playerName = localStorage.getItem('player_name') || '蜀地旅人';

            // 构建属性网格HTML
            let statsHTML = '';
            config.statKeys.forEach(sk => {
                const val = stats[sk.key];
                statsHTML += `
                    <div class="cert-stat-item">
                        <div class="cert-stat-icon">${sk.icon}</div>
                        <div class="cert-stat-value" style="color:${config.statColor}">${val}</div>
                        <div class="cert-stat-label">${sk.label}</div>
                    </div>
                `;
            });

            const html = `
                <div class="cert-card">
                    <div class="cert-seal">${config.icon}</div>
                    <div class="cert-top-label">游 蜀 拜 师 录</div>
                    <h1 class="cert-title">结业证书</h1>
                    <p class="cert-subtitle">CERTIFICATE OF COMPLETION</p>
                    <div class="cert-divider"></div>

                    <div class="cert-body">
                        <div class="cert-to">此证授予</div>
                        <div class="cert-name">${playerName}</div>
                        <div class="cert-title-earned ${config.heroClass}">${title}</div>
                        <p class="cert-desc">${config.completionText}</p>

                        <div class="cert-stats">
                            <div class="cert-stats-title">— 旅 程 数 据 —</div>
                            <div class="cert-stats-grid">
                                ${statsHTML}
                            </div>
                        </div>
                    </div>

                    <div class="cert-footer">
                        <div class="cert-date">📅 ${dateStr}</div>
                        <div class="cert-id">${certId}</div>
                    </div>
                </div>

                <div class="cert-actions">
                    <button class="cert-btn cert-btn-primary" onclick="window.location.href='index.html'">
                        🏠 返回首页
                    </button>
                    <button class="cert-btn cert-btn-secondary" onclick="window.print()">
                        🖨️ 打印证书
                    </button>
                </div>
            `;

            document.getElementById('cert-wrapper').innerHTML = html;
        }

        function showError() {
            document.getElementById('cert-wrapper').innerHTML = `
                <div class="cert-error">
                    <div class="cert-error-icon">📜</div>
                    <div class="cert-error-text">此证书需通过第五幕通关后领取</div>
                    <button class="cert-btn cert-btn-secondary" onclick="window.location.href='index.html'">
                        ← 返回首页
                    </button>
                </div>
            `;
        }
    </script>

    <!-- 打印样式 -->
    <style media="print">
        @media print {
            body {
                background: white !important;
                padding: 0 !important;
            }
            .cert-card {
                border: 2px solid #b8860b !important;
                box-shadow: none !important;
                color: #333 !important;
            }
            .cert-card::before {
                border-color: rgba(184, 134, 11, 0.3) !important;
            }
            .cert-card::after {
                background: none !important;
            }
            .cert-title {
                color: #b8860b !important;
                -webkit-text-fill-color: #b8860b !important;
            }
            .cert-to, .cert-stat-label, .cert-stats-title {
                color: #666 !important;
            }
            .cert-name {
                color: #222 !important;
            }
            .cert-desc {
                color: #555 !important;
            }
            .cert-stat-value {
                color: #b8860b !important;
            }
            .cert-top-label {
                color: rgba(184, 134, 11, 0.6) !important;
            }
            .cert-actions {
                display: none !important;
            }
            .cert-seal {
                opacity: 1 !important;
            }
            .cert-footer {
                border-top-color: rgba(184, 134, 11, 0.3) !important;
            }
        }
    </style>
</body>
</html>
